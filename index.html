<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; }

        /* LOGIN PAGE */
        #auth-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #0070f3; margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 5px; }

        /* MARKET PAGE */
        #main-site { display: none; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: #0070f3; }
        .product-list { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #16161a; border: 1px solid #222; border-radius: 15px; padding: 20px; }
        .price { color: #0070f3; font-size: 20px; font-weight: bold; margin: 8px 0; }
        .stock-tag { font-size: 11px; text-transform: uppercase; font-weight: bold; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <h1>SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue" style="background:#222;" onclick="alert('Account creation ready. Use Pelumi / 123')">Create Account</button>
    </div>
</div>

<div id="main-site">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET</div>
        <div>₦<span id="bal">0</span></div>
    </div>
    <div class="product-list" id="shop-grid">
        </div>
</div>

<div id="admin-panel">
    <div class="auth-card" style="margin: auto;">
        <h2 style="color:#0070f3; margin-bottom:15px;">ADMIN PANEL</h2>
        <select id="admin-cat" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <option value="fb_create">Facebook with create profile</option>
            <option value="fb_already">Facebook with already created Profile</option>
        </select>
        <textarea id="admin-logs" style="width:100%; height:100px; background:#000; color:#fff; padding:10px; border:1px solid #333;" placeholder="user:pass"></textarea>
        <button class="btn-blue" onclick="saveLogs()">UPLOAD STOCK</button>
        <button class="btn-blue" style="background:#222;" onclick="hideAdmin()">EXIT ADMIN</button>
    </div>
</div>

<script>
    let activeUser = null;
    // Default setup for testing
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{"fb_create":[],"fb_already":[]}');
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":15000}}');

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            renderShop();
        } else { alert("Login failed!"); }
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        const items = [
            { id: 'fb_create', name: 'Facebook with create profile', price: 8000 },
            { id: 'fb_already', name: 'Facebook with already created Profile', price: 5500 }
        ];
        grid.innerHTML = '';
        items.forEach(item => {
            const stockCount = inventory[item.id].length;
            grid.innerHTML += `
                <div class="card">
                    <div class="stock-tag" style="color:${stockCount > 0 ? '#0070f3' : '#ff4444'}">Stock: ${stockCount}</div>
                    <h3 style="margin-top:5px; font-size:16px;">${item.name}</h3>
                    <div class="price">₦${item.price.toLocaleString()}</div>
                    <button class="btn-blue" onclick="buyLog('${item.id}', ${item.price})">${stockCount > 0 ? 'Buy Now' : 'Out of Stock'}</button>
                </div>`;
        });
    }

    function buyLog(id, price) {
        if(users[activeUser].b < price) return alert("Low balance!");
        if(inventory[id].length === 0) return alert("No stock available!");
        
        const log = inventory[id].shift();
        users[activeUser].b -= price;
        localStorage.setItem('sys_users', JSON.stringify(users));
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        document.getElementById('bal').innerText = users[activeUser].b.toLocaleString();
        alert("SUCCESS!\n\nYour Log: " + log);
        renderShop();
    }

    let clicks = 0;
    function adminClick() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("Admin Key:") === "SubbyAdmin2026") document.getElementById('admin-panel').style.display='flex';
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    }

    function saveLogs() {
        const cat = document.getElementById('admin-cat').value;
        const logData = document.getElementById('admin-logs').value.trim();
        if(!logData) return alert("Enter some logs first!");
        inventory[cat].push(logData);
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        alert("Stock Uploaded!");
        document.getElementById('admin-logs').value = '';
        renderShop();
    }

    function hideAdmin() { document.getElementById('admin-panel').style.display='none'; }
</script>
</body>
</html>
