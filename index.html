<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V76 SMART</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-ui { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        #app { display: none; }
        .nav { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; }
        .notification-badge { background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: 5px; }
        
        /* IMPROVED CHAT UI */
        #bot-box { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: none; }
        #bot-bubble { width: 60px; height: 60px; background: #111 url('https://cdn-icons-png.flaticon.com/512/4712/4712035.png') center/70% no-repeat; border: 2px solid var(--primary); border-radius: 50%; cursor: pointer; }
        #bot-window { position: absolute; bottom: 75px; right: 0; width: 300px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 15px; display: none; box-shadow: 0 10px 40px #000; }
        #chat-logs { height: 200px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding-right: 5px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 10px; }
        .bot-msg { background: #222; color: #fff; }
        .user-msg { background: var(--primary); color: #fff; text-align: right; }
    </style>
</head>
<body>

<div id="auth-gate" class="overlay">
    <div class="card-ui">
        <h2 id="atitle" style="color:var(--primary); margin-bottom:15px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="abtn">SIGN IN</button>
        <p onclick="toggleAuth()" style="color:var(--gold); font-size:12px; margin-top:15px; cursor:pointer;" id="atog">New? Create Account</p>
    </div>
</div>

<div id="admin-gate" class="overlay" style="display:none; z-index:10000;">
    <div class="card-ui" style="max-width:450px;">
        <h2 style="color:var(--gold)">ADMIN PANEL</h2>
        <div id="admin-notifs" style="background:#000; padding:10px; border-radius:10px; margin:10px 0; max-height:100px; overflow-y:auto; font-size:11px; color:#0f0;">
            Waiting for new signups...
        </div>
        <input id="adm-mail" placeholder="User Email">
        <input id="adm-amt" placeholder="Amount ₦">
        <button class="btn" onclick="adminSendMoney()">SEND MONEY</button>
        <hr style="margin:15px 0; opacity:0.1">
        <input id="log-name" placeholder="Item Name">
        <input id="log-price" placeholder="Price ₦">
        <button class="btn" style="background:var(--gold); color:#000" onclick="adminUploadLog()">UPLOAD LOG</button>
        <button class="btn" style="background:#222; margin-top:15px;" onclick="closeAdmin()">CLOSE</button>
    </div>
</div>

<div id="app">
    <div class="nav">
        <b style="color:var(--primary)" ondblclick="checkAdmin()">SUBBY LOGS <span id="admin-dot" style="display:none" class="notification-badge">NEW</span></b>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="color:var(--gold); font-weight:900;">₦<span id="bal">0</span></div>
            <button onclick="pay()" style="width:30px; height:30px; border-radius:50%; border:none; background:var(--gold); font-weight:bold;">+</button>
            <button onclick="firebase.auth().signOut()" style="color:red; background:none; border:none; font-size:10px;">Exit</button>
        </div>
    </div>
    <div id="market" style="padding:20px; display:grid; gap:15px;"></div>
</div>

<div id="bot-box">
    <div id="bot-window">
        <div id="chat-logs">
            <div class="msg bot-msg">🤖 <b>Subby AI:</b> Hello! I'm active. Ask me anything about your account or the market.</div>
        </div>
        <input type="text" id="user-query" placeholder="Type message..." style="height:40px; font-size:12px;" onkeypress="if(event.key==='Enter') startChat(this.value)">
    </div>
    <div id="bot-bubble" onclick="toggleBot()"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('atitle').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('abtn').innerText = isLogin ? "SIGN IN" : "SIGN UP";
        document.getElementById('atog').innerText = isLogin ? "New? Create Account" : "Have an account? Login";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { 
            if(isLogin) { await auth.signInWithEmailAndPassword(e,p); } 
            else { 
                await auth.createUserWithEmailAndPassword(e,p);
                db.ref('notifications').push({ msg: "New User: " + e, time: Date.now() });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            document.getElementById('bot-box').style.display='block';
            sync();
        } else {
            document.getElementById('auth-gate').style.display='flex';
            document.getElementById('app').style.display='none';
            document.getElementById('bot-box').style.display='none';
        }
    });

    function sync() {
        const id = auth.currentUser.email.replace(/\./g,'_');
        db.ref('users/'+id).on('value', s => document.getElementById('bal').innerText = (s.val()?.bal || 0).toLocaleString());
        
        // ADMIN NOTIFICATIONS
        db.ref('notifications').on('value', s => {
            const n = s.val();
            let h = "";
            for(let k in n) { h = `<div>🔔 ${n[k].msg}</div>` + h; }
            document.getElementById('admin-notifs').innerHTML = h || "No recent alerts.";
            if(n) document.getElementById('admin-dot').style.display = 'inline';
        });

        db.ref('market').on('value', s => {
            const logs = s.val();
            let h = "";
            for(let k in logs) {
                h += `<div style="background:#16171d; padding:20px; border-radius:20px; border:1px solid #222;">
                    <h3 style="margin-bottom:5px;">${logs[k].name}</h3>
                    <h2 style="color:var(--primary)">₦${parseInt(logs[k].price).toLocaleString()}</h2>
                    <button class="btn" onclick="buyLog('${k}', ${logs[k].price})">BUY NOW</button>
                    ${auth.currentUser.email === 'admin@subbylogs.com' ? `<button onclick="db.ref('market/${k}').remove()" style="background:red; border:none; color:white; padding:5px; border-radius:5px; margin-top:10px; width:100%; font-size:10px;">DELETE</button>` : ''}
                </div>`;
            }
            document.getElementById('market').innerHTML = h || "Market is empty.";
        });
    }

    // INSTANT SMART AI
    function toggleBot() { 
        const w = document.getElementById('bot-window');
        w.style.display = w.style.display === 'block' ? 'none' : 'block';
    }

    function startChat(q) {
        const logs = document.getElementById('chat-logs');
        const input = document.getElementById('user-query');
        logs.innerHTML += `<div class="msg user-msg">${q}</div>`;
        input.value = "";
        
        setTimeout(() => {
            let res = "I am processing your request. Please check the market for updates!";
            const low = q.toLowerCase();
            if(low.includes("hi") || low.includes("hello")) res = "Hello! Welcome to Subby Logs. How can I assist with your wallet or logs today?";
            else if(low.includes("balance") || low.includes("money")) res = "You can fund your wallet by clicking the (+) button at the top right.";
            else if(low.includes("scam") || low.includes("legit")) res = "Subby Logs is 100% automated and secure. Your logs are delivered instantly after purchase.";
            else if(low.includes("facebook") || low.includes("fb")) res = "We update Facebook logs daily. Keep an eye on the market grid!";
            
            logs.innerHTML += `<div class="msg bot-msg">🤖 <b>Subby AI:</b> ${res}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }, 600);
    }

    function checkAdmin() { if(prompt("PIN") === "1710") { document.getElementById('admin-gate').style.display='flex'; document.getElementById('admin-dot').style.display='none'; } }
    function closeAdmin() { document.getElementById('admin-gate').style.display='none'; }
    function adminSendMoney() {
        const m = document.getElementById('adm-mail').value.replace(/\./g,'_'), a = parseInt(document.getElementById('adm-amt').value);
        db.ref('users/'+m).once('value', s => db.ref('users/'+m).update({ bal: (s.val()?.bal || 0) + a }));
        alert("Sent!");
    }
    function adminUploadLog() {
        db.ref('market').push({ name: document.getElementById('log-name').value, price: document.getElementById('log-price').value });
        alert("Uploaded!");
    }
    function buyLog(k, p) {
        const id = auth.currentUser.email.replace(/\./g,'_');
        db.ref('users/'+id).once('value', s => {
            const b = s.val()?.bal || 0;
            if(b < p) return alert("Low balance!");
            db.ref('users/'+id).update({ bal: b - p });
            alert("Success! Check with Admin for your data.");
        });
    }
    function pay() {
        const a = prompt("Amount ₦:");
        if(!a) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: auth.currentUser.email,
            amount: a * 100,
            callback: () => {
                const id = auth.currentUser.email.replace(/\./g,'_');
                db.ref('users/'+id).once('value', s => db.ref('users/'+id).update({ bal: (s.val()?.bal || 0) + parseInt(a) }));
            }
        }).openIframe();
    }
</script>
</body>
</html>
