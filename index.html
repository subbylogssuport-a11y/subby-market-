<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V60 FINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; min-height: 100vh; overflow-x: hidden; }

        /* iA BOT ICON - FIXED CLICKING */
        #ia-bubble { position: fixed; bottom: 90px; right: 20px; width: 65px; height: 65px; background: #000; border: 3px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .icon-container { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #0070f3, #000); border-radius: 50%; pointer-events: none; }

        /* UPDATED CHAT WINDOW */
        #ia-window { position: fixed; bottom: 165px; right: 20px; width: 320px; background: #111; border: 1px solid #333; border-radius: 20px; display: none; flex-direction: column; z-index: 10000; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .ia-header { background: #000; padding: 15px; font-weight: 900; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        #ia-chat-box { height: 260px; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; background: #0d0d0d; }
        .ia-msg { background: #1a1a1a; padding: 10px 14px; border-radius: 15px; align-self: flex-start; max-width: 85%; line-height: 1.5; border-bottom-left-radius: 2px; }
        .user-msg { background: var(--primary); align-self: flex-end; border-radius: 15px; border-bottom-right-radius: 2px; border: none; }

        /* APP UI */
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .navbar { background: #0a0b10; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 20px; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 30px; font-weight: 900; color: var(--gold); }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .grid { padding: 15px; display: grid; gap: 20px; padding-bottom: 120px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; }
        .cat-header { padding: 10px 20px; font-size: 12px; color: var(--gold); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0b10; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 2000; }
        .nav-item { text-align: center; cursor: pointer; color: #666; font-size: 10px; font-weight: 800; }
        .active { color: var(--primary); }
    </style>
</head>
<body>

<div id="ia-bubble" onclick="toggleIA()">
    <div class="icon-container">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>
    </div>
</div>

<div id="ia-window">
    <div class="ia-header"><span>iA BOT ACTIVE</span> <span onclick="toggleIA()" style="cursor:pointer;">×</span></div>
    <div id="ia-chat-box"></div>
    <div style="display:flex; padding:10px; background:#000;">
        <input type="text" id="ia-text" style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:10px;" placeholder="Message iA...">
        <button onclick="iaAsk()" style="background:var(--primary); color:#fff; border:none; padding:0 10px; margin-left:5px; border-radius:10px;">➤</button>
    </div>
</div>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGS</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">LOGIN</button>
        <p onclick="showGate('reg-gate')" style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;">Create Account</p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">REGISTER</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleRegister()">SIGN UP</button>
        <p onclick="showGate('login-gate')" style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;">Back to Login</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY LOGS</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWallet()" style="cursor:pointer;">+</span></div>
    </div>
    <div id="market-grid"></div>
    <div class="bottom-nav">
        <div class="nav-item active" onclick="closeAllOverlays()"><div>🛍️</div><div>MARKET</div></div>
        <div class="nav-item" onclick="openHistory()"><div>📦</div><div>MY LOGS</div></div>
        <div class="nav-item" onclick="window.open('https://wa.me/2348104565349')"><div>💬</div><div>SUPPORT</div></div>
    </div>
</div>

<div id="history-overlay" class="overlay">
    <h2 style="color:var(--gold); margin-bottom:20px;">My Inventory</h2>
    <div id="history-list"></div>
    <button class="auth-btn" style="background:#222; margin-top:10px;" onclick="closeAllOverlays()">BACK</button>
</div>

<div id="admin-panel" class="overlay">
    <h2 style="color:var(--primary); margin-bottom:20px;">Admin</h2>
    <input id="adm-user" class="auth-input" placeholder="User Email">
    <input id="adm-amt" class="auth-input" placeholder="Amount ₦">
    <button class="auth-btn" onclick="admCredit()">CREDIT USER</button>
    <button class="auth-btn" style="background:#222; margin-top:20px;" onclick="closeAllOverlays()">EXIT</button>
</div>

<script>
    let currentUser = null;
    let balance = 0;

    // --- PASTE YOUR LOGS HERE BEFORE SAVING ---
    let globalStock = [
        { 
            id: 101, 
            c: "FACEBOOK", 
            n: "Random Facebook [NEWLY CREATED]", 
            p: 1000, 
            data: ["user:pass", "user2:pass2"] // PASTE REAL LOGS HERE
        }
    ];

    function toggleIA() {
        const win = document.getElementById('ia-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        if(win.style.display === 'flex') addAIMsg("iA Bot ready for launch. How can I assist?");
    }

    function addAIMsg(t) { 
        document.getElementById('ia-chat-box').innerHTML += `<div class="ia-msg">${t}</div>`;
        document.getElementById('ia-chat-box').scrollTop = 9999;
    }

    function iaAsk() {
        const i = document.getElementById('ia-text');
        if(!i.value) return;
        document.getElementById('ia-chat-box').innerHTML += `<div class="ia-msg user-msg">${i.value}</div>`;
        i.value = "";
        setTimeout(() => addAIMsg("Processing request... please check our Support if you need immediate help."), 600);
    }

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const e = document.getElementById('reg-email').value.toLowerCase();
        const p = document.getElementById('reg-pass').value;
        localStorage.setItem(`subby_user_${e}`, JSON.stringify({pass:p, bal:0, history:[]}));
        alert("Success!"); showGate('login-gate');
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value.toLowerCase();
        const p = document.getElementById('log-pass').value;
        const u = JSON.parse(localStorage.getItem(`subby_user_${e}`));
        if(u && u.pass === p) {
            currentUser = e; balance = u.bal;
            document.getElementById('bal-val').innerText = balance;
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderMarket();
        } else alert("Error");
    }

    function renderMarket() {
        const grid = document.getElementById('market-grid');
        let h = "";
        const cats = [...new Set(globalStock.map(i => i.c))];
        cats.forEach(c => {
            h += `<div class="cat-header">${c}</div><div class="grid">`;
            globalStock.filter(i => i.c === c).forEach(i => {
                h += `<div class="card">
                    <p style="font-size:10px; color:#0f0">● ${i.data.length} IN STOCK</p>
                    <h3>${i.n}</h3>
                    <h2 style="color:var(--primary)">₦${i.p}</h2>
                    <button class="auth-btn" onclick="buyItem(${i.id})">PURCHASE</button>
                </div>`;
            });
            h += `</div>`;
        });
        grid.innerHTML = h;
    }

    function buyItem(id) {
        let itm = globalStock.find(x => x.id === id);
        if(balance < itm.p) return alert("Low funds");
        if(itm.data.length === 0) return alert("Sold out");
        const log = itm.data.shift();
        balance -= itm.p;
        let u = JSON.parse(localStorage.getItem(`subby_user_${currentUser}`));
        u.bal = balance; u.history.push({n: itm.n, log: log, d: new Date().toLocaleString()});
        localStorage.setItem(`subby_user_${currentUser}`, JSON.stringify(u));
        document.getElementById('bal-val').innerText = balance;
        renderMarket(); alert("Bought! Check MY LOGS.");
    }

    function openHistory() {
        const u = JSON.parse(localStorage.getItem(`subby_user_${currentUser}`));
        document.getElementById('history-overlay').style.display = 'block';
        document.getElementById('history-list').innerHTML = u.history.map(h => `
            <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px;">
                <p style="font-size:10px;">${h.d}</p>
                <h4 style="color:var(--gold)">${h.n}</h4>
                <code>${h.log}</code>
            </div>`).reverse().join('');
    }

    function openAdmin() { if(prompt("PIN") === "1234567890") document.getElementById('admin-panel').style.display = 'block'; }
    function admCredit() {
        const e = document.getElementById('adm-user').value.toLowerCase();
        const a = parseInt(document.getElementById('adm-amt').value);
        let u = JSON.parse(localStorage.getItem(`subby_user_${e}`));
        if(u) { u.bal += a; localStorage.setItem(`subby_user_${e}`, JSON.stringify(u)); alert("Credited"); }
    }

    function fundWallet() {
        const a = prompt("Amount ₦:");
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser, amount: a * 100, currency: 'NGN',
            callback: () => { 
                balance += parseInt(a); 
                let u = JSON.parse(localStorage.getItem(`subby_user_${currentUser}`));
                u.bal = balance; localStorage.setItem(`subby_user_${currentUser}`, JSON.stringify(u));
                document.getElementById('bal-val').innerText = balance;
            }
        }).openIframe();
    }
    function closeAllOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
</script>
</body>
</html>
