<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V85 ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --whatsapp: #25d366; --red: #ff4d4d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; overflow-x: hidden; }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-ui { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; }
        input, textarea { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .nav { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .log-item { background: #16171d; padding: 20px; border-radius: 20px; border: 1px solid #222; margin: 15px; }
        #bot-window { position: fixed; bottom: 85px; right: 20px; width: 300px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 15px; display: none; z-index: 2000; box-shadow: 0 10px 30px #000; }
        #chat-logs { height: 220px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; scroll-behavior: smooth; }
        .msg-ai { background: #222; padding: 10px; border-radius: 12px; margin-bottom: 8px; color: #fff; border-left: 3px solid var(--primary); }
        .msg-user { background: var(--primary); padding: 10px; border-radius: 12px; margin-bottom: 8px; color: #fff; text-align: right; margin-left: 20%; }
        .logout-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; margin-left: 10px; }
        .user-list { background: #000; color: #0f0; font-family: monospace; font-size: 11px; text-align: left; padding: 10px; border-radius: 10px; margin-top: 10px; max-height: 150px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="auth-gate" class="overlay">
    <div class="card-ui">
        <h2 id="atitle" style="color:var(--primary); margin-bottom:15px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="abtn">SIGN IN</button>
        <p onclick="toggleAuth()" style="color:var(--gold); font-size:12px; margin-top:15px; cursor:pointer;" id="atog">New? Create Account</p>
        <p onclick="forgotPass()" style="color:#666; font-size:11px; margin-top:10px; cursor:pointer;">Forgot Password?</p>
    </div>
</div>

<div id="admin-gate" class="overlay" style="display:none; z-index:10000;">
    <div class="card-ui" style="max-height: 95vh; overflow-y: auto; padding: 20px;">
        <h2 style="color:var(--gold)">ADMIN PANEL</h2>
        <div style="border: 1px solid #333; padding: 10px; border-radius: 15px; margin-bottom: 15px;">
            <p style="font-size: 12px; color: var(--primary);">SEND MONEY</p>
            <input id="adm-mail" placeholder="User Gmail">
            <input id="adm-amt" placeholder="Amount ₦" type="number">
            <button class="btn" onclick="adminSendMoney()">CONFIRM TRANSFER</button>
            <button class="btn" style="background:#222; font-size:11px; padding:8px;" onclick="showUsers()">VIEW ALL REGISTERED USERS</button>
            <div id="user-display" class="user-list" style="display:none;">Loading...</div>
        </div>
        <div style="border: 1px solid #333; padding: 10px; border-radius: 15px;">
            <p style="font-size: 12px; color: var(--gold);">UPLOAD STOCK</p>
            <input id="log-name" placeholder="Item Name">
            <input id="log-price" placeholder="Price ₦" type="number">
            <textarea id="log-data" placeholder="Paste logins (one per line)"></textarea>
            <button class="btn" style="background:var(--gold); color:#000" onclick="adminUpload()">UPLOAD LOGS</button>
        </div>
        <button class="btn" style="background:#222; margin-top:10px;" onclick="closeAdmin()">CLOSE ADMIN</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <b style="color:var(--primary)" ondblclick="checkAdmin()">SUBBY LOGS</b>
        <div style="display:flex; align-items:center; gap:5px;">
            <div style="color:var(--gold); font-weight:900;">₦<span id="bal">0</span></div>
            <button onclick="pay()" style="width:25px; height:25px; border-radius:50%; border:none; background:var(--gold); font-weight:bold;">+</button>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>
    <div style="padding:15px;"><input type="text" id="searchInput" placeholder="Search cards..." oninput="filterMarket()" style="margin:0"></div>
    <div id="market-view"></div>
    
    <div style="position:fixed; bottom:0; width:100%; display:flex; background:#0a0b10; border-top:1px solid #222; padding:15px; justify-content:space-around; z-index:100;">
        <div onclick="switchTab('market')" id="tab-m" style="color:var(--primary); font-weight:bold; font-size:12px; cursor:pointer;">MARKET</div>
        <div onclick="switchTab('logs')" id="tab-l" style="color:#555; font-weight:bold; font-size:12px; cursor:pointer;">MY LOGS</div>
        <div onclick="window.open('https://wa.me/2347048141378')" style="color:var(--whatsapp); font-weight:bold; font-size:12px; cursor:pointer;">SUPPORT</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let allItems = {};

    async function handleAuth() {
        const e = document.getElementById('email').value.trim().toLowerCase(), p = document.getElementById('pass').value;
        if(!e || !p) return alert("Fill all fields");
        try {
            if(document.getElementById('atitle').innerText === "LOGIN") await auth.signInWithEmailAndPassword(e,p);
            else {
                await auth.createUserWithEmailAndPassword(e,p);
                const uid = e.replace(/\./g,'_');
                await db.ref('users/'+uid).set({ email: e, bal: 0 });
            }
        } catch(err) { alert(err.message); }
    }

    function forgotPass() {
        const e = document.getElementById('email').value.trim();
        auth.sendPasswordResetEmail(e).then(() => alert("Reset link sent!")).catch(err => alert(err.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            sync();
        } else { document.getElementById('auth-gate').style.display='flex'; }
    });

    function sync() {
        const uid = auth.currentUser.email.replace(/\./g,'_');
        db.ref('users/'+uid+'/bal').on('value', s => document.getElementById('bal').innerText = (s.val() || 0).toLocaleString());
        db.ref('market').on('value', s => { allItems = s.val() || {}; filterMarket(); });
    }

    function filterMarket() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let h = "";
        for(let k in allItems) {
            if(allItems[k].name.toLowerCase().includes(term)) {
                h += `<div class="log-item"><h3>${allItems[k].name}</h3><h2 style="color:var(--primary)">₦${parseInt(allItems[k].price).toLocaleString()}</h2><button class="btn" onclick="buy('${k}')">BUY NOW</button></div>`;
            }
        }
        document.getElementById('market-view').innerHTML = h;
    }

    function showUsers() {
        const display = document.getElementById('user-display');
        display.style.display = 'block';
        db.ref('users').once('value', s => {
            let list = "<b>REGISTERED EMAILS:</b><br>";
            s.forEach(child => { list += "- " + child.val().email + "<br>"; });
            display.innerHTML = list;
        });
    }

    function adminSendMoney() {
        let e = document.getElementById('adm-mail').value.trim().toLowerCase();
        if(e.endsWith('.')) e = e.slice(0, -1);
        const amt = parseInt(document.getElementById('adm-amt').value);
        const uk = e.replace(/\./g,'_');
        db.ref('users/' + uk).once('value', s => {
            if(!s.exists()) return alert("User not found! Click 'VIEW ALL USERS' to check spelling.");
            db.ref('users/' + uk).update({ bal: (s.val().bal || 0) + amt }).then(() => alert("Sent ₦" + amt));
        });
    }

    function adminUpload() {
        const n = document.getElementById('log-name').value, p = document.getElementById('log-price').value, d = document.getElementById('log-data').value.split('\n').filter(l => l.trim() !== "");
        db.ref('market').push({ name: n, price: p, data: d }); alert("Uploaded!");
    }

    function checkAdmin() { if(prompt("ADMIN PIN") === "1710") document.getElementById('admin-gate').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-gate').style.display='none'; }
    function pay() { /* Paystack logic remains same */ }
    function toggleAuth() { /* Switch logic remains same */ }
</script>
</body>
</html>
