<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | MASTER MARKET</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; min-height: 100vh; }

        /* AUTH & ADMIN CARDS */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* INPUTS & BUTTONS */
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-recovery { background: none; border: none; color: #0070f3; cursor: pointer; margin-top: 15px; width: 100%; }

        /* INTERFACE */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; cursor: pointer; }
        
        .sidebar { background: #16161a; padding: 15px; border-bottom: 1px solid #222; display: flex; overflow-x: auto; gap: 10px; }
        .cat-item { padding: 10px 15px; border-radius: 8px; background: #222; color: #ccc; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .active-cat { background: #0070f3; color: #fff; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>

<div id="admin-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:20px; overflow-y:auto;">
    <div class="auth-card" style="max-width:500px; margin:auto; border-color:#0070f3;">
        <h2 style="color:#0070f3; margin-bottom:20px;">ADMIN VAULT</h2>
        
        <div style="text-align:left; border-bottom:1px solid #333; pb:15px; mb:15px;">
            <p style="font-size:11px; color:#0070f3; font-weight:bold;">1. STOCK MANAGER</p>
            <select id="admin-cat">
                <option value="fb_usa">FB USA</option>
                <option value="fb_naija">FB Naija</option>
                <option value="fb_create_profile">FB with create profile</option>
                <option value="fb_already_created">FB with already created Profile</option>
                <option value="telegram">Telegram Sessions</option>
                <option value="instagram">Instagram Logs</option>
            </select>
            <textarea id="admin-logs" rows="4" placeholder="user:pass (one per line)"></textarea>
            <button class="btn-blue" onclick="saveLogs()">UPLOAD STOCK</button>
        </div>

        <div style="text-align:left;">
            <p style="font-size:11px; color:#0070f3; font-weight:bold;">2. PRICE EDITOR (₦)</p>
            <div id="price-list-admin" style="margin:10px 0;"></div>
            <button class="btn-blue" style="background:#222;" onclick="updateAllPrices()">SAVE NEW PRICES</button>
        </div>

        <button class="btn-blue" style="background:#444; margin-top:15px;" onclick="setAdminBalance()">REFRESH MY WALLET (₦1M)</button>
        <button class="btn-recovery" onclick="hideAdmin()">EXIT ADMIN</button>
    </div>
</div>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 25px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-recovery" onclick="openReset()">Forgot Password?</button>
    </div>
</div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span></div>
    </div>

    <div class="sidebar">
        <div class="cat-item active-cat" onclick="filterShop('all')">All Products</div>
        <div class="cat-item" onclick="filterShop('fb_usa')">FB USA</div>
        <div class="cat-item" onclick="filterShop('fb_create_profile')">Create Profile</div>
        <div class="cat-item" onclick="filterShop('telegram')">Telegram</div>
    </div>

    <div class="product-grid" id="shop-grid"></div>
</div>

<script>
    const MASTER_PW = "SubbyAdmin2026";
    let activeUser = null;
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{}');
    
    // Default prices if memory is empty
    let savedPrices = JSON.parse(localStorage.getItem('subby_prices')) || {
        fb_usa: 6000,
        fb_naija: 4500,
        fb_create_profile: 8000,
        fb_already_created: 5500,
        telegram: 3500,
        instagram: 4000
    };

    function filterShop(cat) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        
        const products = [
            {id:'fb_usa', name:'Facebook USA', price: savedPrices.fb_usa},
            {id:'fb_naija', name:'Facebook Naija', price: savedPrices.fb_naija},
            {id:'fb_create_profile', name:'Facebook with create profile', price: savedPrices.fb_create_profile},
            {id:'fb_already_created', name:'Facebook with already created Profile', price: savedPrices.fb_already_created},
            {id:'telegram', name:'Telegram Session', price: savedPrices.telegram},
            {id:'instagram', name:'Instagram Log', price: savedPrices.instagram}
        ];

        products.forEach(p => {
            if(cat === 'all' || p.id === cat) {
                const count = inventory[p.id] ? inventory[p.id].length : 0;
                grid.innerHTML += `
                <div class="product-card">
                    <span style="color:${count > 0 ? '#0070f3' : '#d32f2f'}; font-size:11px; font-weight:bold;">Stock: ${count}</span>
                    <h3 style="margin:5px 0; font-size:15px;">${p.name}</h3>
                    <div style="color:#0070f3; font-size:22px; font-weight:900; margin-bottom:12px;">₦${p.price.toLocaleString()}</div>
                    <button class="btn-blue" onclick="buyLogs('${p.id}', ${p.price})">${count > 0 ? 'PURCHASE' : 'SOLD OUT'}</button>
                </div>`;
            }
        });
    }

    let clicks = 0;
    function adminClick() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("Admin Key:") === MASTER_PW) showAdminPanel();
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    }

    function showAdminPanel() {
        document.getElementById('admin-panel').style.display = 'block';
        const priceDiv = document.getElementById('price-list-admin');
        priceDiv.innerHTML = '';
        for (let id in savedPrices) {
            priceDiv.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; mb:8px;">
                    <span style="font-size:11px; color:#888;">${id.toUpperCase()}:</span>
                    <input type="number" id="price-${id}" value="${savedPrices[id]}" style="width:100px; margin:0; padding:5px;">
                </div>`;
        }
    }

    function updateAllPrices() {
        for (let id in savedPrices) {
            savedPrices[id] = parseInt(document.getElementById('price-' + id).value);
        }
        localStorage.setItem('subby_prices', JSON.stringify(savedPrices));
        alert("Prices updated successfully!");
        filterShop('all');
    }

    function saveLogs() {
        const cat = document.getElementById('admin-cat').value;
        const logs = document.getElementById('admin-logs').value.trim().split('\n').filter(l => l !== '');
        inventory[cat] = [...(inventory[cat] || []), ...logs];
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        alert("Stock Added!"); 
        document.getElementById('admin-logs').value = '';
        filterShop('all');
    }

    function buyLogs(id, price) {
        let users = JSON.parse(localStorage.getItem('sys_users'));
        if (users[activeUser].b < price) return alert("Insufficient funds!");
        if (confirm(`Purchase for ₦${price.toLocaleString()}?`)) {
            users[activeUser].b -= price;
            const log = inventory[id].shift();
            localStorage.setItem('sys_users', JSON.stringify(users));
            localStorage.setItem('subby_stock', JSON.stringify(inventory));
            document.getElementById('bal').innerText = users[activeUser].b.toLocaleString();
            alert("✅ SUCCESS!\n\nDetails:\n" + log);
            filterShop('all');
        }
    }

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":0}}');
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block
