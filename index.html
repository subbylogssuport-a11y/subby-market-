<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | PRO V3</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #1a1a2e, #000000); color: #eee; min-height: 100vh; }

        /* --- ADMIN PANEL --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; padding: 20px; overflow-y: auto; }
        .admin-box { background: #16161a; border: 1px solid #0070f3; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; margin: 40px auto; }
        .admin-title { color: #0070f3; margin-bottom: 20px; font-weight: 900; text-align: center; }
        select, textarea, .adm-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 15px; outline: none; }
        textarea { height: 150px; font-family: monospace; }
        
        /* --- UI COMPONENTS --- */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #222; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        #main-app { display: none; }
        .navbar { background: rgba(22, 22, 26, 0.85); backdrop-filter: blur(12px); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 20px; font-weight: 900; color: #0070f3; cursor: pointer; user-select: none; }
        .bal-pill { background: #111; border: 1px solid #0070f3; padding: 6px 14px; border-radius: 30px; font-weight: bold; }
        
        .categories-nav { padding: 20px 15px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #16161a; color: #888; padding: 10px 18px; border-radius: 12px; border: 1px solid #222; white-space: nowrap; font-size: 13px; font-weight: 600; cursor: pointer; }
        .cat-btn.active { background: #0070f3; color: #fff; border-color: #0070f3; }

        .grid { padding: 15px; }
        .card { background: linear-gradient(145deg, #16161a, #0c0c0e); border: 1px solid #222; border-radius: 20px; padding: 22px; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 900; color: #0070f3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #0070f3; color: #fff; font-weight: 800; cursor: pointer; }
        .buy-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* --- ORDERS SECTION --- */
        .orders-section { padding: 15px; background: #0a0a0a; margin: 20px 15px; border-radius: 15px; border: 1px dashed #333; }
        .order-item { background: #111; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 3px solid #0070f3; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="admin-box">
            <h3 class="admin-title">WAREHOUSE (ADMIN)</h3>
            <label>Choose Item</label>
            <select id="restock-item"></select>
            <label>Paste Logs (One per line)</label>
            <textarea id="log-input" placeholder="user:pass:cookie"></textarea>
            <button class="auth-btn" onclick="applyRestock()">Submit to Inventory</button>
            <button class="auth-btn" style="background:#333; margin-top:10px;" onclick="closeAdmin()">Cancel</button>
        </div>
    </div>

    <div id="auth-gate">
        <div class="auth-card">
            <h2 style="color:#0070f3; margin-bottom:20px;">SUBBY LOGIN</h2>
            <input type="email" id="log-email" class="auth-input" placeholder="Email">
            <input type="password" id="log-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div class="brand" onmousedown="startAdminTimer()" onmouseup="clearAdminTimer()" ontouchstart="startAdminTimer()" ontouchend="clearAdminTimer()">SUBBY MARKET</div>
            <div class="bal-pill">₦<span id="bal-val">0</span> <span style="margin-left:8px; cursor:pointer;" onclick="fundWallet()">+</span></div>
        </div>

        <div class="categories-nav" id="cat-bar"></div>

        <div class="grid" id="market-grid"></div>

        <div class="orders-section">
            <h4 style="color:#0070f3;">My Purchased Logs</h4>
            <div id="orders-list" style="color:#888; font-size:13px; margin-top:5px;">No purchases yet.</div>
        </div>
    </div>

<script>
    let balance = 0, adminTimer, adminPIN = "1234", myOrders = [];

    const items = [
        { id: 1, n: "Facebook (Page Created)", p: 4000, c: "Facebook", s: 0, logs: [] },
        { id: 2, n: "Facebook (Fresh Profile)", p: 2500, c: "Facebook", s: 0, logs: [] },
        { id: 3, n: "Facebook (Random High-Act)", p: 5500, c: "Facebook", s: 0, logs: [] },
        { id: 4, n: "USA Facebook (0-30 Friends)", p: 7500, c: "Facebook", s: 0, logs: [] },
        { id: 5, n: "Instagram (0-5,000 Followers)", p: 12000, c: "Instagram", s: 0, logs: [] },
        { id: 6, n: "Instagram (Established)", p: 8500, c: "Instagram", s: 0, logs: [] },
        { id: 7, n: "Twitter (Foreign 🇺🇸🇬🇧🇮🇹)", p: 9500, c: "Twitter", s: 0, logs: [] },
        { id: 8, n: "Netflix Premium Logs", p: 3500, c: "Netflix", s: 0, logs: [] }
    ];

    function startAdminTimer() { adminTimer = setTimeout(() => { 
        if(prompt("Security PIN:") === adminPIN) { 
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('restock-item').innerHTML = items.map(i => `<option value="${i.id}">${i.n}</option>`).join('');
        }
    }, 3000); }
    function clearAdminTimer() { clearTimeout(adminTimer); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function applyRestock() {
        const id = document.getElementById('restock-item').value;
        const logText = document.getElementById('log-input').value.trim();
        const item = items.find(i => i.id == id);
        if(logText) {
            const newLogs = logText.split('\n').filter(l => l.trim().length > 3);
            item.logs = [...item.logs, ...newLogs];
            item.s = item.logs.length;
            renderItems(items);
            closeAdmin();
            alert("Restocked successfully!");
        }
    }

    function renderItems(data) {
        document.getElementById('market-grid').innerHTML = data.map(i => `
            <div class="card">
                <span style="color:${i.s > 0 ? '#00ff00' : '#ff4d4d'}; font-size:11px; font-weight:800;">
                    ${i.s > 0 ? 'INSTOCK: ' + i.s : 'SOLD OUT'}
                </span>
                <h3 style="margin:5px 0;">${i.n}</h3>
                <div class="price">₦${i.p.toLocaleString()}</div>
                <button class="buy-btn" onclick="buyItem(${i.id})" ${i.s === 0 ? 'disabled' : ''}>
                    ${i.s > 0 ? 'BUY NOW' : 'OUT OF STOCK'}
                </button>
            </div>`).join('');
    }

    function buyItem(id) {
        const item = items.find(i => i.id == id);
        if(balance < item.p) return alert("Low Balance! Please fund your wallet.");
        
        const log = item.logs.shift();
        item.s = item.logs.length;
        balance -= item.p;
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        
        myOrders.unshift({ name: item.n, log: log });
        updateOrdersUI();
        renderItems(items);
        alert("Purchase Successful! Check 'My Purchased Logs' below.");
    }

    function updateOrdersUI() {
        const list = document.getElementById('orders-list');
        list.innerHTML = myOrders.map(o => `
            <div class="order-item">
                <strong>${o.name}</strong><br>${o.log}
            </div>`).join('');
    }

    function handleLogin() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        setupCategories();
        renderItems(items);
    }

    function setupCategories() {
        const cats = ['All', ...new Set(items.map(i => i.c))];
        document.getElementById('cat-bar').innerHTML = cats.map(c => 
            `<div class="cat-btn ${c==='All'?'active':''}" onclick="filterShop('${c}', this)">${c}</div>`
        ).join('');
    }

    function filterShop(c, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderItems(c === 'All' ? items : items.filter(i => i.c === c));
    }

    function fundWallet() {
        const amt = prompt("Fund Amount (₦):");
        if(!amt) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: 'user@subbymarket.com',
            amount: amt * 100,
            callback: () => {
                balance += parseInt(amt);
                document.getElementById('bal-val').innerText = balance.toLocaleString();
            }
        }).openIframe();
    }
</script>
</body>
</html>
