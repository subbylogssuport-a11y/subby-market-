<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        /* AUTH CARD FIX */
        .auth-card { 
            background: #16161a; 
            border: 1px solid #333; 
            padding: 30px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            position: relative;
            z-index: 10; /* Ensures buttons are clickable */
        }
        
        h1 { color: #0070f3; margin-bottom: 25px; font-weight: 900; letter-spacing: 1px; }

        /* INPUTS */
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            background: #000; 
            border: 1px solid #333; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
        }
        input:focus { border-color: #0070f3; }

        /* BUTTONS */
        .btn-blue { 
            background: #0070f3; 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            margin-top: 10px;
            display: block;
        }

        .btn-outline { 
            background: #222; 
            color: #fff;
            margin-top: 12px;
        }

        .btn-recovery { 
            background: none; 
            border: none; 
            color: #0070f3; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600; 
            margin-top: 25px; 
            padding: 10px; 
            width: 100%; 
            display: block; 
        }
    </style>
</head>
<body>

<div class="auth-card" id="login-box">
    <h1>SUBBY LOGS</h1>
    
    <input type="text" id="login-u" placeholder="Username" autocomplete="off">
    <input type="password" id="login-p" placeholder="Password">
    
    <button class="btn-blue" onclick="processLogin()">LOGIN</button>
    
    <button class="btn-blue btn-outline" onclick="toggleAuth('signup')">Create Account</button>
    
    <button class="btn-recovery" onclick="openReset()">Forgot Password?</button>
</div>

<script>
    // Logic to handle login
    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        
        // This is your test user from the previous setup
        let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":0}}');
        
        if(users[u] && users[u].p === p) {
            alert("Success! Entering Market...");
            // Add your redirect logic here
        } else {
            alert("Invalid details. Try again.");
        }
    }

    function toggleAuth(type) {
        alert("Redirecting to " + type + " page...");
    }

    function openReset() {
        alert("Opening Account Recovery...");
    }
</script>

</body>
</html>
