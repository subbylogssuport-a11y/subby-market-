<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | OFFICIAL MARKET</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; }
        
        /* NAVBAR */
        .navbar { background: #16161a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        
        /* SIDEBAR */
        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; }
        .cat-item { padding: 12px; border-radius: 8px; cursor: pointer; color: #ccc; margin-bottom: 5px; font-size: 13px; border-left: 3px solid transparent; transition: 0.3s; }
        .cat-item:hover { background: #1a1a20; border-left: 3px solid #0070f3; color: #fff; }

        /* SUPPORT BOX */
        .support-box { margin-top: 30px; padding: 15px; background: rgba(0, 112, 243, 0.05); border-radius: 12px; border: 1px solid #222; }
        .support-link { display: block; color: #0070f3; font-size: 12px; text-decoration: none; margin-bottom: 12px; font-weight: bold; overflow-wrap: break-word; }

        /* PRODUCTS */
        .main-content { flex: 1; padding: 25px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 10px; padding: 15px; opacity: 0.8; }
        
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; margin-top: 10px; }
        .btn-disabled { background: #222; color: #555; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: not-allowed; font-weight: bold; text-transform: uppercase; margin-top: 15px; font-size: 11px; }
        
        .auth-nav-btn { background: #222; border: 1px solid #333; color: #0070f3; font-size: 12px; cursor: pointer; padding: 10px; border-radius: 8px; width: 48%; }
        .otp-display { background: #000; color: #ffcc00; font-size: 24px; padding: 10px; border-radius: 8px; margin: 10px 0; letter-spacing: 5px; text-align: center; font-family: monospace; }

        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>

        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <div style="margin-top:20px; display:flex; justify-content: space-between;">
            <button class="auth-nav-btn" onclick="toggleAuth('signup')">New Account</button>
            <button class="auth-nav-btn" onclick="openReset()">Forgot?</button>
        </div>
    </div>

        <h2 style="color:#0070f3;">Join Terminal</h2>
        <input type="text" id="reg-u" placeholder="Username">

        <button class="btn-blue" onclick="processSignup()">CREATE ACCOUNT</button>
        <button class="auth-nav-btn" style="width:100%; margin-top:10px;" onclick="toggleAuth('login')">Back</button>
    </div>
