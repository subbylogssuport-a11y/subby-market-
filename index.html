<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V67 SMART BOT</title>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #eee; min-height: 100vh; }

        /* PULSING BOT ICON */
        #ia-bubble { 
            position: fixed; bottom: 90px; right: 20px; width: 65px; height: 65px; 
            background: #000 url('https://i.ibb.co/6R5qXhP/space-robot.jpg') no-repeat center center;
            background-size: cover; border: 2px solid var(--primary); border-radius: 50%; 
            cursor: pointer; z-index: 9999; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 112, 243, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 112, 243, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 112, 243, 0); } }

        /* SMART BOT CHAT BOX */
        #bot-chat { position: fixed; bottom: 170px; right: 20px; width: 300px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 20px; display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bot-msg { font-size: 14px; line-height: 1.5; margin-bottom: 15px; }

        /* UI ELEMENTS */
        .navbar { background: #0a0b10; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 20px; cursor: pointer; }
        .bal-container { display: flex; align-items: center; gap: 10px; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 10px 15px; border-radius: 30px; font-weight: 900; color: var(--gold); }
        .topup-btn { background: var(--gold); color: #000; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: 900; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .grid { padding: 15px; display: grid; gap: 20px; padding-bottom: 120px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; }
        .auth-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .auth-input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<div id="ia-bubble" onclick="toggleBot()"></div>
<div id="bot-chat">
    <div class="bot-msg">🤖 <strong id="bot-greet">Hello!</strong><br><br>
    To fund your account, click the <strong style="color:var(--gold)">+</strong> button next to your balance.<br><br>
    Once funded, pick your logs and click <strong>PURCHASE</strong>. You will find them in <strong>MY LOGS</strong>.</div>
    <button class="auth-btn" style="padding:10px; font-size:12px;" onclick="window.open('https://wa.me/2348104565349')">MESSAGE ADMIN ON WHATSAPP</button>
</div>

<div id="login-gate" class="gate-container" style="position:fixed; inset:0; background:#000; z-index:3000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#111; border:1px solid var(--primary); padding:40px 30px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGS</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">ACCESS MARKET</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY LOGS</div>
        <div class="bal-container">
            <div class="bal-pill">₦<span id="bal-val">0</span></div>
            <button class="topup-btn" onclick="window.open('https://wa.me/2348104565349?text=I%20want%20to%20fund%20my%20wallet')">+</button>
        </div>
    </div>
    <div id="market-grid"></div>
</div>

<div id="admin-panel" class="overlay">
    <h2 style="color:var(--primary); margin-bottom:20px;">Admin</h2>
    <input id="adm-user" class="auth-input" placeholder="User Email">
    <input id="adm-amt" class="auth-input" placeholder="Amount ₦">
    <button class="auth-btn" onclick="admCredit()">CREDIT USER</button>
    <button class="auth-btn" style="background:#222; margin-top:20px;" onclick="closeAllOverlays()">EXIT</button>
</div>

<script>
    let currentUser = "";
    let balance = 0;

    const globalStock = [
        { id: 1, c: "FACEBOOK", n: "Random FB [NEWLY CREATED]", p: 1000, data: ["log:pass:2fa"] },
        { id: 4, c: "GOOGLE VOICE", n: "Premium Google Voice [USA]", p: 3500, data: [] }
    ];

    function toggleBot() {
        const chat = document.getElementById('bot-chat');
        chat.style.display = chat.style.display === 'block' ? 'none' : 'block';
        document.getElementById('bot-greet').innerText = "Hello, " + currentUser.split('@')[0] + "!";
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value.toLowerCase();
        if(!e) return alert("Enter email");
        currentUser = e;
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        renderMarket();
    }

    function renderMarket() {
        const grid = document.getElementById('market-grid');
        let h = "";
        const cats = [...new Set(globalStock.map(i => i.c))];
        cats.forEach(c => {
            h += `<div style="padding:10px 20px; font-size:12px; color:var(--gold); font-weight:900;">${c}</div><div class="grid">`;
            globalStock.filter(i => i.c === c).forEach(i => {
                const s = i.data.length;
                h += `<div class="card">
                    <span style="font-size:10px; color:${s>0?'#0f0':'#f00'}">● ${s>0?s+' IN STOCK':'OUT OF STOCK'}</span>
                    <h3>${i.n}</h3>
                    <h2 style="color:var(--primary);">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" ${s==0?'style="background:#333" disabled':''} onclick="buyItem(${i.id})">PURCHASE</button>
                </div>`;
            });
            h += `</div>`;
        });
        grid.innerHTML = h;
    }

    function openAdmin() { if(prompt("PIN") === "1710") document.getElementById('admin-panel').style.display = 'block'; }
    
    function admCredit() {
        const e = document.getElementById('adm-user').value.toLowerCase();
        const a = parseInt(document.getElementById('adm-amt').value);
        alert("Action completed for " + e);
    }

    function closeAllOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
</script>
</body>
</html>
