<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; }

        /* AUTH BOXES */
        #auth-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        
        input { width: 100%; padding: 16px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-outline { background: #222; margin-top: 12px; }
        .btn-recovery { background: none; border: none; color: #0070f3; cursor: pointer; font-size: 14px; margin-top: 25px; width: 100%; }

        /* MARKET INTERFACE */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom:20px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue btn-outline" onclick="toggleAuth('signup')">Create Account</button>
        <button class="btn-recovery" onclick="toggleAuth('forgot')">Forgot Password?</button>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2>JOIN US</h2>
        <input type="text" id="reg-u" placeholder="New Username">
        <input type="password" id="reg-p" placeholder="New Password">
        <button class="btn-blue" onclick="processSignup()">CREATE ACCOUNT</button>
        <button class="btn-recovery" onclick="toggleAuth('login')">Back to Login</button>
    </div>
</div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span></div>
    </div>
    <div class="product-grid" id="shop-grid">
        </div>
</div>

<script>
    let activeUser = null;
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":0}}');

    function toggleAuth(box) {
        document.getElementById('login-box').style.display = box === 'login' ? 'block' : 'none';
        document.getElementById('signup-box').style.display = box === 'signup' ? 'block' : 'none';
    }

    function processSignup() {
        const u = document.getElementById('reg-u').value.trim();
        const p = document.getElementById('reg-p').value.trim();
        if(!u || !p) return alert("Fill all fields");
        if(users[u]) return alert("Username taken");
        
        users[u] = {p: p, b: 0};
        localStorage.setItem('sys_users', JSON.stringify(users));
        alert("Account Created! Login now.");
        toggleAuth('login');
    }

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            loadProducts(); // Opens the market for real
        } else {
            alert("Wrong details!");
        }
    }

    function loadProducts() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = `
            <div class="product-card">
                <h3>Facebook with create profile</h3>
                <div style="color:#0070f3; font-size:22px; margin:10px 0;">₦8,000</div>
                <button class="btn-blue">Buy Now</button>
            </div>
            <div class="product-card">
                <h3>Facebook with already created Profile</h3>
                <div style="color:#0070f3; font-size:22px; margin:10px 0;">₦5,500</div>
                <button class="btn-blue">Buy Now</button>
            </div>
        `;
    }
</script>
</body>
</html>
