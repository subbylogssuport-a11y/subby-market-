<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; min-height: 100vh; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* INPUTS */
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: #0070f3; }

        /* BUTTONS */
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-outline { background: #222; margin-top: 10px; }
        .btn-recovery { background: none; border: none; color: #0070f3; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 20px; padding: 10px; width: 100%; display: block; }

        /* APP INTERFACE */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; cursor: pointer; }
        
        .sidebar { background: #16161a; padding: 15px; border-right: 1px solid #222; }
        .cat-title { font-size: 11px; color: #555; font-weight: bold; margin: 15px 0 5px 10px; text-transform: uppercase; }
        .cat-item { padding: 12px; border-radius: 8px; color: #ccc; margin-bottom: 4px; cursor: pointer; font-size: 13px; border-left: 3px solid transparent; }
        .active-cat { background: #1a1a20; border-left-color: #0070f3; color: #fff; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 15px; padding: 20px; }
        
        @media (max-width: 768px) { .sidebar { display: flex; overflow-x: auto; white-space: nowrap; border-right: none; border-bottom: 1px solid #222; } .cat-item { display: inline-block; margin-right: 10px; } .cat-title { display: none; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 25px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">Login to Market</button>
        <button class="btn-blue btn-outline" onclick="toggleAuth('signup')">Create Account</button>
        <button class="btn-recovery" onclick="openReset()">Forgot Password?</button>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2 style="color:#0070f3; margin-bottom:15px;">Join Us</h2>
        <input type="text" id="reg-u" placeholder="Set Username">
        <input type="password" id="reg-p" placeholder="Set Password">
        <button class="btn-blue" onclick="processSignup()">Create Account</button>
        <button class="btn-recovery" onclick="toggleAuth('login')">Back to Login</button>
    </div>

    <div class="auth-card" id="forgot-box" style="display:none;">
        <h2 style="color:#ffcc00; margin-bottom:10px;">Recovery</h2>
        <div id="otp-val" style="font-size:28px; color:#ffcc00; font-weight:bold; letter-spacing:5px; margin:15px 0;">000000</div>
        <input type="text" id="for-u" placeholder="Username">
        <input type="text" id="for-otp" placeholder="Enter Code">
        <input type="password" id="for-new-p" placeholder="New Password">
        <button class="btn-blue" style="background:#ffcc00; color:#000;" onclick="processReset()">Reset Password</button>
        <button class="btn-recovery" onclick="toggleAuth('login')">Cancel</button>
    </div>
</div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET
