<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V74 SECURE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* AUTH GATE */
        .auth-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 35px; border-radius: 25px; width: 100%; max-width: 380px; box-shadow: 0 10px 50px rgba(0,112,243,0.2); text-align: center; }
        input { width: 100%; padding: 16px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; text-align: center; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .link { color: var(--gold); font-size: 12px; cursor: pointer; margin-top: 15px; display: inline-block; }

        /* MAIN APP */
        #app { display: none; width: 100%; }
        .nav { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #0a0b10; position: sticky; top: 0; }
        .bal-pill { border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; color: var(--gold); font-weight: 900; }

        /* SMART AI BOT */
        #bot-container { position: fixed; bottom: 25px; right: 20px; z-index: 1000; display: none; }
        #ia-bubble { width: 60px; height: 60px; background: #111 url('https://cdn-icons-png.flaticon.com/512/4712/4712035.png') center/70% no-repeat; border: 2px solid var(--primary); border-radius: 50%; cursor: pointer; box-shadow: 0 5px 20px #000; }
        #bot-chat { position: absolute; bottom: 75px; right: 0; width: 280px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 20px; display: none; box-shadow: 0 10px 40px #000; }
        .bot-input { width: 100%; padding: 10px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div id="auth-gate" class="auth-gate">
    <div class="auth-card">
        <h2 id="title" style="color:var(--primary); margin-bottom:15px; letter-spacing: 2px;">SUBBY LOGS</h2>
        <p id="sub-title" style="font-size: 12px; color: #666; margin-bottom: 20px;">Please login to access your wallet</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="btn-txt">SIGN IN</button>
        <div>
            <span class="link" onclick="toggleAuth()" id="toggle-txt">New here? Create Account</span><br>
            <span class="link" onclick="resetPass()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="app">
    <div class="nav">
        <b style="color:var(--primary); font-size: 18px;">SUBBY LOGS</b>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="bal-pill">₦<span id="bal">0</span></div>
            <button onclick="logout()" style="color:#ff4d4d; background:none; border:none; font-weight:bold;">Exit</button>
        </div>
    </div>
    <div style="padding: 30px; text-align: center;">
        <h3 style="color: var(--gold);">Welcome Back!</h3>
        <p style="color: #666; margin-top: 10px;">Market is currently being updated...</p>
        <button class="btn" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="pay()">TOP UP WALLET ₦</button>
    </div>
</div>

<div id="bot-container">
    <div id="bot-chat">
        <div id="bot-msg" style="font-size: 13px; line-height: 1.5; color: #ccc;">
            🤖 <b>Subby AI:</b> I am your personal assistant. I can help you with wallet issues or log queries. Type your question below.
        </div>
        <input type="text" class="bot-input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') askAI(this.value)">
        <button class="btn" style="padding: 10px; font-size: 12px; background: #25D366;" onclick="window.open('https://wa.me/2348104565349')">WHATSAPP ADMIN</button>
    </div>
    <div id="ia-bubble" onclick="toggleBot()"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('btn-txt').innerText = isLogin ? "SIGN IN" : "SIGN UP";
        document.getElementById('toggle-txt').innerText = isLogin ? "New here? Create Account" : "Have an account? Sign In";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Fields cannot be empty");
        try { isLogin ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); }
        catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            document.getElementById('bot-container').style.display='block'; // AI appears now
            const id = user.email.replace(/\./g,'_');
            db.ref('users/'+id).on('value',s=>{
                document.getElementById('bal').innerText = (s.val()?.bal || 0).toLocaleString();
            });
        } else {
            document.getElementById('auth-gate').style.display='flex';
            document.getElementById('app').style.display='none';
            document.getElementById('bot-container').style.display='none'; // AI hides on logout
        }
    });

    function resetPass() {
        const e = document.getElementById('email').value;
        if(!e) return alert("Enter email first");
        auth.sendPasswordResetEmail(e).then(()=>alert("Reset link sent to your inbox!"));
    }

    function toggleBot() { 
        const c = document.getElementById('bot-chat');
        c.style.display = c.style.display === 'block' ? 'none' : 'block';
    }

    function askAI(val) {
        const msg = document.getElementById('bot-msg');
        if(val.toLowerCase().includes("balance")) msg.innerHTML = "🤖 <b>Subby AI:</b> Your balance is shown in the top right. ₦1,000 = $1 approx.";
        else if(val.toLowerCase().includes("buy")) msg.innerHTML = "🤖 <b>Subby AI:</b> Once you fund your wallet, items will appear in the market for instant purchase.";
        else msg.innerHTML = "🤖 <b>Subby AI:</b> Interesting question! For specific account issues, please use the WhatsApp button below.";
    }

    function pay() {
        let handler = PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: auth.currentUser.email,
            amount: 200000, // 2000 Naira example
            callback: function(res) {
                const id = auth.currentUser.email.replace(/\./g,'_');
                db.ref('users/'+id).once('value',s=>{
                    db.ref('users/'+id).update({ bal: (s.val()?.bal || 0) + 2000 });
                    alert("Wallet Funded Successfully!");
                });
            }
        });
        handler.openIframe();
    }

    function logout() { auth.signOut(); }
</script>
</body>
</html>
