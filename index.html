<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subby Logs - Official Marketplace</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: bold; color: #58a6ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .balance-card { background: #21262d; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #238636; }
        .balance-amount { font-size: 24px; font-weight: bold; color: #3fb950; }
        .btn-pay { background: #238636; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .item-list { text-align: left; margin-top: 20px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #21262d; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; }
        .buy-btn { background: #58a6ff; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        #login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="container">
        <div class="logo">Identity Verification</div>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Gmail Address">
        <button class="btn-pay" onclick="sendCode()">Send Code</button>
        <div id="otp-section" style="display:none; margin-top: 20px;">
            <input type="text" id="otp" placeholder="Enter 6-digit code">
            <button class="btn-pay" onclick="verifyCode()">Verify Access</button>
        </div>
    </div>
</div>

<div class="container" id="main-site" style="display:none;">
    <div class="logo">Subby Logs Official</div>
    
    <div class="balance-card">
        <div>Your Balance</div>
        <div class="balance-amount">₦<span id="balance">0</span></div>
        <button class="btn-pay" onclick="openPayment()">+</button>
    </div>

    <div class="item-list">
        <div class="item">
            <span>📘 Facebook Log (High Quality)</span>
            <span>₦5,000 <button class="buy-btn" onclick="buyLog('FB-LOG-9921', 5000)">Buy</button></span>
        </div>
        <div class="item">
            <span>📸 Instagram Log (Aged)</span>
            <span>₦3,500 <button class="buy-btn" onclick="buyLog('IG-LOG-4412', 3500)">Buy</button></span>
        </div>
    </div>
</div>

<script>
    let currentBalance = 0;
    let userEmail = "";
    const LIVE_KEY = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';

    function sendCode() {
        userEmail = document.getElementById('email').value;
        if(!userEmail) return alert("Enter a valid email");
        alert("Security Code: 123456");
        document.getElementById('otp-section').style.display = 'block';
    }

    function verifyCode() {
        const otp = document.getElementById('otp').value;
        if(otp === '123456') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        } else {
            alert("Incorrect code");
        }
    }

    function openPayment() {
        const amount = prompt("Enter amount to deposit (₦):", "1000");
        if (!amount || isNaN(amount)) return;

        let handler = PaystackPop.setup({
            key: LIVE_KEY,
            email: userEmail,
            amount: amount * 100,
            currency: 'NGN',
            callback: function(response) {
                currentBalance += parseInt(amount);
                document.getElementById('balance').innerText = currentBalance;
                alert("Deposit Successful! Reference: " + response.reference);
            },
            onClose: function() {
                alert("Payment Cancelled.");
            }
        });
        handler.openIframe();
    }

    function buyLog(logName, price) {
        if (currentBalance >= price) {
            currentBalance -= price;
            document.getElementById('balance').innerText = currentBalance;
            alert("SUCCESS! Log: " + logName + "\nUser: subby_admin\nPass: LogPass9922");
        } else {
            alert("Insufficient Balance. Please tap + to fund your wallet.");
        }
    }
</script>

</body>
</html>
