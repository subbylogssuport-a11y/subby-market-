        .btn-view { background: #d32f2f; color: #fff; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px; }

        .auth-link-btn:active { opacity: 0.6; }

        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }

        localStorage.setItem('sys_users', JSON.stringify(users));
        alert("Account Registered! Now Login.");
        toggleAuth('login');
    }

        } else { alert("Invalid Credentials!"); }
