<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | PREMIUM</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        /* Dope Gradient Background */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #000000); 
            color: #fff; 
            min-height: 100vh; 
        }
        
        /* Premium Navbar */
        .navbar { 
            background: rgba(22, 22, 26, 0.8); 
            backdrop-filter: blur(10px);
            padding: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .brand { font-size: 20px; font-weight: 900; letter-spacing: -1px; color: #0070f3; }
        .bal-pill { 
            background: #111; 
            border: 1px solid #0070f3; 
            padding: 6px 14px; 
            border-radius: 30px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            box-shadow: 0 0 15px rgba(0, 112, 243, 0.2);
        }
        .plus-btn { 
            background: #0070f3; 
            color: #fff; 
            border: none; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Category Duplex Layout */
        .categories-nav { 
            padding: 20px 15px; 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            scrollbar-width: none; 
        }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: #16161a; 
            color: #888; 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: 1px solid #222; 
            white-space: nowrap; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .cat-btn.active { 
            background: #0070f3; 
            color: #fff; 
            border-color: #0070f3; 
            box-shadow: 0 5px 15px rgba(0, 112, 243, 0.4);
        }

        /* Product Cards */
        .grid { padding: 15px; }
        .card { 
            background: linear-gradient(145deg, #16161a, #0c0c0e); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,112,243,0.05) 0%, transparent 70%);
        }
        .stock-indicator { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card h3 { font-size: 17px; margin-bottom: 10px; z-index: 1; position: relative; }
        .price-tag { font-size: 22px; font-weight: 800; color: #0070f3; margin-bottom: 15px; }
        .buy-btn { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: #fff; 
            color: #000; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .buy-btn:active { transform: scale(0.96); }
        .buy-btn.out { background: #222; color: #555; cursor: not-allowed; }

        /* Support Box */
        .footer-info { padding: 20px; text-align: center; }
        .contact-link { color: #888; text-decoration: none; font-size: 12px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">SUBBY MARKET</div>
        <div class="bal-pill">
            <span>₦<span id="bal-val">0</span></span>
            <button class="plus-btn" onclick="openDeposit()">+</button>
        </div>
    </div>

    <div class="categories-nav">
        <div class="cat-btn active" onclick="filterData('All', this)">All Logs</div>
        <div class="cat-btn" onclick="filterData('Facebook', this)">Facebook</div>
        <div class="cat-btn" onclick="filterData('Audio', this)">Audio Categories</div>
        <div class="cat-btn" onclick="filterData('Social', this)">Aged Accounts</div>
        <div class="cat-btn" onclick="filterData('Text', this)">TextNow / Free</div>
    </div>

    <div class="grid" id="main-grid"></div>

    <div class="footer-info">
        <a href="mailto:subbylogssuport@gmail.com" class="contact-link">📧 subbylogssuport@gmail.com</a>
        <p style="color: #333; font-size: 10px; margin-top: 20px;">SUBBY MARKET OFFICIAL v3.0</p>
    </div>

<script>
    let currentBalance = 0;
    const inventory = [
        { name: "Facebook (Create Profile)", price: 8000, stock: 12, cat: "Facebook" },
        { name: "Facebook (Existing Profile)", price: 5500, stock: 5, cat: "Facebook" },
        { name: "Spotify Premium Log", price: 3500, stock: 10, cat: "Audio" },
        { name: "Apple Music Log", price: 4000, stock: 8, cat: "Audio" },
        { name: "Audiomack Premium", price: 2500, stock: 15, cat: "Audio" },
        { name: "Aged Twitter (2012)", price: 12000, stock: 3, cat: "Social" },
        { name: "Instagram HD Log", price: 9000, stock: 7, cat: "Social" },
        { name: "TextNow USA", price: 5000, stock: 0, cat: "Text" },
        { name: "TextPlus Canada", price: 5000, stock: 20, cat: "Text" },
        { name: "Telegram Premium", price: 7000, stock: 6, cat: "Social" }
    ];

    function filterData(category, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderItems(category === 'All' ? inventory : inventory.filter(i => i.cat === category));
    }

    function renderItems(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = data.map(i => `
            <div class="card">
                <span class="stock-indicator" style="color:${i.stock > 0 ? '#00c853' : '#ff4d4d'}">
                    ${i.stock > 0 ? 'In Stock ('+i.stock+')' : 'Sold Out'}
                </span>
                <h3>${i.name}</h3>
                <div class="price-tag">₦${i.price.toLocaleString()}</div>
                ${i.stock > 0 ? 
                    `<button class="buy-btn" onclick="buyItem('${i.name}', ${i.price})">PURCHASE NOW</button>` : 
                    `<button class="buy-btn out" disabled>UNAVAILABLE</button>`}
            </div>
        `).join('');
    }

    function openDeposit() {
        const amt = prompt("Enter amount to fund (₦):");
        if(!amt || isNaN(amt)) return;

        let handler = PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: 'admin@subbymarket.com',
            amount: amt * 100,
            currency: 'NGN',
            callback: function(res) {
                currentBalance += parseInt(amt);
                document.getElementById('bal-val').innerText = currentBalance.toLocaleString();
                alert("Wallet funded: ₦" + amt);
            }
        });
        handler.openIframe();
    }

    function buyItem(name, cost) {
        if(currentBalance >= cost) {
            currentBalance -= cost;
            document.getElementById('bal-val').innerText = currentBalance.toLocaleString();
            alert("Order Success: " + name + "\nMessage Admin to receive details.");
        } else {
            alert("Balance too low. Please click the (+) to fund wallet.");
        }
    }

    renderItems(inventory);
</script>
</body>
</html>
