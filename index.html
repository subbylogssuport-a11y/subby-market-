<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V10 FIXED AUTH</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        /* --- ALL STYLES FROM V9 HELD HERE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #1a1a2e, #000000); color: #eee; min-height: 100vh; }
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #222; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 14px; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .gate-link { color: #888; font-size: 12px; margin-top: 12px; display: inline-block; cursor: pointer; }
        .code-display { background: #111; border: 1px dashed #0070f3; padding: 10px; border-radius: 10px; margin: 10px 0; color: #0070f3; font-weight: 800; font-size: 20px; letter-spacing: 2px; }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; padding: 20px; overflow-y: auto; }
        .admin-box { background:#16161a; padding:25px; border-radius:20px; max-width:400px; margin:20px auto; border:1px solid #0070f3; }
        .tab-btn { background: #222; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: #0070f3; }
        #main-app { display: none; }
        .navbar { background: rgba(22, 22, 26, 0.85); backdrop-filter: blur(12px); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 20px; font-weight: 900; color: #0070f3; cursor: pointer; }
        .bal-pill { background: #111; border: 1px solid #0070f3; padding: 6px 14px; border-radius: 30px; font-weight: bold; }
        .categories-nav { padding: 15px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #16161a; color: #888; padding: 10px 18px; border-radius: 12px; border: 1px solid #222; white-space: nowrap; font-size: 13px; font-weight: 600; cursor: pointer; }
        .cat-btn.active { background: #0070f3; color: #fff; border-color: #0070f3; }
        .grid { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { background: linear-gradient(145deg, #16161a, #0c0c0e); border: 1px solid #222; border-radius: 20px; padding: 22px; }
        .price { font-size: 24px; font-weight: 900; color: #0070f3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #0070f3; color: #fff; font-weight: 800; cursor: pointer; }
        .orders-section { padding: 15px; background: #0a0a0a; margin: 20px 15px; border-radius: 15px; border: 1px dashed #333; }
        .order-item { background: #111; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 4px solid #0070f3; position: relative; }
        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .mini-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; color: #fff; }
        .copy-btn { background: #0070f3; }
        .report-btn { background: #444; }
        .logout-btn { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 8px; font-size: 11px; margin-top: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-gate" class="gate-container">
        <div class="auth-card">
            <h2 style="color:#0070f3; margin-bottom:20px;">SUBBY LOGIN</h2>
            <input type="email" id="log-email" class="auth-input" placeholder="Email">
            <input type="password" id="log-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
            <div class="gate-link" onclick="showGate('reg-gate')">No account? <span style="color:#0070f3;">Create Account</span></div>
            <div class="gate-link" onclick="showGate('forgot-gate')"><br>Forgot Password?</div>
        </div>
    </div>

    <div id="reg-gate" class="gate-container" style="display:none;">
        <div class="auth-card">
            <h2 style="color:#0070f3; margin-bottom:20px;">JOIN SUBBY</h2>
            <input type="email" id="reg-email" class="auth-input" placeholder="Enter Email">
            <input type="password" id="reg-pass" class="auth-input" placeholder="Create Password">
            <button class="auth-btn" onclick="handleRegister()">Get Code</button>
            <div id="reg-code-box" style="display:none;">
                <div class="code-display" id="display-reg-code"></div>
                <button class="mini-btn copy-btn" onclick="copyValue('display-reg-code')">Copy Code</button>
                <div class="gate-link" onclick="showGate('verify-gate')" style="color:#0070f3; font-weight:bold; font-size:14px; margin-top:15px;">I've Copied It. Proceed →</div>
            </div>
            <div class="gate-link" onclick="showGate('login-gate')">Back to Login</div>
        </div>
    </div>

    <div id="verify-gate" class="gate-container" style="display:none;">
        <div class="auth-card">
            <h2 style="color:#0070f3; margin-bottom:10px;">VERIFY</h2>
            <input type="text" id="verify-code" class="auth-input" style="text-align:center; font-size:24px;" placeholder="Paste Code Here" maxlength="6">
            <button class="auth-btn" onclick="confirmVerify()">Verify & Register</button>
        </div>
    </div>

    <div id="forgot-gate" class="gate-container" style="display:none;">
        <div class="auth-card">
            <h2 style="color:#0070f3; margin-bottom:10px;">RESET</h2>
            <input type="email" id="forgot-email" class="auth-input" placeholder="Email">
            <button class="auth-btn" onclick="handleForgot()">Get Code</button>
            <div id="forgot-code-box" style="display:none;">
                <div class="code-display" id="display-forgot-code"></div>
                <button class="mini-btn copy-btn" onclick="copyValue('display-forgot-code')">Copy Code</button>
            </div>
            <div class="gate-link" onclick="showGate('login-gate')">Back</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h3 style="color:#0070f3; margin-bottom:15px; text-align:center;">WAREHOUSE</h3>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="tab-btn active" id="tab-edit" onclick="setAdminTab('edit')">Stock/Price</button>
                <button class="tab-btn" id="tab-add" onclick="setAdminTab('add')">+ New Card</button>
            </div>
            <div id="admin-edit-sec">
                <select id="restock-item" class="auth-input" onchange="loadCurrentData()"></select>
                <input type="number" id="edit-price" class="auth-input" placeholder="Price">
                <textarea id="log-input" class="auth-input" style="height:80px;" placeholder="Paste Logs"></textarea>
                <button class="auth-btn" onclick="saveAdminChanges()">Save Changes</button>
                <button class="auth-btn" style="background:#ff4d4d; margin-top:10px;" onclick="deleteCardType()">Delete Card Type</button>
            </div>
            <div id="admin-add-sec" style="display:none;">
                <input type="text" id="new-name" class="auth-input" placeholder="Card Name">
                <input type="number" id="new-price" class="auth-input" placeholder="Price">
                <input type="text" id="new-cat" class="auth-input" placeholder="Category">
                <button class="auth-btn" style="background:#00c853;" onclick="addNewCardType()">Create Card</button>
            </div>
            <button class="auth-btn" style="background:#333; margin-top:20px;" onclick="closeAdmin()">Close</button>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div class="brand" onmousedown="startAdminTimer()" ontouchstart="startAdminTimer()">SUBBY MARKET</div>
            <div class="bal-pill">₦<span id="bal-val">0</span> <span style="cursor:pointer;" onclick="fundWallet()">+</span></div>
        </div>
        <div class="categories-nav" id="cat-bar"></div>
        <div class="grid" id="market-grid"></div>
        <div class="orders-section">
            <h4 style="color:#0070f3;">My Purchased Logs</h4>
            <div id="orders-list"></div>
            <button class="logout-btn" onclick="handleLogout()">Logout Account</button>
        </div>
    </div>

<script>
    let currentUser = null, balance = 0, myOrders = [];
    let tempUserData = {}, generatedCode = "";
    const SUPPORT_EMAIL = "subbylogssuport@gmail.com";

    const defaultItems = [{ id: 1, n: "Random Country FB (0-30 friend) 2023", p: 5240, c: "Facebook", s: 0, logs: [] }];
    let items = JSON.parse(localStorage.getItem('subby_inventory')) || defaultItems;

    function saveAll() {
        localStorage.setItem('subby_inventory', JSON.stringify(items));
        if (currentUser) {
            localStorage.setItem(`data_${currentUser}`, JSON.stringify({ balance, myOrders }));
        }
    }

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!email || !pass) return alert("Fill all fields");
        generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
        tempUserData = { email, pass };
        document.getElementById('display-reg-code').innerText = generatedCode;
        document.getElementById('reg-code-box').style.display = 'block';
    }

    function confirmVerify() {
        const input = document.getElementById('verify-code').value.trim();
        if(input === generatedCode) {
            localStorage.setItem(`user_${tempUserData.email}`, tempUserData.pass);
            alert("Registered! Now enter your details on the login page.");
            location.reload(); 
        } else { alert("Wrong Code!"); }
    }

    function handleLogin() {
        const email = document.getElementById('log-email').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value.trim();
        const storedPass = localStorage.getItem(`user_${email}`);

        if(storedPass && storedPass === pass) {
            currentUser = email;
            const userData = JSON.parse(localStorage.getItem(`data_${email}`)) || { balance: 0, myOrders: [] };
            balance = userData.balance;
            myOrders = userData.myOrders;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            updateOrdersUI(); setupCategories(); renderItems(items);
        } else { 
            alert("Invalid Email or Password! Make sure you registered correctly."); 
        }
    }

    function handleForgot() {
        const email = document.getElementById('forgot-email').value.trim().toLowerCase();
        const exists = localStorage.getItem(`user_${email}`);
        if(exists) {
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('display-forgot-code').innerText = generatedCode;
            document.getElementById('forgot-code-box').style.display = 'block';
            const newP = prompt("Enter New Password:");
            if(newP) { localStorage.setItem(`user_${email}`, newP.trim()); alert("Password Updated!"); showGate('login-gate'); }
        } else { alert("User not found!"); }
    }

    function copyValue(id) {
        const val = document.getElementById(id).innerText;
        navigator.clipboard.writeText(val).then(() => alert("Code Copied!"));
    }

    // --- REST OF ADMIN & MARKET LOGIC (V9) ---
    function startAdminTimer() { setTimeout(() => { if(prompt("PIN:") === "1234") document.getElementById('admin-panel').style.display='block'; updateAdminSelect(); }, 3000); }
    function handleLogout() { saveAll(); location.reload(); }
    function updateAdminSelect() { document.getElementById('restock-item').innerHTML = items.map(i => `<option value="${i.id}">${i.n}</option>`).join(''); loadCurrentData(); }
    function setAdminTab(tab) { document.getElementById('admin-edit-sec').style.display = tab === 'edit' ? 'block' : 'none'; document.getElementById('admin-add-sec').style.display = tab === 'add' ? 'block' : 'none'; }
    function addNewCardType() { const n=document.getElementById('new-name').value, p=parseInt(document.getElementById('new-price').value), c=document.getElementById('new-cat').value; if(n && p && c) { items.push({id:Date.now(), n, p, c, s:0, logs:[]}); saveAll(); updateAdminSelect(); renderItems(items); setupCategories(); } }
    function deleteCardType() { if(confirm("Delete?")) { items = items.filter(i => i.id != document.getElementById('restock-item').value); saveAll(); updateAdminSelect(); renderItems(items); setupCategories(); } }
    function loadCurrentData() { const item = items.find(i => i.id == document.getElementById('restock-item').value); if(item) document.getElementById('edit-price').value = item.p; }
    function saveAdminChanges() { const item = items.find(i => i.id == document.getElementById('restock-item').value); const logT = document.getElementById('log-input').value.trim(); if(logT) { const newL = logT.split('\n').filter(l => l.trim().length > 3); item.logs = [...item.logs, ...newL]; item.s = item.logs.length; } item.p = parseInt(document.getElementById('edit-price').value); saveAll(); renderItems(items); alert("Saved!"); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function renderItems(data) { document.getElementById('market-grid').innerHTML = data.map(i => `<div class="card"><span style="color:${i.s > 0 ? '#00ff00' : '#ff4d4d'}; font-size:11px; font-weight:800;">${i.s > 0 ? 'AVAILABLE: ' + i.s : 'SOLD OUT'}</span><h3 style="margin:5px 0;">${i.n}</h3><div class="price">₦${i.p.toLocaleString()}</div><button class="buy-btn" onclick="buyItem(${i.id})" ${i.s === 0 ? 'disabled' : ''}>Buy Now</button></div>`).join(''); }
    function buyItem(id) { const item = items.find(i => i.id == id); if(balance < item.p) return alert("Low Balance!"); const log = item.logs.shift(); item.s = item.logs.length; balance -= item.p; document.getElementById('bal-val').innerText = balance.toLocaleString(); myOrders.unshift({ name: item.n, log: log }); saveAll(); updateOrdersUI(); renderItems(items); }
    function updateOrdersUI() { document.getElementById('orders-list').innerHTML = myOrders.map((o) => `<div class="order-item"><strong>${o.name}</strong><br><p style="font-size:11px; color:#ccc;">${o.log}</p><div class="action-btns"><button class="mini-btn copy-btn" onclick="navigator.clipboard.writeText('${o.log}').then(()=>alert('Copied!'))">COPY LOG</button><button class="mini-btn report-btn" onclick="window.location.href='mailto:${SUPPORT_EMAIL}?subject=Issue&body=${o.log}'">REPORT</button></div></div>`).join(''); }
    function setupCategories() { const cats = ['All', ...new Set(items.map(i => i.c))]; document.getElementById('cat-bar').innerHTML = cats.map(c => `<div class="cat-btn ${c==='All'?'active':''}" onclick="filterShop('${c}', this)">${c}</div>`).join(''); }
    function filterShop(c, btn) { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderItems(c === 'All' ? items : items.filter(i => i.c === c)); }
    function fundWallet() { const amt = prompt("Amount (₦):"); if(amt) { PaystackPop.setup({ key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661', email: currentUser, amount: amt * 100, callback: () => { balance += parseInt(amt); document.getElementById('bal-val').innerText = balance.toLocaleString(); saveAll(); } }).openIframe(); } }
</script>
</body>
</html>
