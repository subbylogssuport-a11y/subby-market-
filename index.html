<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; overflow-x: hidden; }

        /* LOGIN BOX STYLING */
        #auth-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-outline { background: #222; margin-top: 12px; }

        /* MARKET STYLING */
        #main-site { display: none; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; cursor: pointer; }
        .product-grid { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 20px; padding: 25px; }
        .price { color: #0070f3; font-size: 24px; font-weight: bold; margin: 10px 0; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom:20px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue btn-outline" onclick="alert('Account creation enabled. Try logging in.')">Create Account</button>
    </div>
</div>

<div id="main-site">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span></div>
    </div>
    <div class="product-grid" id="shop-grid">
        </div>
</div>

<div id="admin-panel">
    <div class="auth-card" style="margin: auto;">
        <h2>ADMIN UPLOAD</h2>
        <select id="admin-cat" style="width:100%; padding:10px; margin:10px 0;">
            <option value="fb_create">Facebook with create profile</option>
            <option value="fb_already">Facebook with already created Profile</option>
        </select>
        <textarea id="admin-logs" style="width:100%; height:100px; background:#000; color:#fff; padding:10px;" placeholder="user:pass"></textarea>
        <button class="btn-blue" onclick="saveLogs()">UPLOAD STOCK</button>
        <button class="btn-blue btn-outline" onclick="hideAdmin()">EXIT</button>
    </div>
</div>

<script>
    let activeUser = null;
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{"fb_create":[],"fb_already":[]}');
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":10000}}');

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            renderShop();
        } else { alert("Wrong details!"); }
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        const items = [
            { id: 'fb_create', name: 'Facebook with create profile', price: 8000 },
            { id: 'fb_already', name: 'Facebook with already created Profile', price: 5500 }
        ];
        grid.innerHTML = '';
        items.forEach(item => {
            const stock = inventory[item.id].length;
            grid.innerHTML += `
                <div class="product-card">
                    <div style="font-size:12px; color:${stock > 0 ? '#0070f3' : 'red'}">Stock: ${stock}</div>
                    <h3 style="margin-top:5px;">${item.name}</h3>
                    <div class="price">₦${item.price.toLocaleString()}</div>
                    <button class="btn-blue" onclick="buyLog('${item.id}', ${item.price})">${stock > 0 ? 'Buy Now' : 'Out of Stock'}</button>
                </div>`;
        });
    }

    function buyLog(id, price) {
        if(users[activeUser].b < price) return alert("Low balance!");
        const log = inventory[id].shift();
        users[activeUser].b -= price;
        localStorage.setItem('sys_users', JSON.stringify(users));
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        document.getElementById('bal').innerText = users[activeUser].b.toLocaleString();
        alert("PURCHASE SUCCESS!\n\nDetails: " + log);
        renderShop();
    }

    let clicks = 0;
    function adminClick() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("Admin Key:") === "SubbyAdmin2026") document.getElementById('admin-panel').style.display='flex';
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    }

    function saveLogs() {
        const cat = document.getElementById('admin-cat').value;
        const logData = document.getElementById('admin-logs').value.trim();
        if(!logData) return;
        inventory[cat].push(logData);
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        alert("Stock Added!");
        document.getElementById('admin-logs').value = '';
        renderShop();
    }

    function hideAdmin() { document.getElementById('admin-panel').style.display='none'; }
</script>
</body>
</html>
