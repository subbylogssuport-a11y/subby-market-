<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; }

        /* Login/Signup Styling */
        #auth-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; padding: 15px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #0070f3; margin-bottom: 20px; font-weight: 900; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-dark { background: #222; margin-top: 10px; }

        /* Market Layout */
        #main-site { display: none; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .product-list { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: #16161a; border: 1px solid #262626; padding: 15px; border-radius: 12px; }
        .card h3 { font-size: 15px; margin: 5px 0; }
        .price { color: #0070f3; font-weight: bold; font-size: 18px; }
        .stock { font-size: 10px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card" id="login-box">
        <h1>SUBBY LOGS</h1>
        <input type="text" id="l-u" placeholder="Username">
        <input type="password" id="l-p" placeholder="Password">
        <button class="btn-blue" onclick="doLogin()">LOGIN</button>
        <button class="btn-blue btn-dark" onclick="alert('Signup active. Use Pelumi/123')">Create Account</button>
    </div>
</div>

<div id="main-site">
    <div class="navbar">
        <b style="color:#0070f3;">SUBBY MARKET</b>
        <b>₦<span id="bal">0</span></b>
    </div>
    <div class="product-list" id="shop-grid">
        </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":50000}}');

    function doLogin() {
        const u = document.getElementById('l-u').value.trim();
        const p = document.getElementById('l-p').value.trim();
        if(users[u] && users[u].p === p) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            renderShop();
        } else { alert("Login failed!"); }
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        // ALL YOUR REQUESTED CATEGORIES
        const cats = [
            { n: "Facebook with create profile", p: 8000 },
            { n: "Facebook with already created profile", p: 5500 },
            { n: "Aged Facebook", p: 10000 },
            { n: "Newly created Facebook", p: 3000 },
            { n: "Random Facebook", p: 2500 },
            { n: "Instagram", p: 4000 },
            { n: "Aged Instagram", p: 8500 },
            { n: "Twitter", p: 3500 },
            { n: "Aged Twitter", p: 7000 },
            { n: "Twitter with 50-100 followers", p: 12000 },
            { n: "USA TextPlus", p: 5000 },
            { n: "Canada TextPlus", p: 5000 }
        ];

        grid.innerHTML = '';
        cats.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <div class="stock">STOCK: 0</div>
                    <h3>${item.n}</h3>
                    <div class="price">₦${item.p.toLocaleString()}</div>
                    <button class="btn-blue" style="padding:10px; font-size:12px;">Buy Now</button>
                </div>`;
        });
    }
</script>
</body>
</html>
