<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | ADMIN SECURE</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #1a1a2e, #000000); color: #eee; min-height: 100vh; }

        /* --- HIDDEN ADMIN PANEL --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; padding: 20px; overflow-y: auto; }
        .admin-box { background: #16161a; border: 1px solid #0070f3; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .admin-title { color: #0070f3; margin-bottom: 15px; font-weight: 900; text-align: center; }
        select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        
        /* --- AUTH & SHOP STYLES (Existing) --- */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #222; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        #main-app { display: none; }
        .navbar { background: rgba(22, 22, 26, 0.85); backdrop-filter: blur(12px); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 20px; font-weight: 900; color: #0070f3; cursor: pointer; user-select: none; }
        .bal-pill { background: #111; border: 1px solid #0070f3; padding: 6px 14px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        .categories-nav { padding: 20px 15px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #16161a; color: #888; padding: 10px 18px; border-radius: 12px; border: 1px solid #222; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; }
        .cat-btn.active { background: #0070f3; color: #fff; border-color: #0070f3; }

        .grid { padding: 15px; }
        .card { background: linear-gradient(145deg, #16161a, #0c0c0e); border: 1px solid #222; border-radius: 20px; padding: 22px; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 900; color: #0070f3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #0070f3; color: #fff; font-weight: 800; cursor: pointer; }
        .buy-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="admin-box">
            <h3 class="admin-title">RESTOCK CENTRE</h3>
            <label>Select Item to Restock:</label>
            <select id="restock-item"></select>
            <label>New Stock Quantity:</label>
            <input type="number" id="restock-qty" class="auth-input" placeholder="Amount">
            <button class="auth-btn" onclick="applyRestock()">Apply Restock</button>
            <button class="auth-btn" style="background:#333; margin-top:10px;" onclick="closeAdmin()">Close</button>
        </div>
    </div>

    <div id="auth-gate">
        <div class="auth-card" id="login-form">
            <h2>Login</h2>
            <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="log-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div class="brand" onmousedown="startAdminTimer()" onmouseup="clearAdminTimer()" ontouchstart="startAdminTimer()" ontouchend="clearAdminTimer()">SUBBY MARKET</div>
            <div class="bal-pill">₦<span id="bal-val">0</span> <button class="plus-btn" style="background:transparent; border:none; color:#0070f3; font-weight:bold; cursor:pointer;" onclick="fundWallet()">+</button></div>
        </div>

        <div class="categories-nav" id="cat-bar"></div>
        <div class="grid" id="market-grid"></div>
    </div>

<script>
    let balance = 0, adminTimer, adminPIN = "1234"; 

    // YOUR FULL INVENTORY LIST
    const items = [
        { id: 1, n: "Facebook (Aged Profile)", p: 4000, c: "Facebook", s: 0 },
        { id: 2, n: "Facebook (Fresh Profile)", p: 2500, c: "Facebook", s: 0 },
        { id: 3, n: "USA Facebook (Targeted)", p: 7500, c: "Facebook", s: 0 },
        { id: 4, n: "Instagram (5k Followers)", p: 12000, c: "Instagram", s: 0 },
        { id: 5, n: "Foreign Twitter 🇺🇸", p: 9500, c: "Twitter", s: 0 },
        { id: 6, n: "Netflix Premium Logs", p: 4500, c: "Netflix", s: 0 }
    ];

    // --- ADMIN HIDDEN LOGIC ---
    function startAdminTimer() { adminTimer = setTimeout(() => { 
        let pass = prompt("Enter Admin Security PIN:");
        if(pass === adminPIN) { 
            document.getElementById('admin-panel').style.display = 'flex';
            loadAdminList();
        }
    }, 3000); }
    function clearAdminTimer() { clearTimeout(adminTimer); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function loadAdminList() {
        const sel = document.getElementById('restock-item');
        sel.innerHTML = items.map(i => `<option value="${i.id}">${i.n}</option>`).join('');
    }

    function applyRestock() {
        const id = document.getElementById('restock-item').value;
        const qty = document.getElementById('restock-qty').value;
        const item = items.find(i => i.id == id);
        if(item) {
            item.s = parseInt(qty);
            alert(`${item.n} restocked to ${qty}`);
            renderItems(items);
            closeAdmin();
        }
    }

    // --- MAIN APP LOGIC ---
    function renderItems(data) {
        document.getElementById('market-grid').innerHTML = data.map(i => `
            <div class="card">
                <span style="color:${i.s > 0 ? '#00ff00' : '#ff4d4d'}; font-size:10px; font-weight:800;">
                    ${i.s > 0 ? 'AVAILABLE: ' + i.s : 'SOLD OUT'}
                </span>
                <h3>${i.n}</h3>
                <div class="price">₦${i.p.toLocaleString()}</div>
                <button class="buy-btn" ${i.s === 0 ? 'disabled' : ''}>
                    ${i.s > 0 ? 'PURCHASE' : 'UNAVAILABLE'}
                </button>
            </div>`).join('');
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value;
        const p = document.getElementById('log-pass').value;
        if(e && p) { 
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderItems(items);
            setupCategories();
        }
    }

    function setupCategories() {
        const cats = ['All', ...new Set(items.map(i => i.c))];
        document.getElementById('cat-bar').innerHTML = cats.map(c => 
            `<div class="cat-btn ${c==='All'?'active':''}" onclick="filterShop('${c}', this)">${c}</div>`
        ).join('');
    }

    function filterShop(c, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderItems(c === 'All' ? items : items.filter(i => i.c === c));
    }

    function fundWallet() {
        const amt = prompt("Amount to fund (₦):");
        if(!amt) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: 'user@subbymarket.com',
            amount: amt * 100,
            callback: () => {
                balance += parseInt(amt);
                document.getElementById('bal-val').innerText = balance.toLocaleString();
            }
        }).openIframe();
    }
</script>
</body>
</html>
