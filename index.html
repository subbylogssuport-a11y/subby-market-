<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V82 PLATINUM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --whatsapp: #25d366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; overflow-x: hidden; }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-ui { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; }
        input, textarea { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .nav { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .log-item { background: #16171d; padding: 20px; border-radius: 20px; border: 1px solid #222; margin: 15px; }
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0; }
        .qty-btn { background: #333; color: #fff; border: none; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; }
        #bot-window { position: fixed; bottom: 85px; right: 20px; width: 300px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 15px; display: none; z-index: 2000; box-shadow: 0 10px 30px #000; }
        #chat-logs { height: 220px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; scroll-behavior: smooth; }
        .typing { font-size: 11px; color: var(--primary); margin-bottom: 10px; display: none; font-style: italic; }
        .msg-ai { background: #222; padding: 10px; border-radius: 12px; margin-bottom: 8px; color: #fff; border-left: 3px solid var(--primary); }
        .msg-user { background: var(--primary); padding: 10px; border-radius: 12px; margin-bottom: 8px; color: #fff; text-align: right; margin-left: 20%; }
        .support-link { color: var(--gold); text-decoration: underline; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-gate" class="overlay">
    <div class="card-ui">
        <h2 id="atitle" style="color:var(--primary); margin-bottom:15px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="abtn">SIGN IN</button>
        <p onclick="toggleAuth()" style="color:var(--gold); font-size:12px; margin-top:15px; cursor:pointer;" id="atog">New? Create Account</p>
        <p onclick="forgotPass()" style="color:#666; font-size:11px; margin-top:10px; cursor:pointer;">Forgot Password?</p>
    </div>
</div>

<div id="admin-gate" class="overlay" style="display:none; z-index:10000;">
    <div class="card-ui" style="max-height: 90vh; overflow-y: auto;">
        <h2 style="color:var(--gold)">ADMIN PANEL</h2>
        <div style="border: 1px solid #333; padding: 10px; border-radius: 15px; margin-bottom: 15px;">
            <p style="font-size: 12px; color: var(--primary);">SEND MONEY TO USER</p>
            <input id="adm-mail" placeholder="User Gmail">
            <input id="adm-amt" placeholder="Amount ₦" type="number">
            <button class="btn" onclick="adminSendMoney()">CONFIRM TRANSFER</button>
        </div>
        <div style="border: 1px solid #333; padding: 10px; border-radius: 15px;">
            <p style="font-size: 12px; color: var(--gold);">UPLOAD NEW STOCK</p>
            <input id="log-name" placeholder="Item Name">
            <input id="log-price" placeholder="Price ₦" type="number">
            <textarea id="log-data" placeholder="Paste logins (one per line)"></textarea>
            <button class="btn" style="background:var(--gold); color:#000" onclick="adminUpload()">UPLOAD LOGS</button>
        </div>
        <button class="btn" style="background:#222; margin-top:10px;" onclick="closeAdmin()">CLOSE ADMIN</button>
    </div>
</div>

<div id="support-overlay" class="overlay" style="display:none; z-index:9500;">
    <div class="card-ui">
        <h2 style="color:var(--gold); margin-bottom:20px;">CONTACT SUPPORT</h2>
        <button class="btn" style="background:var(--whatsapp)" onclick="window.open('https://wa.me/2347048141378')">WHATSAPP ADMIN</button>
        <button class="btn" style="background:#fff; color:#000" onclick="window.open('mailto:subbylogssuport@gmail.com')">EMAIL SUPPORT</button>
        <button class="btn" style="background:#222" onclick="document.getElementById('support-overlay').style.display='none'">BACK TO APP</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <b style="color:var(--primary)" ondblclick="checkAdmin()">SUBBY LOGS</b>
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="color:var(--gold); font-weight:900;">₦<span id="bal">0</span></div>
            <button onclick="pay()" style="width:30px; height:30px; border-radius:50%; border:none; background:var(--gold); font-weight:bold;">+</button>
        </div>
    </div>
    <div style="padding:15px;"><input type="text" id="searchInput" placeholder="Search cards..." oninput="filterMarket()" style="margin:0"></div>
    <div id="market-view"></div>
    <div id="purchased-view" style="display:none; padding:20px; padding-bottom:100px;">
        <h3 style="color:var(--gold); margin-bottom:10px;">PURCHASE HISTORY</h3>
        <div id="my-logs-list"></div>
    </div>
    
    <div style="position:fixed; bottom:0; width:100%; display:flex; background:#0a0b10; border-top:1px solid #222; padding:15px; justify-content:space-around; z-index:100;">
        <div onclick="switchTab('market')" id="tab-m" style="color:var(--primary); font-weight:bold; font-size:12px; cursor:pointer;">MARKET</div>
        <div onclick="switchTab('logs')" id="tab-l" style="color:#555; font-weight:bold; font-size:12px; cursor:pointer;">MY LOGS</div>
        <div onclick="document.getElementById('support-overlay').style.display='flex'" style="color:var(--whatsapp); font-weight:bold; font-size:12px; cursor:pointer;">SUPPORT</div>
    </div>
</div>

<div id="bot-box" style="position:fixed; bottom:20px; right:20px; z-index:2000; display:none;">
    <div id="bot-window">
        <div id="chat-logs"></div>
        <div id="typing-indicator" class="typing">Subby AI is typing...</div>
        <div style="display:flex; gap:5px; flex-direction:column;">
            <input type="text" id="bot-in" placeholder="Ask something..." style="height:35px; margin:0; font-size:12px;">
            <button class="btn" style="padding:8px; margin:0; font-size:12px;" onclick="askAI()">SEND</button>
        </div>
    </div>
    <div onclick="toggleBot()" style="width:55px; height:55px; background:#111 url('https://cdn-icons-png.flaticon.com/512/4712/4712035.png') center/70% no-repeat; border:2px solid var(--primary); border-radius:50%; box-shadow:0 0 15px rgba(0,112,243,0.4); cursor:pointer;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let isLogin = true, allItems = {};

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('atitle').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('abtn').innerText = isLogin ? "SIGN IN" : "SIGN UP";
        document.getElementById('atog').innerText = isLogin ? "New? Create Account" : "Back to Login";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Fill all fields");
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(e,p);
            else {
                const s = await db.ref('users').orderByChild('email').equalTo(e).once('value');
                if(s.exists()) return alert("Email already exists!");
                await auth.createUserWithEmailAndPassword(e,p);
            }
        } catch(err) { alert(err.message); }
    }

    function forgotPass() {
        const e = document.getElementById('email').value;
        if(!e) return alert("Please type your email address first!");
        auth.sendPasswordResetEmail(e).then(() => {
            alert("A password reset link has been sent to " + e);
        }).catch(err => alert(err.message));
    }

    // Fixed Auth State: Prevent immediate jumping
    auth.onAuthStateChanged(user => {
        if(user) {
            setTimeout(() => { // Small delay to prevent flashing
                document.getElementById('auth-gate').style.display='none';
                document.getElementById('app').style.display='block';
                document.getElementById('bot-box').style.display='block';
                sync();
            }, 500);
        } else { 
            document.getElementById('auth-gate').style.display='flex'; 
            document.getElementById('app').style.display='none'; 
            document.getElementById('bot-box').style.display='none';
        }
    });

    function sync() {
        const uid = auth.currentUser.email.replace(/\./g,'_');
        db.ref('users/'+uid+'/bal').on('value', s => document.getElementById('bal').innerText = (s.val() || 0).toLocaleString());
        db.ref('market').on('value', s => { allItems = s.val() || {}; filterMarket(); });
        db.ref('users/'+uid+'/myLogs').on('value', s => {
            const logs = s.val(); let h = "";
            for(let k in logs) h = `<div style="background:#000; border:1px solid var(--gold); padding:15px; border-radius:15px; margin-top:10px;"><p style="font-size:10px; color:var(--gold)">${logs[k].date}</p><p><b>${logs[k].name}</b></p><pre style="color:#0f0; font-size:11px; margin-top:5px; white-space:pre-wrap;">${logs[k].details}</pre></div>` + h;
            document.getElementById('my-logs-list').innerHTML = h || "No logs yet.";
        });
    }

    function filterMarket() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let h = "";
        for(let k in allItems) {
            if(allItems[k].name.toLowerCase().includes(term)) {
                const stock = allItems[k].data ? allItems[k].data.length : 0;
                h += `<div class="log-item"><p style="color:#0f0; font-size:10px;">STOCK: ${stock}</p><h3>${allItems[k].name}</h3><h2 style="color:var(--primary)">₦${parseInt(allItems[k].price).toLocaleString()}</h2><div class="qty-box"><button class="qty-btn" onclick="adj('${k}', -1)">-</button><span id="qty-${k}">1</span><button class="qty-btn" onclick="adj('${k}', 1)">+</button></div><button class="btn" onclick="buy('${k}')">BUY NOW</button></div>`;
            }
        }
        document.getElementById('market-view').innerHTML = h;
    }

    function adj(k, v) {
        const el = document.getElementById('qty-'+k);
        let q = parseInt(el.innerText) + v;
        if(q < 1) q = 1;
        el.innerText = q;
    }

    async function buy(k) {
        const qty = parseInt(document.getElementById('qty-'+k).innerText);
        const item = allItems[k], uid = auth.currentUser.email.replace(/\./g,'_'), cost = item.price * qty;
        if(!item.data || item.data.length < qty) return alert("Out of stock!");
        db.ref('users/'+uid+'/bal').once('value', async s => {
            const bal = s.val() || 0;
            if(bal < cost) return alert("Low balance!");
            if(confirm(`Buy for ₦${cost}?`)) {
                const bought = item.data.splice(0, qty);
                await db.ref('market/'+k).update({ data: item.data });
                await db.ref('users/'+uid).update({ bal: bal - cost });
                await db.ref('users/'+uid+'/myLogs').push({ name: item.name, details: bought.join('\n---\n'), date: new Date().toLocaleString() });
                alert("Success!");
            }
        });
    }

    function askAI() {
        const q = document.getElementById('bot-in').value, logs = document.getElementById('chat-logs'), typing = document.getElementById('typing-indicator');
        if(!q) return;
        logs.innerHTML += `<div class="msg-user">${q}</div>`;
        document.getElementById('bot-in').value = "";
        logs.scrollTop = logs.scrollHeight;
        typing.style.display = "block";
        setTimeout(() => {
            typing.style.display = "none";
            const low = q.toLowerCase();
            let r = "Try asking for 'support' or 'how to top up'!";
            if(low.includes("fund") || low.includes("top up")) {
                r = "Opening payment gateway..."; setTimeout(() => pay(), 1000);
            } else if(low.includes("support") || low.includes("admin")) {
                r = `Click here: <span class="support-link" onclick="window.open('https://wa.me/2347048141378')">WhatsApp</span> or <span class="support-link" onclick="window.open('mailto:subbylogssuport@gmail.com')">Email</span>.`;
            }
            logs.innerHTML += `<div class="msg-ai">🤖 <b>AI:</b> ${r}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }, 1500);
    }

    function adminSendMoney() {
        const emailInput = document.getElementById('adm-mail').value;
        const amount = parseInt(document.getElementById('adm-amt').value);
        if(!emailInput || !amount) return alert("Fill all fields!");
        const userKey = emailInput.replace(/\./g,'_');
        db.ref('users/' + userKey).once('value', s => {
            if(!s.exists()) return alert("User not found!");
            db.ref('users/' + userKey).update({ bal: (s.val().bal || 0) + amount }).then(() => alert("Sent!"));
        });
    }

    function adminUpload() {
        const name = document.getElementById('log-name').value, price = document.getElementById('log-price').value, raw = document.getElementById('log-data').value.split('\n').filter(l => l.trim() !== "");
        if(!name || !price || raw.length === 0) return alert("Fill info!");
        db.ref('market').push({ name, price, data: raw });
        alert("Uploaded!");
    }

    function switchTab(t) {
        document.getElementById('market-view').style.display = t==='market' ? 'block' : 'none';
        document.getElementById('purchased-view').style.display = t==='logs' ? 'block' : 'none';
        document.getElementById('tab-m').style.color = t==='market' ? 'var(--primary)' : '#555';
        document.getElementById('tab-l').style.color = t==='logs' ? 'var(--primary)' : '#555';
    }

    function checkAdmin() { if(prompt("ADMIN PIN") === "1710") document.getElementById('admin-gate').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-gate').style.display='none'; }
    function toggleBot() { const w = document.getElementById('bot-window'); w.style.display = w.style.display === 'block' ? 'none' : 'block'; }
    function pay() {
        const a = prompt("Amount (₦):");
        if(!a || isNaN(a)) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: auth.currentUser.email,
            amount: a * 100,
            callback: () => {
                const id = auth.currentUser.email.replace(/\./g,'_');
                db.ref('users/'+id+'/bal').once('value', s => db.ref('users/'+id).update({ bal: (s.val() || 0) + parseInt(a) }));
            }
        }).openIframe();
    }
</script>
</body>
</html>
