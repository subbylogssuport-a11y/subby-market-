<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V50 FINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; min-height: 100vh; overflow-x: hidden; }

        .gate-container { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        
        .history-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .log-display { background: #000; padding: 10px; border-radius: 8px; color: #0f0; font-family: monospace; font-size: 13px; margin-top: 10px; word-break: break-all; border: 1px dashed #333; }

        .navbar { background: rgba(17,17,17,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 18px; cursor: pointer; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 8px 18px; border-radius: 25px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .cat-header { padding: 15px 20px; font-size: 14px; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .grid { padding: 10px; display: grid; gap: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 2000; }
        .nav-item { text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGIN</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('reg-gate')">New? Register</p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">CREATE ACCOUNT</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleRegister()">SIGN UP</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('login-gate')">Back to Login</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY MARKET</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWallet()" style="color:var(--gold); cursor:pointer;">+</span></div>
    </div>
    <div id="market-grid"></div>
    <div class="bottom-nav">
        <div class="nav-item" style="color:var(--primary);" onclick="closeAllOverlays()">
            <div style="font-size:18px;">🛒</div><div style="font-size:10px; font-weight:bold;">MARKET</div>
        </div>
        <div class="nav-item" style="color:#777;" onclick="openHistory()">
            <div style="font-size:18px;">📦</div><div style="font-size:10px; font-weight:bold;">MY LOGS</div>
        </div>
        <div class="nav-item" style="color:#777;" onclick="window.open('https://wa.me/2348104565349')">
            <div style="font-size:18px;">💬</div><div style="font-size:10px; font-weight:bold;">SUPPORT</div>
        </div>
    </div>
</div>

<div id="history-overlay" class="overlay">
    <div class="overlay-header">
        <h2 style="color:var(--gold);">My Purchases</h2>
        <button style="background:none; border:none; color:#fff; font-size:24px;" onclick="closeAllOverlays()">×</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="admin-panel" class="overlay">
    <div class="overlay-header">
        <h2 style="color:var(--primary);">Supreme Admin</h2>
        <button style="background:none; border:none; color:#fff; font-size:24px;" onclick="closeAllOverlays()">×</button>
    </div>
    <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid #333;">
        <h4 style="margin-bottom:10px;">ADD NEW LOG CARD</h4>
        <input id="new-cat" class="auth-input" placeholder="Category (TikTok, FB)">
        <input id="new-name" class="auth-input" placeholder="Item Name">
        <input id="new-price" type="number" class="auth-input" placeholder="Price ₦">
        <textarea id="new-logs" class="auth-input" style="height:80px; text-align:left;" placeholder="user:pass (One per line)"></textarea>
        <button class="auth-btn" style="background:var(--primary); margin-bottom: 10px;" onclick="addNewCard()">CONFIRM & UPLOAD</button>
        <button class="auth-btn" style="background:#222;" onclick="closeAllOverlays()">EXIT ADMIN</button>
    </div>
    <div id="admin-list-container"></div>
</div>

<script>
    let currentUser = null;
    let balance = 0;
    let items = JSON.parse(localStorage.getItem('market_items')) || [];

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const e = document.getElementById('reg-email').value.trim().toLowerCase();
        const p = document.getElementById('reg-pass').value;
        if(!e || !p) return alert("Fill all fields");
        localStorage.setItem(`user_${e}`, JSON.stringify({pass:p, bal:0, history:[]}));
        alert("Account Created!"); showGate('login-gate');
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value.trim().toLowerCase();
        const p = document.getElementById('log-pass').value;
        const u = JSON.parse(localStorage.getItem(`user_${e}`));
        if(u && u.pass === p) {
            currentUser = e; balance = u.bal;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderMarket();
        } else alert("Error! Invalid Credentials.");
    }

    function renderMarket() {
        const cats = [...new Set(items.map(i => i.c.toUpperCase()))];
        let h = "";
        cats.forEach(c => {
            h += `<div class="cat-header">${c}</div><div class="grid">`;
            items.filter(i => i.c.toUpperCase() === c).forEach(i => {
                const s = i.data.length;
                h += `<div class="card">
                    <span style="font-size:10px; color:${s>0?'#0f0':'#f00'}">● ${s>0?s+' IN STOCK':'SOLD OUT'}</span>
                    <h3 style="margin:5px 0;">${i.n}</h3>
                    <h2 style="color:var(--primary); margin-bottom:10px;">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" style="height:40px;" ${s==0?'disabled style="background:#222"':''} onclick="buyItem(${i.id})">BUY LOG</button>
                </div>`;
            });
            h += `</div>`;
        });
        document.getElementById('market-grid').innerHTML = h || "<p style='text-align:center; padding:50px; color:#555;'>Store is currently empty.</p>";
        localStorage.setItem('market_items', JSON.stringify(items));
    }

    function buyItem(id) {
        let item = items.find(x => x.id === id);
        if(balance < item.p) return alert("Low Balance!");
        const myLog = item.data.shift();
        balance -= item.p;
        let u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        u.bal = balance;
        u.history.push({n: item.n, log: myLog, d: new Date().toLocaleString()});
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        renderMarket();
        alert("Done! Check 'MY LOGS'.");
    }

    function openHistory() {
        const u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        const list = document.getElementById('history-list');
        document.getElementById('history-overlay').style.display = 'block';
        if(!u.history.length) {
            list.innerHTML = `<p style="text-align:center; margin-top:50px; color:#444;">No purchase history found.</p>`;
        } else {
            list.innerHTML = u.history.map(h => `
                <div class="history-card">
                    <p style="font-size:11px; color:#666;">${h.d}</p>
                    <h4 style="margin:5px 0;">${h.n}</h4>
                    <div class="log-display">${h.log}</div>
                </div>`).reverse().join('');
        }
    }

    function openAdmin() {
        if(prompt("PASS:") === '1234567890') document.getElementById('admin-panel').style.display = 'block';
        loadAdminList();
    }

    function loadAdminList() {
        document.getElementById('admin-list-container').innerHTML = items.map(i => `
            <div class="adm-item" style="background:#111; padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid #222;">
                <p style="font-size:10px; color:var(--gold)">${i.c} | Stock: ${i.data.length}</p>
                <p><b>${i.n}</b> (₦${i.p})</p>
                <button onclick="deleteCard(${i.id})" style="background:red; color:#fff; border:none; padding:4px 8px; border-radius:5px; margin-top:5px; font-size:10px;">DELETE</button>
            </div>`).join('');
    }

    function addNewCard() {
        const c = document.getElementById('new-cat').value.trim();
        const n = document.getElementById('new-name').value.trim();
        const p = parseInt(document.getElementById('new-price').value);
        const l = document.getElementById('new-logs').value.split('\n').filter(x => x.trim() !== "");
        
        if(!c || !n || !p || l.length === 0) return alert("Fill all fields correctly!");
        
        items.push({id: Date.now(), c:c, n:n, p:p, data:l});
        
        // Clear inputs for next upload
        document.getElementById('new-cat').value = '';
        document.getElementById('new-name').value = '';
        document.getElementById('new-price').value = '';
        document.getElementById('new-logs').value = '';
        
        localStorage.setItem('market_items', JSON.stringify(items));
        loadAdminList();
        alert("Confirmed! Item added to stock.");
    }

    function deleteCard(id) {
        items = items.filter(x => x.id !== id);
        localStorage.setItem('market_items', JSON.stringify(items));
        loadAdminList();
    }

    function fundWallet() {
        const a = prompt("Deposit ₦:");
        if(!a) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser, amount: a * 100, currency: 'NGN',
            callback: () => { 
                balance += parseInt(a); 
                let u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
                u.bal = balance; localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
                document.getElementById('bal-val').innerText = balance.toLocaleString();
            }
        }).openIframe();
    }

    function closeAllOverlays() {
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        renderMarket(); // Ensure main screen refreshes with new stock
    }
</script>
</body>
</html>
