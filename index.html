<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | UNIVERSAL V23</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #eee; }
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid #0070f3; padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .recovery-link { color: #888; font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline; }
        #main-app { display: none; padding: 20px; }
    </style>
</head>
<body>

    <audio id="anthem-player" loop><source src="no_long_talk.mp3" type="audio/mpeg"></audio>

    <div id="auth-gate" class="gate-container">
        <div class="auth-card">
            <h1 style="color:#0070f3; margin-bottom:20px;">SUBBY MARKET</h1>
            <input type="email" id="user-email" class="auth-input" placeholder="Enter Email">
            <input type="text" id="user-key" class="auth-input" placeholder="Recovery Key (Leave blank if New)">
            <button class="auth-btn" onclick="processAuth()">LOGIN / REGISTER</button>
            <p class="recovery-link" onclick="recoverKey()">Forgot Recovery Key?</p>
        </div>
    </div>

    <div id="main-app">
        <h2 style="color:#0070f3;">Welcome Back!</h2>
        <p id="user-display" style="font-size:12px; color:#888;"></p>
        <div id="bal-area" style="font-size:24px; font-weight:900; margin:20px 0;">₦<span id="bal-val">0</span></div>
        <button class="auth-btn" style="background:#333;" onclick="location.reload()">Logout</button>
    </div>

<script>
    function processAuth() {
        const email = document.getElementById('user-email').value.trim().toLowerCase();
        const inputKey = document.getElementById('user-key').value.trim();
        
        if(!email.includes('@')) return alert("Enter a valid email!");

        let savedKey = localStorage.getItem(`subby_key_${email}`);

        // REGISTRATION (If no key exists for this email)
        if (!savedKey) {
            const newKey = "SB-" + Math.random().toString(36).substr(2, 8).toUpperCase();
            localStorage.setItem(`subby_key_${email}`, newKey);
            localStorage.setItem(`subby_data_${email}`, JSON.stringify({ balance: 0, orders: [] }));
            alert(`ACCOUNT CREATED!\n\nYour Recovery Key: ${newKey}\n\nUse this to login on any phone or laptop!`);
            return;
        }

        // LOGIN (Verify Key)
        if (inputKey === savedKey) {
            const data = JSON.parse(localStorage.getItem(`subby_data_${email}`));
            document.getElementById('bal-val').innerText = data.balance.toLocaleString();
            document.getElementById('user-display').innerText = email;
            
            // Start the Anthem immediately
            document.getElementById('anthem-player').play();
            
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else {
            alert("Error: Key does not match this email. Use 'Forgot Key' if needed.");
        }
    }

    function recoverKey() {
        const email = prompt("Enter email to recover your key:");
        if (!email) return;
        const key = localStorage.getItem(`subby_key_${email.toLowerCase()}`);
        if (key) {
            alert(`SUCCESS: Your Key is ${key}. You can now login on any device.`);
        } else {
            alert("Email not found. Please register first.");
        }
    }
</script>
</body>
</html>
