<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V56 FINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: #161b22; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; min-height: 100vh; overflow-x: hidden; }

        /* WISER AI UI */
        #ai-bubble { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, #0070f3, #00d2ff); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; z-index: 4000; box-shadow: 0 0 20px rgba(0,112,243,0.6); border: 2px solid #fff; cursor: pointer; }
        #ai-window { position: fixed; bottom: 155px; right: 20px; width: 320px; background: #111; border: 1px solid #333; border-radius: 25px; display: none; flex-direction: column; z-index: 4000; overflow: hidden; box-shadow: 0 10px 50px #000; }
        .ai-header { background: var(--primary); padding: 15px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        #ai-chat-box { height: 280px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; font-size: 13px; }
        .ai-msg { background: #222; padding: 10px 14px; border-radius: 15px; align-self: flex-start; max-width: 85%; line-height: 1.5; border-bottom-left-radius: 2px; }
        .user-msg { background: var(--primary); align-self: flex-end; border-radius: 15px; border-bottom-right-radius: 2px; }

        /* CORE UI */
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }

        .navbar { background: #0a0b10; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 20px; }
        .bal-pill { background: #161b22; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 30px; font-weight: 900; color: var(--gold); }
        
        .overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .grid { padding: 15px; display: grid; gap: 20px; padding-bottom: 120px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 25px; padding: 25px; }
        .cat-header { padding: 10px 20px; font-size: 12px; color: var(--gold); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0b10; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 2000; }
        .nav-item { text-align: center; cursor: pointer; color: #666; font-size: 10px; font-weight: 800; }
        .active { color: var(--primary); }
    </style>
</head>
<body>

<div id="ai-bubble" onclick="toggleAI()">👤</div>
<div id="ai-window">
    <div class="ai-header"><span>SUBBY AGENT</span> <span onclick="toggleAI()" style="cursor:pointer;">×</span></div>
    <div id="ai-chat-box"></div>
    <div class="ai-input-area" style="display:flex; padding:10px; background:#111;">
        <input type="text" id="ai-text" style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px;" placeholder="Message AI...">
        <button onclick="aiAsk()" style="background:var(--primary); color:#fff; border:none; padding:0 12px; margin-left:5px; border-radius:8px;">➤</button>
    </div>
</div>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGIN</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
        <p onclick="showGate('reg-gate')" style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;">New User? Register</p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">JOIN US</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleRegister()">CREATE ACCOUNT</button>
        <p onclick="showGate('login-gate')" style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;">Back to Login</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY MARKET</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWallet()" style="cursor:pointer; margin-left:5px;">+</span></div>
    </div>
    <div id="market-grid"></div>
    <div class="bottom-nav">
        <div class="nav-item active" onclick="closeAllOverlays()"><div>🛍️</div><div>MARKET</div></div>
        <div class="nav-item" onclick="openHistory()"><div>📂</div><div>MY LOGS</div></div>
        <div class="nav-item" onclick="window.open('https://wa.me/2348104565349')"><div>💬</div><div>SUPPORT</div></div>
    </div>
</div>

<div id="history-overlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--gold);">My Inventory</h2>
        <button style="background:none; border:none; color:#fff; font-size:30px;" onclick="closeAllOverlays()">×</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="admin-panel" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--primary);">Admin Panel</h2>
        <button style="background:none; border:none; color:#fff; font-size:30px;" onclick="closeAllOverlays()">×</button>
    </div>
    
    <div style="background:#111; padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid #333;">
        <h3 style="margin-bottom:15px; color:var(--primary); font-size:14px;">UPLOAD LOGS</h3>
        <input id="new-cat" class="auth-input" placeholder="Category (e.g. FACEBOOK)">
        <input id="new-name" class="auth-input" placeholder="Name (e.g. 5k Followers)">
        <input id="new-price" type="number" class="auth-input" placeholder="Price ₦">
        <textarea id="new-logs" class="auth-input" style="height:100px; text-align:left;" placeholder="Log details (one per line)"></textarea>
        <button class="auth-btn" onclick="addNewCard()">CONFIRM UPLOAD</button>
    </div>

    <div style="background:#111; padding:20px; border-radius:20px; border:1px solid var(--gold);">
        <h3 style="margin-bottom:15px; color:var(--gold); font-size:14px;">CREDIT USER</h3>
        <input type="email" id="adm-user" class="auth-input" placeholder="Customer Email">
        <input type="number" id="adm-amt" class="auth-input" placeholder="Amount ₦">
        <button class="auth-btn" style="background:var(--gold); color:#000;" onclick="admCredit()">SEND MONEY</button>
    </div>
    
    <div id="admin-list-container" style="margin-top:20px;"></div>
</div>

<script>
    let currentUser = null;
    let balance = 0;
    let items = JSON.parse(localStorage.getItem('market_items')) || [];

    // AGGRESSIVE UPLOAD ENGINE
    function addNewCard() {
        const c = document.getElementById('new-cat').value.trim().toUpperCase();
        const n = document.getElementById('new-name').value.trim();
        const p = parseInt(document.getElementById('new-price').value);
        const lText = document.getElementById('new-logs').value.trim();
        const l = lText.split('\n').filter(x => x.trim() !== "");
        
        if(!c || !n || !p || l.length === 0) return alert("Fill everything!");
        
        const newItem = { id: Date.now(), c: c, n: n, p: p, data: l };
        items.push(newItem);
        
        // FORCE SAVE AND SYNC
        localStorage.setItem('market_items', JSON.stringify(items));
        
        document.getElementById('new-cat').value = '';
        document.getElementById('new-name').value = '';
        document.getElementById('new-price').value = '';
        document.getElementById('new-logs').value = '';
        
        renderMarket();
        loadAdminList();
        alert("UPLOADED! The market has been updated.");
    }

    // WISER AI LOGIC
    function toggleAI() {
        const win = document.getElementById('ai-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        if(win.style.display === 'flex' && document.getElementById('ai-chat-box').innerHTML === "") {
            const h = new Date().getHours();
            let g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
            addAIMsg(`${g}, **${currentUser}**. I'm your Subby Market assistant. How can I help you today?`);
        }
    }

    function addAIMsg(txt) {
        const box = document.getElementById('ai-chat-box');
        box.innerHTML += `<div class="ai-msg">${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function aiAsk() {
        const input = document.getElementById('ai-text');
        const val = input.value.toLowerCase().trim();
        if(!val) return;
        document.getElementById('ai-chat-box').innerHTML += `<div class="ai-msg user-msg">${input.value}</div>`;
        input.value = "";

        setTimeout(() => {
            if(val.includes("thank")) {
                addAIMsg("You're welcome! We value your business here at **Subby Market**. Let me know if you need more logs.");
            } else if(val.includes("how are you") || val.includes("how far")) {
                addAIMsg("I'm sharp and ready to serve! How are you doing today, **" + currentUser + "**?");
            } else if(val.includes("admin") || val.includes("contact")) {
                addAIMsg("You can reach the CEO on WhatsApp at **+2348104565349**. He's always ready to help.");
            } else if(val.includes("fund") || val.includes("deposit")) {
                addAIMsg("Easy! Just click the **+** icon next to your balance to fund via Paystack Transfer or Card.");
            } else {
                addAIMsg("I'm here for you! I can help with log locations, wallet funding, or connecting you with the Admin.");
            }
        }, 700);
    }

    // SYSTEM CORE
    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const e = document.getElementById('reg-email').value.trim().toLowerCase();
        const p = document.getElementById('reg-pass').value;
        if(!e || !p) return alert("Fill all fields");
        localStorage.setItem(`user_${e}`, JSON.stringify({pass:p, bal:0, history:[]}));
        alert("Success! Please Login."); showGate('login-gate');
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value.trim().toLowerCase();
        const p = document.getElementById('log-pass').value;
        const u = JSON.parse(localStorage.getItem(`user_${e}`));
        if(u && u.pass === p) {
            currentUser = e; balance = u.bal;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('ai-bubble').style.display = 'flex';
            renderMarket();
        } else alert("Wrong email or password!");
    }

    function renderMarket() {
        const grid = document.getElementById('market-grid');
        const cats = [...new Set(items.map(i => i.c))];
        let html = "";
        cats.forEach(c => {
            html += `<div class="cat-header">${c}</div><div class="grid">`;
            items.filter(i => i.c === c).forEach(i => {
                const stock = i.data.length;
                html += `<div class="card">
                    <span style="font-size:10px; font-weight:900; color:${stock>0?'#0f0':'#f00'}">● ${stock>0?stock+' IN STOCK':'SOLD OUT'}</span>
                    <h3 style="margin:10px 0;">${i.n}</h3>
                    <h2 style="color:var(--primary); margin-bottom:15px;">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" ${stock==0?'disabled style="background:#222"':''} onclick="buyItem(${i.id})">BUY NOW</button>
                </div>`;
            });
            html += `</div>`;
        });
        grid.innerHTML = html || `<div style="text-align:center; padding:100px 20px;"><h3>Market is Empty</h3></div>`;
    }

    function buyItem(id) {
        let itm = items.find(x => x.id === id);
        if(balance < itm.p) return alert("Insufficient Balance!");
        const purchasedLog = itm.data.shift();
        balance -= itm.p;
        let u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        u.bal = balance;
        u.history.push({n: itm.n, log: purchasedLog, d: new Date().toLocaleString()});
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
        localStorage.setItem('market_items', JSON.stringify(items));
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        renderMarket();
        alert("Purchase successful! View in 'MY LOGS'.");
    }

    function openHistory() {
        const u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        const list = document.getElementById('history-list');
        document.getElementById('history-overlay').style.display = 'block';
        list.innerHTML = u.history.length ? u.history.map(h => `
            <div style="background:#111; padding:20px; border-radius:20px; margin-bottom:15px; border:1px solid #333;">
                <p style="font-size:10px; color:#555;">${h.d}</p>
                <h4 style="color:var(--gold); margin:5px 0;">${h.n}</h4>
                <div style="background:#000; padding:12px; border-radius:10px; font-size:12px; border:1px dashed #444;">${h.log}</div>
            </div>`).reverse().join('') : `<p style="text-align:center; margin-top:50px;">No history.</p>`;
    }

    function openAdmin() {
        if(prompt("PASS:") === '1234567890') {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminList();
        }
    }

    function loadAdminList() {
        document.getElementById('admin-list-container').innerHTML = items.map(i => `
            <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #333;">
                <p><b>${i.n}</b> (₦${i.p}) - ${i.data.length} Left</p>
                <button onclick="deleteCard(${i.id})" style="background:red; color:#fff; border:none; padding:5px 10px; border-radius:5px; margin-top:10px; font-size:10px;">DELETE</button>
            </div>`).join('');
    }

    function deleteCard(id) {
        items = items.filter(x => x.id !== id);
        localStorage.setItem('market_items', JSON.stringify(items));
        loadAdminList(); renderMarket();
    }

    function admCredit() {
        const e = document.getElementById('adm-user').value.toLowerCase().trim();
        const a = parseInt(document.getElementById('adm-amt').value);
        let u = JSON.parse(localStorage.getItem(`user_${e}`));
        if(u) {
            u.bal += a;
            localStorage.setItem(`user_${e}`, JSON.stringify(u));
            alert("Credited Successful!");
            document.getElementById('adm-amt').value = "";
        } else alert("User not found!");
    }

    function fundWallet() {
        const a = prompt("Amount ₦:");
        if(!a) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser, amount: a * 100, currency: 'NGN',
            callback: () => { 
                balance += parseInt(a); 
                let u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
                u.bal = balance; localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
                document.getElementById('bal-val').innerText = balance.toLocaleString();
                alert("Funded!");
            }
        }).openIframe();
    }

    function closeAllOverlays() {
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        renderMarket();
    }
</script>
</body>
</html>
