<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V71 AI & PAYSTACK</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #eee; min-height: 100vh; }
        .navbar { background: #0a0b10; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 30px; font-weight: 900; color: var(--gold); }
        .topup-btn { background: var(--gold); color: #000; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 900; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* INTERACTIVE AI BOT */
        #ia-bubble { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: url('https://i.ibb.co/6R5qXhP/space-robot.jpg') center/cover; border: 2px solid var(--primary); border-radius: 50%; cursor: pointer; z-index: 9999; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 112, 243, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 112, 243, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 112, 243, 0); } }
        #bot-chat { position: fixed; bottom: 100px; right: 20px; width: 280px; background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 20px; display: none; z-index: 10000; box-shadow: 0 10px 40px #000; }
        .bot-btn { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 12px; }

        .auth-input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; margin-bottom: 12px; text-align: center; outline: none; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .gate { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="ia-bubble" onclick="toggleBot()"></div>
<div id="bot-chat">
    <div id="bot-msg" style="font-size: 13px; line-height: 1.6;">🤖 <b>Subby AI:</b> Hello! I'm your assistant. How can I help you today?</div>
    <button class="bot-btn" onclick="botReply('fund')">How to fund my account?</button>
    <button class="bot-btn" onclick="botReply('buy')">How to buy logs?</button>
    <button class="bot-btn" style="background:#25D366" onclick="window.open('https://wa.me/2348104565349')">Chat with Admin</button>
</div>

<div id="login-gate" class="gate">
    <div style="background:#111; border:1px solid var(--primary); padding:35px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGS</h2>
        <input type="email" id="user-email" class="auth-input" placeholder="Email Address">
        <button class="btn-main" onclick="handleLogin()">ENTER MARKET</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div style="font-weight:900; color:var(--primary);">SUBBY LOGS</div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="bal-pill">₦<span id="bal-val">0</span></div>
            <button class="topup-btn" onclick="payWithPaystack()">+</button>
        </div>
    </div>
    <div id="market" style="padding:15px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let balance = 0;

    function handleLogin() {
        const e = document.getElementById('user-email').value.toLowerCase();
        if(!e || !e.includes('@')) return alert("Enter valid email");
        currentUser = e.replace(/\./g, '_');
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        db.ref('users/' + currentUser).on('value', snap => {
            balance = snap.val() ? snap.val().bal : 0;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
        });
    }

    function toggleBot() {
        const chat = document.getElementById('bot-chat');
        chat.style.display = chat.style.display === 'block' ? 'none' : 'block';
    }

    function botReply(type) {
        const msg = document.getElementById('bot-msg');
        if(type === 'fund') msg.innerHTML = "🤖 <b>Subby AI:</b> To fund your account, click the <b style='color:var(--gold)'>+</b> button at the top and pay via Paystack.";
        if(type === 'buy') msg.innerHTML = "🤖 <b>Subby AI:</b> Select a log you like and click <b>PURCHASE</b>. Your logs will appear in your history.";
    }

    function payWithPaystack() {
        const amount = prompt("Enter amount to fund (₦):");
        if(!amount || isNaN(amount)) return;
        
        let handler = PaystackPop.setup({
            key: 'pk_live_YOUR_KEY_HERE', // Replace with your Public Key
            email: currentUser.replace('_', '.'),
            amount: amount * 100,
            currency: "NGN",
            callback: function(response) {
                db.ref('users/' + currentUser).update({ bal: balance + parseInt(amount) });
                alert("Payment successful! Wallet updated.");
            }
        });
        handler.openIframe();
    }
</script>
</body>
</html>
