<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V40 OFFICIAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; min-height: 100vh; overflow-x: hidden; }

        /* AUTH GATES */
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* WELCOME MODAL */
        #welcome-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 30px; text-align: center; max-width: 350px; }

        /* MARKET UI */
        .navbar { background: rgba(17,17,17,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 18px; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 8px 18px; border-radius: 25px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .cat-header { padding: 15px 20px; font-size: 14px; color: var(--gold); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .grid { padding: 10px; display: grid; gap: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; position: relative; }
        .stock-tag { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; }
        
        /* ADMIN PANEL (HIDDEN) */
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; }
    </style>
</head>
<body>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGIN</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('reg-gate')">New user? <span style="color:var(--primary);">Create Account</span></p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">CREATE ACCOUNT</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Create Password">
        <button class="auth-btn" onclick="handleRegister()">SIGN UP</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('login-gate')">Have account? <span style="color:var(--primary);">Login</span></p>
    </div>
</div>

<div id="welcome-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold); margin-bottom:10px;">Welcome Back!</h2>
        <p id="user-greet" style="font-weight:bold; margin-bottom:15px; color:#fff;"></p>
        <p style="font-size:14px; color:#aaa; margin-bottom:20px;">Happy Easter! 🌸<br>Enjoy our premium logs update.</p>
        <button class="auth-btn" style="background:var(--gold)" onclick="closeWelcome()">ENTER MARKET</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY MARKET</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWallet()" style="color:var(--gold); cursor:pointer; font-weight:bold;">+</span></div>
    </div>
    
    <div id="market-grid"></div>

    <div class="bottom-nav">
        <div style="color:var(--primary); font-size:10px; font-weight:bold;">MARKET</div>
        <div style="color:#555; font-size:10px; font-weight:bold;" onclick="checkMyHistory()">MY LOGS</div>
        <div style="color:#555; font-size:10px; font-weight:bold;" onclick="window.open('https://wa.me/2348104565349')">SUPPORT</div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color:var(--gold);">👑 ADMIN COMMAND</h2>
    <div id="admin-stock-list" style="margin:20px 0; background:#111; padding:10px; border-radius:15px;"></div>
    
    <input type="email" id="adm-user" class="auth-input" placeholder="Target User Email">
    <input type="number" id="adm-amt" class="auth-input" placeholder="Amount (₦)">
    <button class="auth-btn" onclick="admCredit()">ADD BALANCE</button>
    <button class="auth-btn" style="background:#222; margin-top:30px;" onclick="document.getElementById('admin-panel').style.display='none'">EXIT ADMIN</button>
</div>

<script>
    let currentUser = null;
    let balance = 0;
    
    // ORGANIZED CATEGORIES
    let marketData = {
        "Facebook Section": [
            {id:1, n:"UK Facebook 🇬🇧", p:2500, s:0},
            {id:2, n:"USA FB Fresh", p:1500, s:0},
            {id:3, n:"Germany Aged FB", p:5000, s:0}
        ],
        "Instagram Section": [
            {id:4, n:"Instagram HD Logs", p:9000, s:0},
            {id:5, n:"IG Followers Bot", p:500, s:0}
        ]
    };

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!email.includes('@')) return alert("Invalid Email!");
        if(localStorage.getItem(`user_${email}`)) return alert("Email already exists!");
        localStorage.setItem(`user_${email}`, JSON.stringify({pass: pass, bal: 0, history: []}));
        alert("Account Created! Login now.");
        showGate('login-gate');
    }

    function handleLogin() {
        const email = document.getElementById('log-email').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value.trim();
        const stored = JSON.parse(localStorage.getItem(`user_${email}`));

        if(stored && stored.pass === pass) {
            currentUser = email;
            balance = stored.bal;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-greet').innerText = email;
            document.getElementById('welcome-modal').style.display = 'flex';
            renderMarket();
        } else {
            alert("Wrong login details!");
        }
    }

    function closeWelcome() { document.getElementById('welcome-modal').style.display = 'none'; }

    function renderMarket() {
        let html = "";
        for (const cat in marketData) {
            html += `<div class="cat-header">${cat}</div><div class="grid">`;
            marketData[cat].forEach(i => {
                html += `
                <div class="card">
                    <span class="stock-tag" style="color:${i.s > 0 ? '#00ff00' : '#ff4d4d'}">
                        ● ${i.s > 0 ? 'IN STOCK ('+i.s+')' : 'OUT OF STOCK'}
                    </span>
                    <h3>${i.n}</h3>
                    <h2 style="color:var(--primary); margin:10px 0;">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" style="height:45px; font-size:12px;" ${i.s == 0 ? 'disabled style="background:#222"' : ''}>BUY NOW</button>
                </div>`;
            });
            html += `</div>`;
        }
        document.getElementById('market-grid').innerHTML = html;
    }

    // ADMIN TRIGGER (Double Click/Tap logo)
    function openAdmin() {
        const p = prompt("ADMIN PASSWORD:");
        if(p === '1234567890') {
            document.getElementById('admin-panel').style.display='block';
            loadAdm();
        }
    }

    function loadAdm() {
        let admHtml = "";
        for (const cat in marketData) {
            marketData[cat].forEach(i => {
                admHtml += `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid #222; padding:5px;">
                    <span style="font-size:12px;">${i.n}</span>
                    <input type="number" value="${i.s}" onchange="updateStock(${i.id}, this.value)" style="width:50px; background:#000; color:#fff; border:1px solid #444;">
                </div>`;
            });
        }
        document.getElementById('admin-stock-list').innerHTML = admHtml;
    }

    function updateStock(id, val) {
        for (const cat in marketData) {
            let item = marketData[cat].find(x => x.id == id);
            if(item) { item.s = parseInt(val); renderMarket(); break; }
        }
    }

    function admCredit() {
        const email = document.getElementById('adm-user').value.toLowerCase();
        const amt = parseInt(document.getElementById('adm-amt').value);
        let u = JSON.parse(localStorage.getItem(`user_${email}`));
        if(u) { u.bal += amt; localStorage.setItem(`user_${email}`, JSON.stringify(u)); alert("Credited!"); }
        else { alert("User not found!"); }
    }

    function fundWallet() {
        const amt = prompt("Amount to deposit? (₦)");
        if(!amt) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser,
            amount: amt * 100,
            currency: 'NGN',
            callback: function() {
                balance += parseInt(amt);
                let s = JSON.parse(localStorage.getItem(`user_${currentUser}`));
                s.bal = balance;
                localStorage.setItem(`user_${currentUser}`, JSON.stringify(s));
                document.getElementById('bal-val').innerText = balance.toLocaleString();
                alert("Success!");
            }
        }).openIframe();
    }
</script>
</body>
</html>
