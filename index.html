<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 25px; pointer-events: none;">SUBBY LOGS</h1>
        
        <div style="margin-bottom: 15px;">
            <input type="text" id="login-u" placeholder="Username" autocomplete="off">
            <input type="password" id="login-p" placeholder="Password">
        </div>

        <button class="btn-blue" onclick="processLogin()" style="display: block; margin-bottom: 10px;">LOGIN</button>
        
        <button class="btn-blue" style="background:#222; display: block; margin-bottom: 20px;" onclick="toggleAuth('signup')">Create Account</button>
        
        <div style="border-top: 1px solid #333; pt: 15px;">
             <button class="btn-link" onclick="openReset()" style="width: 100%; padding: 10px; color: #0070f3; font-weight: bold; background: none; border: none; cursor: pointer;">
                Forgot Password?
             </button>
        </div>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2 style="color:#0070f3; margin-bottom: 15px;">New Account</h2>
        <input type="text" id="reg-u" placeholder="New Username">
        <input type="password" id="reg-p" placeholder="New Password">
        <button class="btn-blue" onclick="processSignup()">CONFIRM & JOIN</button>
        <button class="btn-link" onclick="toggleAuth('login')" style="display: block; margin: 15px auto;">Back to Login</button>
    </div>

    <div class="auth-card" id="forgot-box" style="display:none;">
        <h2 style="color:#ffcc00; margin-bottom: 10px;">Account Recovery</h2>
        <div id="otp-val" style="font-size:28px; color:#ffcc00; font-weight: bold; letter-spacing: 6px; margin: 15px 0; background: #000; padding: 10px; border-radius: 8px;">000000</div>
        <input type="text" id="for-u" placeholder="Your Username">
        <input type="text" id="for-otp" placeholder="Enter 6-Digit Code">
        <input type="password" id="for-new-p" placeholder="Set New Password">
        <button class="btn-blue" style="background:#ffcc00; color:#000;" onclick="processReset()">UPDATE PASSWORD</button>
        <button class="btn-link" onclick="toggleAuth('login')" style="display: block; margin: 15px auto;">Cancel</button>
    </div>
</div>
