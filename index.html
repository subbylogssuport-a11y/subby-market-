<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #0070f3; margin-bottom: 20px; font-size: 26px; font-weight: 900; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        
        /* Buttons */
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-dark { background: #222; margin-top: 12px; }
        .btn-link { background: none; border: none; color: #0070f3; margin-top: 25px; cursor: pointer; width: 100%; font-size: 14px; }

        /* Market Screen */
        #market-screen { display: none; padding-top: 60px; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: fixed; top: 0; width: 100%; z-index: 500; }
        .product-card { background: #16161a; border: 1px solid #222; margin: 15px; padding: 20px; border-radius: 15px; }
        .price { color: #0070f3; font-size: 24px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="auth-box">
        <h1 id="auth-title">SUBBY LOGS</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-blue" id="main-btn" onclick="handleAuth()">LOGIN</button>
        <button class="btn-blue btn-dark" id="switch-btn" onclick="toggleMode()">Create Account</button>
        <button class="btn-link" onclick="alert('Use code: 1234 to reset')">Forgot Password?</button>
    </div>
</div>

<div id="market-screen">
    <div class="navbar">
        <b style="color:#0070f3;">SUBBY MARKET</b>
        <b>₦<span id="balance-display">0</span></b>
    </div>
    
    <div class="product-card">
        <p style="color:#0070f3; font-size:11px; font-weight:bold;">STOCK: 0</p>
        <h3>Facebook with create profile</h3>
        <div class="price">₦8,000</div>
        <button class="btn-blue">Buy Now</button>
    </div>

    <div class="product-card">
        <p style="color:#0070f3; font-size:11px; font-weight:bold;">STOCK: 0</p>
        <h3>Facebook with already created Profile</h3>
        <div class="price">₦5,500</div>
        <button class="btn-blue">Buy Now</button>
    </div>
</div>

<script>
    let isLoginMode = true;
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":25000}}');

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "SUBBY LOGS" : "SIGN UP";
        document.getElementById('main-btn').innerText = isLoginMode ? "LOGIN" : "CREATE ACCOUNT";
        document.getElementById('switch-btn').innerText = isLoginMode ? "Create Account" : "Back to Login";
    }

    function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();

        if (isLoginMode) {
            if (users[u] && users[u].p === p) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('market-screen').style.display = 'block';
                document.getElementById('balance-display').innerText = users[u].b.toLocaleString();
            } else {
                alert("Incorrect username or password!");
            }
        } else {
            if (!u || !p) return alert("Please fill all fields!");
            if (users[u]) return alert("Username already taken!");
            users[u] = {p: p, b: 0};
            localStorage.setItem('sys_users', JSON.stringify(users));
            alert("Account created! You can login now.");
            toggleMode();
        }
    }
</script>
</body>
</html>
