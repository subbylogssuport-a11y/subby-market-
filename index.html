<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | OFFICIAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; min-height: 100vh; }

        /* LOGIN SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* NAVBAR & SIDEBAR */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; }
        .cat-item { padding: 12px; border-radius: 8px; color: #ccc; margin-bottom: 5px; cursor: pointer; border-left: 3px solid transparent; font-size: 14px; }
        .cat-item:hover, .active-cat { background: #1a1a20; border-left: 3px solid #0070f3; color: #fff; }

        /* PRODUCT CARDS */
        .main-content { flex: 1; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 12px; padding: 20px; }
        .qty-box { display: flex; align-items: center; gap: 15px; margin: 15px 0; background: #000; width: fit-content; padding: 5px 15px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { color: #0070f3; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* BUTTONS */
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-link { background: none; border: none; color: #0070f3; cursor: pointer; font-size: 13px; margin-top: 15px; }
        
        input, textarea { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 25px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue" style="background:#222;" onclick="toggleAuth('signup')">Create Account</button>
        <button class="btn-link" onclick="openReset()">Forgot Password?</button>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2 style="color:#0070f3;">Join Terminal</h2>
        <input type="text" id="reg-u" placeholder="New Username">
        <input type="password" id="reg-p" placeholder="New Password">
        <button class="btn-blue" onclick="processSignup()">CONFIRM</button>
        <button class="btn-link" onclick="toggleAuth('login')">Back to Login</button>
    </div>

    <div class="auth-card" id="forgot-box" style="display:none;">
        <h2 style="color:#ffcc00;">Recovery</h2>
        <div id="otp-val" style="font-size:24px; color:#ffcc00; margin:10px 0; letter-spacing:5px;">000000</div>
        <input type="text" id="for-u" placeholder="Username">
        <input type="text" id="for-otp" placeholder="Enter Code Above">
        <input type="password" id="for-new-p" placeholder="New Password">
        <button class="btn-blue" style="background:#ffcc00; color:#000;" onclick="processReset()">RESET PASSWORD</button>
    </div>
</div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div style="font-weight:900; color:#0070f3; font-size:20px;">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span> <button onclick="deposit()" style="padding:4px 10px; background:#0070f3; color:#fff; border:none; border-radius:4px; margin-left:10px;">+</button></div>
    </div>

    <div class="content-wrapper">
        <div class="sidebar">
            <div class="cat-item active-cat" onclick="filterShop('all')">Show All</div>
            <div class="cat-item" onclick="filterShop('facebook')">Facebook Accounts</div>
            <div class="cat-item" onclick="filterShop('twitter')">Twitter (Aged)</div>
            <div class="cat-item" onclick="filterShop('telegram')">Telegram / WhatsApp</div>
            <div class="cat-item" onclick="filterShop('textnow')">TextNow / TextFree</div>
            
            <div style="margin-top:40px;">
                <button class="btn-blue" style="background:#222; font-size:12px;" onclick="showAdmin()">ADMIN PANEL</button>
            </div>
        </div>

        <div class="main-content">
            <div class="product-grid" id="shop-grid"></div>
        </div>
    </div>
</div>

<div id="admin-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; padding:20px; overflow-y:auto;">
    <div style="max-width:600px; margin:auto; background:#16161a; padding:25px; border-radius:15px; border:1px solid #0070f3;">
        <h2>Admin Inventory</h2>
        <p style="font-size:12px; color:#666; margin-bottom:15px;">Paste your logs below (one per line)</p>
        <select id="admin-cat" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff;">
            <option value="facebook">Facebook</option>
            <option value="twitter">Twitter</option>
            <option value="telegram">Telegram</option>
        </select>
        <textarea id="admin-logs" rows="10" placeholder="user:pass&#10;user:pass"></textarea>
        <button class="btn-blue" onclick="saveLogs()">UPLOAD STOCK</button>
        <button class="btn-link" onclick="hideAdmin()">Close Admin</button>
    </div>
</div>

<script>
    const P_KEY = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';
    let activeUser = null; let currentOTP = null;

    // LOCAL DATABASE
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{"facebook":[], "twitter":[], "telegram":[], "textnow":[]}');

    const products = [
        { id: 'facebook', name: "Facebook Aged Log", price: 5000 },
        { id: 'twitter', name: "Aged Twitter (X)", price: 4000 },
        { id: 'telegram', name: "Telegram Session", price: 3000 }
    ];

    function filterShop(cat) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        products.forEach(p => {
            if(cat === 'all' || p.id === cat) {
                const stockCount = inventory[p.id] ? inventory[p.id].length : 0;
                grid.innerHTML += `
                <div class="product-card">
                    <span style="color:${stockCount > 0 ? '#0070f3' : '#d32f2f'}; font-size:11px; font-weight:bold;">● Stock: ${stockCount}</span>
                    <h3>${p.name}</h3>
                    <div style="color:#0070f3; font-size:22px; font-weight:900; margin-top:10px;">₦${p.price.toLocaleString()}</div>
                    <div class="qty-box">
                        <span class="qty-btn" onclick="changeQty('${p.id}', -1)">-</span>
                        <span id="qty-${p.id}" style="font-weight:bold;">1</span>
                        <span class="qty-btn" onclick="changeQty('${p.id}', 1)">+</span>
                    </div>
                    <button class="btn-blue" onclick="buyLogs('${p.id}', ${p.price})">BUY NOW</button>
                </div>`;
            }
        });
    }

    function changeQty(id, delta) {
        const el = document.getElementById(`qty-${id}`);
        let current = parseInt(el.innerText);
        if(current + delta >= 1) el.innerText = current + delta;
    }

    function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function saveLogs() {
        const cat = document.getElementById('admin-cat').value;
        const newLogs = document.getElementById('admin-logs').value.trim().split('\n').filter(l => l !== '');
        inventory[cat] = [...(inventory[cat] || []), ...newLogs];
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        alert("Stock updated!");
        document.getElementById('admin-logs').value = '';
        filterShop('all');
    }

    function buyLogs(id, price) {
        const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
        const total = price * qty;
        let users = JSON.parse(localStorage.getItem('sys_users'));
        
        if (inventory[id].length < qty) return alert("Not enough stock!");
        if (users[activeUser].b < total) return alert("Insufficient balance! Please top up.");

        // Deduct balance
        users[activeUser].b -= total;
        // Take logs from inventory
        const bought = inventory[id].splice(0, qty);
        
        localStorage.setItem('sys_users', JSON.stringify(users));
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        
        document.getElementById('bal').innerText = users[activeUser].b.toLocaleString();
        alert("Purchase Successful! \n\nYour Logs:\n" + bought.join('\n'));
        filterShop('all');
    }

    // AUTH FUNCTIONS (Login, Signup, Reset)
    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        let users = JSON.parse(localStorage.getItem('sys_users') || '{}');
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            filterShop('all');
        } else { alert("Invalid Credentials!"); }
    }

    function toggleAuth(box) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('signup-box').style.display = 'none';
        document.getElementById(box + '-box').style.display = 'block';
    }

    function openReset() {
        currentOTP = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('otp-val').innerText = currentOTP;
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('forgot-box').style.display = 'block';
    }
</script>
</body>
</html>
