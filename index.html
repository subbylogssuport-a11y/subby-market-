<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Login Screen */
        .auth-card { background: #16161a; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; }
        h1 { color: #0070f3; margin-bottom: 20px; font-weight: 900; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        
        /* Main Market */
        #main-site { display: none; width: 100%; position: fixed; inset: 0; background: #000; overflow-y: auto; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .bal-box { display: flex; align-items: center; gap: 8px; background: #222; padding: 6px 12px; border-radius: 20px; border: 1px solid #0070f3; }
        .plus-btn { background: #0070f3; color: #fff; border: none; width: 26px; height: 26px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        
        .category-header { padding: 20px 15px 5px; color: #0070f3; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .product-list { padding: 10px 15px; }
        .card { background: #16161a; border: 1px solid #262626; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .price { color: #0070f3; font-weight: bold; font-size: 20px; margin: 5px 0; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <h1>SUBBY LOGS</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-blue" onclick="doLogin()">LOGIN</button>
    </div>
</div>

<div id="main-site">
    <div class="navbar">
        <b style="color:#0070f3;">SUBBY MARKET</b>
        <div class="bal-box">
            <span>₦<span id="bal-val">0</span></span>
            <button class="plus-btn" onclick="payWithPaystack()">+</button>
        </div>
    </div>
    <div id="shop-content"></div>
</div>

<script>
    const myKey = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":0,"e":"admin@mail.com"}}');
    let activeUser = null;

    function doLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            updateUI();
            renderShop();
        } else { alert("Login Error!"); }
    }

    function updateUI() {
        document.getElementById('bal-val').innerText = users[activeUser].b.toLocaleString();
    }

    function payWithPaystack() {
        const amt = prompt("Amount (₦):");
        if(!amt || isNaN(amt)) return;
        
        let handler = PaystackPop.setup({
            key: myKey,
            email: users[activeUser].e,
            amount: amt * 100,
            currency: "NGN",
            callback: function(res) {
                users[activeUser].b += parseInt(amt);
                localStorage.setItem('sys_users', JSON.stringify(users));
                updateUI();
                alert("Deposit Success!");
            }
        });
        handler.openIframe();
    }

    function renderShop() {
        const categories = {
            "Facebook Logs": [
                {n:"Facebook with create profile", p:8000},
                {n:"Facebook already created Profile", p:5500}
            ],
            "Aged Accounts": [
                {n:"Aged Facebook (2014)", p:10000},
                {n:"Aged Instagram", p:8500},
                {n:"Aged Twitter (2012)", p:12000}
            ]
        };
        
        let html = '';
        for(let cat in categories) {
            html += `<div class="category-header">${cat}</div><div class="product-list">`;
            categories[cat].forEach(i => {
                html += `<div class="card">
                    <h3>${i.n}</h3>
                    <div class="price">₦${i.p.toLocaleString()}</div>
                    <button class="btn-blue" style="padding:10px; font-size:12px;">Buy Now</button>
                </div>`;
            });
            html += `</div>`;
        }
        document.getElementById('shop-content').innerHTML = html;
    }
</script>
</body>
</html>
