<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | ELITE TERMINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0b0e; color: #eee; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; }
        
        /* SEARCH & NAV */
        .navbar { background: #16161a; padding: 15px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; gap: 10px; }
        .search-bar { flex: 1; min-width: 200px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 40px 10px 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; }

        /* SIDEBAR & CONTENT */
        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; }
        .cat-item { padding: 12px; border-radius: 8px; cursor: pointer; color: #ccc; margin-bottom: 5px; font-size: 14px; border-left: 3px solid transparent; }
        .cat-item:hover { background: #1a1a20; border-left: 3px solid #0070f3; }

        .main-content { flex: 1; padding: 25px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: left; }
        
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; margin-top: 10px; }
        .btn-view { background: #d32f2f; color: #fff; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; }
        .forgot-link { color: #888; font-size: 13px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom:10px;">SUBBY LOGS</h1>
        <p style="color:#888; margin-bottom:20px;">Welcome Back Officer</p>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <div style="margin-top:15px; display:flex; justify-content: space-between;">
            <span class="forgot-link" onclick="toggleAuth('signup')">Create Account</span>
            <span class="forgot-link" onclick="toggleAuth('forgot')">Forgot Password?</span>
        </div>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2 style="color:#0070f3;">Join Terminal</h2>
        <p style="color:#888; margin-bottom:15px; font-size:12px;">Set a Secret Word to recover account later!</p>
        <input type="text" id="reg-u" placeholder="Choose Username">
        <input type="password" id="reg-p" placeholder="Choose Password">
        <input type="text" id="reg-s" placeholder="Secret Recovery Word (e.g. MyDogName)">
        <button class="btn-blue" onclick="processSignup()">CREATE ACCOUNT</button>
        <p class="forgot-link" onclick="toggleAuth('login')" style="margin-top:10px;">Back to Login</p>
    </div>

    <div class="auth-card" id="forgot-box" style="display:none;">
        <h2 style="color:#ffcc00;">Account Recovery</h2>
        <p style="color:#888; margin-bottom:15px; font-size:12px;">Enter username and your secret word.</p>
        <input type="text" id="for-u" placeholder="Your Username">
        <input type="text" id="for-s" placeholder="Your Secret Word">
        <input type="password" id="for-new-p" placeholder="New Password">
        <button class="btn-blue" style="background:#ffcc00; color:#000;" onclick="processReset()">RESET PASSWORD</button>
        <p class="forgot-link" onclick="toggleAuth('login')" style="margin-top:10px;">Back to Login</p>
    </div>
</div>
