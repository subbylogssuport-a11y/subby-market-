<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V29 FINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; overflow-x: hidden; }
        
        /* AUTH GATE */
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid #0070f3; padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* NAVBAR & BALANCE */
        .navbar { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .bal-pill { background: #000; border: 1px solid #0070f3; padding: 6px 15px; border-radius: 20px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        
        /* MARKET GRID */
        .grid { padding: 15px; display: grid; gap: 15px; padding-bottom: 100px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 18px; position: relative; }
        .buy-btn { width: 100%; padding: 12px; border-radius: 10px; background: #0070f3; color: #fff; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* BOTTOM NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-item { color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-item.active { color: #0070f3; }

        /* LOGS VIEW */
        #logs-view { display: none; padding: 20px; padding-bottom: 100px; }
        .log-entry { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-family: monospace; font-size: 13px; color: #00ff00; position: relative; }
        .copy-log { position: absolute; top: 10px; right: 10px; color: #0070f3; font-size: 10px; border: 1px solid #0070f3; padding: 2px 5px; border-radius: 5px; }
    </style>
</head>
<body>

<audio id="anthem-player" loop><source src="no_long_talk.mp3" type="audio/mpeg"></audio>

<div id="auth-gate" class="gate-container">
    <div class="auth-card">
        <h1 style="color:#0070f3; margin-bottom:20px; font-size:24px;">SUBBY MARKET</h1>
        <input type="email" id="u-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="u-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleAuth()">LOGIN / SIGN UP</button>
        <p style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;" onclick="recoverPass()">Forgot Password?</p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div style="font-weight:900; color:#0070f3;">SUBBY MARKET</div>
        <div class="bal-pill">
            <span>₦<span id="bal-val">0</span></span>
            <span onclick="fundWallet()" style="color:#0070f3; cursor:pointer; font-size:22px; font-weight:bold;">+</span>
        </div>
    </div>
    
    <div id="market-view">
        <div class="grid" id="market-grid"></div>
    </div>

    <div id="logs-view">
        <h2 style="margin-bottom:20px; color:#0070f3;">My Purchased Logs</h2>
        <div id="logs-list"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-market" onclick="showTab('market')">MARKET</div>
        <div class="nav-item" id="nav-logs" onclick="showTab('logs')">MY LOGS</div>
        <div class="nav-item" onclick="window.open('https://wa.me/2348104565349')">SUPPORT</div>
    </div>
</div>

<script>
    let currentUser = null, balance = 0, myOrders = [];

    const items = [
        {id: 1, n: "UK Facebook 🇬🇧", p: 2500, s: 1, l: "USER: uk_log_88 | PASS: Subby2026_X"},
        {id: 2, n: "USA FB Newly Created", p: 1500, s: 2, l: "USER: us_fresh_12 | PASS: Market_99"},
        {id: 3, n: "Germany FB (Aged)", p: 5760, s: 0},
        {id: 4, n: "Instagram HD", p: 9000, s: 0},
        {id: 5, n: "Google Voice", p: 4500, s: 5, l: "GV_NUM: +1202555012 | PASS: voice_pass_1"}
    ];

    function handleAuth() {
        const email = document.getElementById('u-email').value.trim().toLowerCase();
        const pass = document.getElementById('u-pass').value.trim();
        if(!email.includes('@') || pass.length < 4) return alert("Enter valid credentials!");

        let savedPass = localStorage.getItem(`pass_${email}`);
        if(!savedPass) {
            localStorage.setItem(`pass_${email}`, pass);
            localStorage.setItem(`data_${email}`, JSON.stringify({b: 0, o: []}));
            alert("Account Registered!");
        } else if(pass !== savedPass) { return alert("Incorrect Password!"); }

        currentUser = email;
        loadUserData();
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('anthem-player').play().catch(e => console.log("Audio waiting for tap"));
        renderMarket(); renderLogs();
    }

    function loadUserData() {
        const data = JSON.parse(localStorage.getItem(`data_${currentUser}`));
        balance = data.b; myOrders = data.o;
        document.getElementById('bal-val').innerText = balance.toLocaleString();
    }

    function recoverPass() {
        const email = prompt("Enter registered email:");
        const pass = localStorage.getItem(`pass_${email.toLowerCase()}`);
        if(pass) alert("Your password is: " + pass);
        else alert("Email not found.");
    }

    function showTab(tab) {
        document.getElementById('market-view').style.display = tab === 'market' ? 'block' : 'none';
        document.getElementById('logs-view').style.display = tab === 'logs' ? 'block' : 'none';
        document.getElementById('nav-market').classList.toggle('active', tab === 'market');
        document.getElementById('nav-logs').classList.toggle('active', tab === 'logs');
    }

    function renderMarket() {
        document.getElementById('market-grid').innerHTML = items.map(i => `
            <div class="card">
                <p style="font-size:10px; color:${i.s>0?'#00ff00':'#ff4d4d'}; font-weight:bold;">${i.s>0?'IN STOCK':'SOLD OUT'}</p>
                <h3 style="margin:5px 0;">${i.n}</h3>
                <h2 style="color:#0070f3;">₦${i.p.toLocaleString()}</h2>
                <button class="buy-btn" onclick="buyItem(${i.id})" ${i.s===0?'disabled style="opacity:0.4"':''}>BUY NOW</button>
            </div>`).join('');
    }

    function renderLogs() {
        document.getElementById('logs-list').innerHTML = myOrders.length ? 
            myOrders.map(o => `<div class="log-entry"><span class="copy-log" onclick="copyLog('${o.l}')">COPY</span><strong>${o.n}</strong><br>${o.l}</div>`).join('') : 
            "<p style='color:#555;'>No logs found. Buy something!</p>";
    }

    function buyItem(id) {
        const item = items.find(i => i.id === id);
        if(balance < item.p) return alert("Insufficient Balance! Use [+] to Top Up.");
        balance -= item.p;
        myOrders.unshift({n: item.n, l: item.l}); // Newest on top
        localStorage.setItem(`data_${currentUser}`, JSON.stringify({b: balance, o: myOrders}));
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        alert("Success! Log added to 'MY LOGS'.");
        renderLogs();
    }

    function copyLog(text) {
        navigator.clipboard.writeText(text);
        alert("Log copied!");
    }

    function fundWallet() {
        const amt = prompt("Enter amount to fund (₦):");
        if(amt && !isNaN(amt)) {
            balance += parseInt(amt);
            localStorage.setItem(`data_${currentUser}`, JSON.stringify({b: balance, o: myOrders}));
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            alert("Wallet Funded!");
        }
    }
</script>
</body>
</html>
