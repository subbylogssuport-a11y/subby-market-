<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    // WISE & MANNERLY BOT LOGIC
    function toggleBot() { 
        const win = document.getElementById('bot-window');
        win.style.display = win.style.display === 'none' ? 'block' : 'none';
    }

    function askBot() {
        const i = document.getElementById('bot-input'), l = document.getElementById('chat-logs'), q = i.value.toLowerCase();
        if(!q) return;
        l.innerHTML += `<div class="msg-user">${i.value}</div>`;
        i.value = "";
        
        let r = "I humble myself before your inquiry, but for such specific wisdom, you must consult our masters on WhatsApp.";
        
        if(q.includes("hi") || q.includes("hello")) r = "Greetings, noble user! It is an honor to serve you. How may I assist your journey today?";
        if(q.includes("fund")) r = "To increase your wealth, simply click the '+' icon. Paystack will guide your tribute safely to your wallet.";
        if(q.includes("copy")) r = "Your treasures are stored in 'MY LOGS'. Simply click the COPY button to claim them.";
        if(q.includes("wrong") || q.includes("issue")) r = "I am deeply sorry for any inconvenience. Please reach out to support so we may restore your peace of mind.";

        setTimeout(() => { 
            l.innerHTML += `<div class="msg-ai">${r}</div>`; 
            l.scrollTop = l.scrollHeight; 
        }, 600);
    }

    // AUTH LOGIC
    async function handleAuth() {
        const u = document.getElementById('reg-user').value.trim().toLowerCase();
        const e = document.getElementById('email').value.trim(), p = document.getElementById('pass').value;
        const isReg = document.getElementById('atitle').innerText === "REGISTER";
        try {
            if(isReg) {
                if(!u) return alert("Username required");
                const uSnap = await db.ref('usernames/'+u).once('value');
                if(uSnap.exists()) return alert("Username taken!");
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/'+res.user.uid).set({ email: e, username: u, bal: 0 });
                await db.ref('usernames/'+u).set(res.user.uid);
            } else { await auth.signInWithEmailAndPassword(e, p); }
        } catch(err) { alert(err.message); }
    }

    function toggleAuth() {
        const isL = document.getElementById('atitle').innerText === "SIGN IN";
        document.getElementById('atitle').innerText = isL ? "REGISTER" : "SIGN IN";
        document.getElementById('reg-user').style.display = isL ? "block" : "none";
        document.getElementById('forgot-link').style.display = isL ? "none" : "block";
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            document.getElementById('bot-head').style.display='flex';
            db.ref('users/'+user.uid+'/bal').on('value', s => document.getElementById('bal').innerText = (s.val() || 0).toLocaleString());
            db.ref('market').on('value', renderMarket);
            renderMyLogs();
            // Initial wise greeting
            document.getElementById('chat-logs').innerHTML = `<div class="msg-ai">Welcome back. May wisdom and success follow your transactions today. How can I help?</div>`;
        }
    });

    // FIXED PAYSTACK FUNCTION
    function pay() {
        const amt = prompt("Amount to fund (min ₦100):");
        if(!amt || amt < 100) return;

        // The logic was missing the correct Pop instance handling
        const handler = PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: auth.currentUser.email,
            amount: amt * 100, // Amount in kobo
            currency: "NGN",
            callback: function(response) {
                // This runs after successful payment
                db.ref('users/'+auth.currentUser.uid).once('value', s => {
                    const currentBal = s.val().bal || 0;
                    db.ref('users/'+auth.currentUser.uid).update({ 
                        bal: currentBal + parseInt(amt) 
                    });
                });
                alert("Payment successful! Your wallet has been blessed with ₦" + amt);
            },
            onClose: function() {
                alert("Payment window closed.");
            }
        });
        handler.openIframe();
    }

    // MARKET & LOGS
    function renderMarket() {
        db.ref('market').once('value', s => {
            const items = s.val() || {}, term = document.getElementById('searchInput').value.toLowerCase();
            let h = "", adminH = "";
            for(let k in items) {
                const count = items[k].data ? items[k].data.length : 0;
                if(items[k].name.toLowerCase().includes(term)) {
                    h += `<div class="log-item"><span class="stock-tag">${count} STOCK</span><h3>${items[k].name}</h3><h2 style="color:var(--primary); margin:12px 0;">₦${items[k].price}</h2><button class="btn" onclick="buyLog('${k}', ${items[k].price})" ${count === 0 ? 'disabled style="background:#e2e8f0; color:#94a3b8"' : ''}>${count > 0 ? 'PURCHASE' : 'OUT OF STOCK'}</button></div>`;
                }
                adminH += `<div class="admin-item"><span>${items[k].name}</span><button onclick="deleteItem('${k}')" style="color:red; border:none; background:none; font-weight:bold;">DELETE</button></div>`;
            }
            document.getElementById('market-list').innerHTML = h;
            document.getElementById('admin-delete-list').innerHTML = adminH;
        });
    }

    async function buyLog(id, price) {
        const uid = auth.currentUser.uid;
        const uSnap = await db.ref('users/'+uid).once('value');
        if(uSnap.val().bal < price) return alert("Insufficient balance.");
        const logSnap = await db.ref('market/'+id).once('value');
        let stock = logSnap.val().data;
        const item = stock.shift();
        await db.ref('market/'+id).update({ data: stock });
        await db.ref('users/'+uid).update({ bal: uSnap.val().bal - price });
        await db.ref('purchases/'+uid).push({ name: logSnap.val().name, data: item, date: new Date().toLocaleDateString() });
        alert("Purchase successful!");
        switchTab('logs');
    }

    function renderMyLogs() {
        db.ref('purchases/'+auth.currentUser.uid).on('value', s => {
            const logs = s.val() || {};
            let h = "";
            for(let k in logs) h += `<div class="purchased-item"><div><b>${logs[k].name}</b><br><small style="color:#94a3b8">${logs[k].date}</small></div><button class="copy-btn" onclick="copyToClipboard(this, '${logs[k].data}')">COPY</button></div>`;
            document.getElementById('my-logs-list').innerHTML = h || "<p style='text-align:center; padding-top:40px; color:#cbd5e1;'>No items yet.</p>";
        });
    }

    function copyToClipboard(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "COPIED!"; btn.classList.add('success');
            setTimeout(() => { btn.innerText = "COPY"; btn.classList.remove('success'); }, 2500);
        });
    }

    function switchTab(t) {
        document.getElementById('view-market').style.display = t === 'market' ? 'block' : 'none';
        document.getElementById('view-logs').style.display = t === 'logs' ? 'block' : 'none';
        document.getElementById('tab-m').className = t === 'market' ? 'tab active' : 'tab';
        document.getElementById('tab-l').className = t === 'logs' ? 'tab active' : 'tab';
    }
    function openSupport() { document.getElementById('support-screen').style.display='flex'; }
    function checkAdmin() { if(prompt("PIN") === "1710") document.getElementById('admin-gate').style.display='flex'; }
</script>
