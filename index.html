<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V33 FINAL</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --bg: #000; --card: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #eee; min-height: 100vh; }

        .easter-banner { background: linear-gradient(90deg, #ff0080, #7928ca); color: white; text-align: center; padding: 12px; font-size: 13px; font-weight: 800; }

        /* AUTH GATES */
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; text-align: center; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* NAV & SEARCH */
        .navbar { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .bal-pill { background: #000; border: 1px solid var(--primary); padding: 8px 18px; border-radius: 25px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .search-bar { width: 92%; margin: 15px 4%; padding: 12px 20px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; outline: none; }

        /* MARKET GRID */
        .grid { padding: 0 15px 100px 15px; display: grid; gap: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; position: relative; }
        .stock-tag { font-size: 11px; font-weight: 900; margin-bottom: 8px; display: block; }

        /* LOGS VIEW */
        #logs-view { display: none; padding: 20px 15px 100px 15px; }
        .log-box { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; position: relative; }
        .copy-btn { position: absolute; right: 10px; top: 10px; background: var(--primary); color: #fff; border: none; padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-item { color: #555; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; text-align: center; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h1 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGIN</h1>
        <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
        <p style="color:#555; font-size:11px; margin-top:15px; cursor:pointer;" onclick="showGate('reg-gate')">New? <span style="color:var(--primary)">Create Account</span></p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h1 style="color:var(--primary); margin-bottom:20px;">SIGN UP</h1>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Create Password">
        <button class="auth-btn" onclick="handleRegister()">CREATE ACCOUNT</button>
        <p style="color:#555; font-size:11px; margin-top:15px; cursor:pointer;" onclick="showGate('login-gate')">Already have an account? <span style="color:var(--primary)">Login</span></p>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="easter-banner">🐰 HAPPY EASTER SUBBY MARKET LAUNCH 🐰</div>
    <div class="navbar">
        <div style="font-weight:900; color:var(--primary); font-size: 18px;">SUBBY MARKET</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWalletReal()" style="color:var(--primary); cursor:pointer; font-size:20px; font-weight:bold;">+</span></div>
    </div>

    <div id="market-view">
        <input type="text" id="market-search" class="search-bar" placeholder="🔍 Search for cards..." oninput="filterMarket()">
        <div class="grid" id="market-grid"></div>
    </div>

    <div id="logs-view">
        <h2 style="color:var(--primary); margin-bottom:20px;">My Purchased Logs</h2>
        <div id="logs-list"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="btn-market" onclick="showTab('market')">MARKET</div>
        <div class="nav-item" id="btn-logs" onclick="showTab('logs')">MY LOGS</div>
        <div class="nav-item" onclick="window.open('https://wa.me/2348104565349')">SUPPORT</div>
    </div>
</div>

<script>
    let currentUser = null, balance = 0, myOrders = [];

    const items = [
        {id: 1, n: "UK Facebook 🇬🇧", p: 2500, s: 15, log: "UK_LOG_XYZ / PASS: 123"},
        {id: 2, n: "USA FB Newly Created", p: 1500, s: 8, log: "USA_LOG_ABC / PASS: 456"},
        {id: 3, n: "Random FB Logs", p: 1000, s: 20, log: "RAND_LOG_789 / PASS: 000"}
    ];

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!email.includes('@')) return alert("Invalid Email");
        localStorage.setItem(`user_${email}`, JSON.stringify({pass: pass, bal: 0, orders: []}));
        alert("Account Created! Please Login.");
        showGate('login-gate');
    }

    function handleLogin() {
        const email = document.getElementById('log-email').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value.trim();
        const stored = JSON.parse(localStorage.getItem(`user_${email}`));

        if(stored && stored.pass === pass) {
            currentUser = email;
            balance = stored.bal;
            myOrders = stored.orders || [];
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderMarket(items);
            renderLogs();
        } else {
            alert("Wrong credentials!");
        }
    }

    function showTab(tab) {
        document.getElementById('market-view').style.display = tab === 'market' ? 'block' : 'none';
        document.getElementById('logs-view').style.display = tab === 'logs' ? 'block' : 'none';
        document.getElementById('btn-market').classList.toggle('active', tab === 'market');
        document.getElementById('btn-logs').classList.toggle('active', tab === 'logs');
    }

    function renderMarket(data) {
        document.getElementById('market-grid').innerHTML = data.map(i => `
            <div class="card">
                <span class="stock-tag" style="color:${i.s>0?'#00ff00':'#ff4d4d'}">• ${i.s} IN STOCK</span>
                <h3 style="margin-bottom:8px;">${i.n}</h3>
                <h2 style="color:var(--primary); margin-bottom:15px;">₦${i.p.toLocaleString()}</h2>
                <button class="auth-btn" style="height:45px;" ${i.s===0?'disabled':''} onclick="buyItem(${i.id})">BUY NOW</button>
            </div>`).join('');
    }

    function renderLogs() {
        const list = document.getElementById('logs-list');
        if(myOrders.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:50px; color:#555;">You have not purchased any logs yet.</div>`;
        } else {
            list.innerHTML = myOrders.map(o => `
                <div class="log-box">
                    <button class="copy-btn" onclick="copyText('${o.data}')">COPY</button>
                    <strong>${o.name}</strong><br>
                    <span style="color:#00ff00; font-size:12px;">${o.data}</span>
                </div>`).join('');
        }
    }

    function buyItem(id) {
        const item = items.find(i => i.id === id);
        if(balance < item.p) return alert("Insufficient Balance!");
        balance -= item.p;
        item.s -= 1;
        myOrders.unshift({name: item.n, data: item.log});
        updateStorage();
        renderMarket(items);
        renderLogs();
        alert("Purchase Successful! Check 'MY LOGS'.");
    }

    function updateStorage() {
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        let stored = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        stored.bal = balance;
        stored.orders = myOrders;
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(stored));
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Login Details Copied!");
    }

    function filterMarket() {
        const query = document.getElementById('market-search').value.toLowerCase();
        const filtered = items.filter(i => i.n.toLowerCase().includes(query));
        renderMarket(filtered);
    }

    function fundWalletReal() {
        const amt = prompt("Amount (₦):");
        if(!amt) return;
        let handler = PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser,
            amount: amt * 100,
            currency: 'NGN',
            callback: function(res) {
                balance += parseInt(amt);
                updateStorage();
                alert("Deposit Successful!");
            }
        });
        handler.openIframe();
    }
</script>
</body>
</html>
