<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | SECURE</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #1a1a2e, #000000); color: #eee; min-height: 100vh; }

        /* --- AUTH GATE STYLES --- */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #16161a; border: 1px solid #222; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .auth-card h2 { color: #0070f3; margin-bottom: 20px; font-size: 24px; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .auth-link { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; display: block; margin-top: 10px; }

        /* --- MAIN SHOP STYLES --- */
        #main-app { display: none; }
        .navbar { background: rgba(22, 22, 26, 0.85); backdrop-filter: blur(12px); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 20px; font-weight: 900; color: #0070f3; }
        .bal-pill { background: #111; border: 1px solid #0070f3; padding: 6px 14px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .plus-btn { background: #0070f3; color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; }
        .grid { padding: 15px; }
        .card { background: linear-gradient(145deg, #16161a, #0c0c0e); border: 1px solid #222; border-radius: 20px; padding: 22px; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 900; color: #0070f3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card" id="login-form">
            <h2>Login</h2>
            <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="log-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
            <span class="auth-link" onclick="toggleAuth('signup')">Create Account</span>
            <span class="auth-link" onclick="toggleAuth('forgot')">Forgot Password?</span>
        </div>

        <div class="auth-card" id="signup-form" style="display:none;">
            <h2>Sign Up</h2>
            <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="reg-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleSignUp()">Get Code</button>
            <span class="auth-link" onclick="toggleAuth('login')">Back to Login</span>
        </div>

        <div class="auth-card" id="forgot-form" style="display:none;">
            <h2>Reset Access</h2>
            <p style="font-size:12px; color:#888; margin-bottom:10px;">Enter your registered email</p>
            <input type="email" id="forgot-email" class="auth-input" placeholder="Email Address">
            <button class="auth-btn" onclick="handleForgot()">Send Reset Code</button>
            <span class="auth-link" onclick="toggleAuth('login')">Back to Login</span>
        </div>

        <div class="auth-card" id="otp-form" style="display:none;">
            <h2 id="otp-title">Verify</h2>
            <input type="text" id="otp-input" class="auth-input" placeholder="Enter 6-digit code">
            <div id="reset-pass-area" style="display:none;">
                <input type="password" id="new-pass" class="auth-input" placeholder="Enter New Password">
            </div>
            <button class="auth-btn" id="otp-action-btn" onclick="verifyOTP()">Verify</button>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div class="brand">SUBBY MARKET</div>
            <div class="bal-pill">₦<span id="bal-val">0</span> <button class="plus-btn" onclick="fundWallet()">+</button></div>
        </div>
        <div style="padding:15px; font-size:14px; color:#0070f3;">User: <span id="user-display"></span></div>
        <div class="grid" id="market-grid"></div>
    </div>

<script>
    let currentBalance = 0;
    let generatedOTP = "";
    let tempUser = {};
    let isResetMode = false;

    function toggleAuth(view) {
        const forms = ['login-form', 'signup-form', 'forgot-form', 'otp-form'];
        forms.forEach(f => document.getElementById(f).style.display = 'none');
        document.getElementById(view + '-form').style.display = 'block';
    }

    function handleSignUp() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        if(!email || !pass) return alert("Fill all fields");
        
        isResetMode = false;
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        tempUser = { email, pass };
        alert("SECURITY CODE: " + generatedOTP);
        toggleAuth('otp');
    }

    function handleForgot() {
        const email = document.getElementById('forgot-email').value;
        const saved = JSON.parse(localStorage.getItem('subby_user'));
        
        if(saved && saved.email === email) {
            isResetMode = true;
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            alert("RECOVERY CODE: " + generatedOTP);
            document.getElementById('otp-title').innerText = "Reset Password";
            toggleAuth('otp');
        } else {
            alert("Email not found in our database!");
        }
    }

    function verifyOTP() {
        const input = document.getElementById('otp-input').value;
        if(input !== generatedOTP) return alert("Invalid Code!");

        if(isResetMode) {
            document.getElementById('otp-input').style.display = 'none';
            document.getElementById('reset-pass-area').style.display = 'block';
            document.getElementById('otp-action-btn').innerText = "Save New Password";
            document.getElementById('otp-action-btn').onclick = saveNewPassword;
        } else {
            localStorage.setItem('subby_user', JSON.stringify(tempUser));
            startApp(tempUser.email);
        }
    }

    function saveNewPassword() {
        const newPass = document.getElementById('new-pass').value;
        if(!newPass) return alert("Enter password");
        
        let saved = JSON.parse(localStorage.getItem('subby_user'));
        saved.pass = newPass;
        localStorage.setItem('subby_user', JSON.stringify(saved));
        
        alert("Password updated successfully!");
        location.reload(); 
    }

    function handleLogin() {
        const email = document.getElementById('log-email').value;
        const pass = document.getElementById('log-pass').value;
        const saved = JSON.parse(localStorage.getItem('subby_user'));
        if(saved && saved.email === email && saved.pass === pass) {
            startApp(email);
        } else { alert("Incorrect details!"); }
    }

    function startApp(email) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('user-display').innerText = email;
        renderShop();
    }

    function renderShop() {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = `
            <div class="card">
                <span style="color:#ff4d4d; font-size:10px;">SOLD OUT</span>
                <h3>Premium Logs Pack</h3>
                <div class="price">₦8,000</div>
                <button class="buy-btn" disabled>UNAVAILABLE</button>
            </div>`;
    }

    function fundWallet() {
        const amt = prompt("Amount (₦):");
        if(!amt) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: 'user@subbymarket.com',
            amount: amt * 100,
            callback: () => {
                currentBalance += parseInt(amt);
                document.getElementById('bal-val').innerText = currentBalance.toLocaleString();
            }
        }).openIframe();
    }
</script>
</body>
</html>
