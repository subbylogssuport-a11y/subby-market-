<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | OFFICIAL MARKET</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; overflow-x: hidden; width: 100%; min-height: 100vh; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* NAVBAR */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; text-decoration: none; }

        /* SIDEBAR */
        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; user-select: none; }
        .cat-item { padding: 12px; border-radius: 8px; color: #ccc; margin-bottom: 5px; font-size: 13px; border-left: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .cat-item:hover, .cat-active { background: #1a1a20; border-left: 3px solid #0070f3; color: #fff; }

        /* SUPPORT */
        .support-box { margin-top: 30px; padding: 15px; background: rgba(0, 112, 243, 0.05); border-radius: 12px; border: 1px solid #222; }
        .support-link { display: block; color: #0070f3; font-size: 12px; text-decoration: none; margin-bottom: 12px; font-weight: bold; }

        /* PRODUCTS */
        .main-content { flex: 1; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: left; transition: 0.3s; }
        .stock-tag { font-size: 10px; color: #d32f2f; font-weight: bold; margin-bottom: 8px; display: block; }
        
        /* BUTTONS */
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 700; font-size: 15px; margin-top: 10px; }
        .btn-disabled { background: #222; color: #444; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: not-allowed; font-weight: bold; margin-top: 15px; width: 100%; }
        .auth-nav-btn { background: #222; border: 1px solid #333; color: #0070f3; font-size: 12px; cursor: pointer; padding: 10px; border-radius: 8px; width: 48%; }
        
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 20px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN TO TERMINAL</button>
        <div style="margin-top:20px; display:flex; justify-content: space-between;">
            <button class="auth-nav-btn" onclick="toggleAuth('signup')">Create Account</button>
            <button class="auth-nav-btn" onclick="openReset()">Forgot Access?</button>
        </div>
    </div>
    </div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span> <button onclick="deposit()" style="padding:4px 12px; background:#0070f3; color:#fff; border:none; border-radius:4px; margin-left:10px; cursor:pointer; font-weight:bold;">+</button></div>
    </div>

    <div class="content-wrapper">
        <div class="sidebar">
            <div class="cat-item" style="color:#555; font-weight:bold; cursor:default;">CATEGORIES</div>
            <div class="cat-item cat-active" onclick="filterShop('all')">Show All</div>
            <div class="cat-item" onclick="filterShop('twitter')">Aged Twitter</div>
            <div class="cat-item" onclick="filterShop('instagram')">Aged Instagram</div>
            <div class="cat-item" onclick="filterShop('facebook')">Facebook Logs</div>
            <div class="cat-item" onclick="filterShop('tiktok')">TikTok / Snapchat</div>
            <div class="cat-item" onclick="filterShop('textnow')">TextNow / TextFree</div>
            <div class="cat-item" onclick="filterShop('telegram')">Telegram / WhatsApp</div>
            
            <div class="support-box">
                <a href="mailto:subbylogssuport@gmail.com" class="support-link">📧 subbylogssuport@gmail.com</a>
                <a href="https://wa.me/2347048141378" class="support-link" target="_blank">💬 WhatsApp Support</a>
            </div>
        </div>

        <div class="main-content">
            <h2 id="cat-display-name" style="margin-bottom:15px; font-size:18px; color:#0070f3;">All Products</h2>
            <div class="product-grid" id="shop-grid">
                </div>
        </div>
    </div>
</div>

<script>
    const P_KEY = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';
    let activeUser = null;

    const products = [
        { name: "Aged Twitter (2012)", price: "4,000", cat: "twitter" },
        { name: "Twitter High Follower", price: "15,000", cat: "twitter" },
        { name: "Instagram Aged Log", price: "3,500", cat: "instagram" },
        { name: "Facebook Aged (2015)", price: "5,000", cat: "facebook" },
        { name: "TextNow USA Account", price: "2,500", cat: "textnow" },
        { name: "TikTok High Activity", price: "4,500", cat: "tiktok" },
        { name: "Telegram Session", price: "3,000", cat: "telegram" }
    ];

    function filterShop(category) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        document.getElementById('cat-display-name').innerText = category.toUpperCase();

        products.forEach(p => {
            if (category === 'all' || p.cat === category) {
                grid.innerHTML += `
                    <div class="product-card">
                        <span class="stock-tag">IN STOCK: 0</span>
                        <h3>${p.name}</h3>
                        <div style="color:#0070f3; font-size:20px; font-weight:800; margin-top:10px;">₦${p.price}</div>
                        <button class="btn-disabled">NOT AVAILABLE</button>
                    </div>`;
            }
        });
    }

    // Initial load
    filterShop('all');

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        let users = JSON.parse(localStorage.getItem('sys_users') || '{}');
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
        } else { alert("Login failed!"); }
    }

    function deposit() {
        const amount = prompt("Enter Amount to Deposit (₦):");
        if (!amount || isNaN(amount) || amount <= 0) return;

        const handler = PaystackPop.setup({
            key: P_KEY,
            email: activeUser + "@subbymarket.com",
            amount: amount * 100,
            currency: "NGN",
            callback: function(res) {
                let users = JSON.parse(localStorage.getItem('sys_users'));
                users[activeUser].b += parseInt(amount);
                localStorage.setItem('sys_users', JSON.stringify(users));
                document.getElementById('bal').innerText = users[activeUser].b.toLocaleString();
                alert("Deposit Success!");
            }
        });
        handler.openIframe();
    }

    function toggleAuth(box) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('signup-box').style.display = 'none';
        document.getElementById(box + '-box').style.display = 'block';
    }
</script>
</body>
</html>
