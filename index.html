<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | V85 ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --whatsapp: #25d366; --red: #ff4d4d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; overflow-x: hidden; padding-bottom: 80px; }
        
        /* Auth & Admin Overlays */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-ui { background: #111; border: 1px solid #222; padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; }
        
        input, textarea { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* Main App UI */
        .nav { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .log-item { background: #16171d; padding: 20px; border-radius: 20px; border: 1px solid #222; margin: 15px; }
        .purchased-item { background: #1c1e26; padding: 15px; border-radius: 12px; margin: 10px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        /* Support Screen Styles */
        .support-overlay { position: fixed; inset: 0; background: rgba(10, 11, 16, 0.98); backdrop-filter: blur(15px); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s ease; }
        .support-option { background: #16171d; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; text-decoration: none; width: 100%; max-width: 350px; transition: 0.3s; }
        .support-option:active { transform: scale(0.95); }
        .icon-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; border: 2px solid; }
        .icon-whatsapp { border-color: #25d366; color: #25d366; }
        .icon-email { border-color: var(--primary); color: var(--primary); }
        
        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0a0b10; border-top: 1px solid #222; padding: 15px; justify-content: space-around; z-index: 500; }
        .tab { color: #555; font-weight: bold; font-size: 11px; cursor: pointer; text-align: center; }
        .tab.active { color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-gate" class="overlay">
    <div class="card-ui">
        <h2 id="atitle" style="color:var(--primary); margin-bottom:15px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()" id="abtn">SIGN IN</button>
        <p onclick="toggleAuth()" style="color:var(--gold); font-size:12px; margin-top:15px; cursor:pointer;" id="atog">New? Create Account</p>
    </div>
</div>

<div id="admin-gate" class="overlay" style="display:none; z-index:11000;">
    <div class="card-ui" style="max-height: 90vh; overflow-y: auto;">
        <h2 style="color:var(--gold)">ADMIN PANEL</h2>
        <input id="adm-mail" placeholder="User Email">
        <input id="adm-amt" placeholder="Amount ₦" type="number">
        <button class="btn" onclick="adminSendMoney()">SEND MONEY</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
        <input id="log-name" placeholder="Stock Name">
        <input id="log-price" placeholder="Price ₦" type="number">
        <textarea id="log-data" placeholder="Account Data..."></textarea>
        <button class="btn" style="background:var(--gold); color:#000" onclick="adminUpload()">UPLOAD STOCK</button>
        <button class="btn" style="background:#222;" onclick="closeAdmin()">CLOSE</button>
    </div>
</div>

<div id="support-screen" class="support-overlay">
    <h2 style="color:white; margin-bottom:30px;">CONTACT SUPPORT</h2>
    <a href="https://wa.me/2347048141378" target="_blank" class="support-option">
        <div class="icon-circle icon-whatsapp">W</div>
        <div style="text-align:left"><b style="color:white;display:block">WhatsApp</b><span style="color:#777;font-size:12px">Fast Response</span></div>
    </a>
    <a href="mailto:subbylogssupport@gmail.com" class="support-option">
        <div class="icon-circle icon-email">E</div>
        <div style="text-align:left"><b style="color:white;display:block">Email Support</b><span style="color:#777;font-size:12px">Official Inquiry</span></div>
    </a>
    <div onclick="closeSupport()" class="support-option" style="border-style:dashed; margin-top:20px; justify-content:center;">
        <b style="color:var(--red)">BACK TO APP</b>
    </div>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <b style="color:var(--primary)" ondblclick="checkAdmin()">SUBBY LOGS</b>
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="color:var(--gold); font-weight:900;">₦<span id="bal">0</span></div>
            <button class="btn" style="width:auto; padding:5px 10px; margin:0;" onclick="logout()">EXIT</button>
        </div>
    </div>

    <div id="view-market">
        <div style="padding:15px;"><input type="text" id="searchInput" placeholder="Search cards..." oninput="renderMarket()"></div>
        <div id="market-list"></div>
    </div>

    <div id="view-logs" style="display:none; padding:15px;">
        <h2 style="color:var(--primary); margin-bottom:15px;">MY ACCOUNTS</h2>
        <div id="my-logs-list"></div>
    </div>

    <div class="tab-bar">
        <div onclick="switchTab('market')" id="tab-m" class="tab active">MARKET</div>
        <div onclick="switchTab('logs')" id="tab-l" class="tab">MY LOGS</div>
        <div onclick="openSupport()" class="tab">SUPPORT</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    // AUTH LOGIC
    async function handleAuth() {
        const e = document.getElementById('email').value.trim(), p = document.getElementById('pass').value;
        if(!e || !p) return alert("Enter details");
        try {
            if(document.getElementById('atitle').innerText === "LOGIN") {
                await auth.signInWithEmailAndPassword(e,p);
            } else {
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/' + res.user.uid).set({ email: e, bal: 0 });
            }
        } catch(err) { alert(err.message); }
    }

    function toggleAuth() {
        const isLogin = document.getElementById('atitle').innerText === "LOGIN";
        document.getElementById('atitle').innerText = isLogin ? "REGISTER" : "LOGIN";
        document.getElementById('abtn').innerText = isLogin ? "CREATE" : "SIGN IN";
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            sync();
        }
    });

    // DATA SYNC
    function sync() {
        const uid = auth.currentUser.uid;
        db.ref('users/' + uid + '/bal').on('value', s => {
            document.getElementById('bal').innerText = (s.val() || 0).toLocaleString();
        });
        db.ref('market').on('value', renderMarket);
        renderMyLogs();
    }

    function renderMarket() {
        db.ref('market').once('value', s => {
            const items = s.val() || {};
            const term = document.getElementById('searchInput').value.toLowerCase();
            let h = "";
            for(let k in items) {
                if(items[k].name.toLowerCase().includes(term)) {
                    h += `<div class="log-item">
                        <h3>${items[k].name}</h3>
                        <h2 style="color:var(--primary)">₦${items[k].price}</h2>
                        <button class="btn" onclick="buyLog('${k}', ${items[k].price}, '${items[k].name}')">BUY NOW</button>
                    </div>`;
                }
            }
            document.getElementById('market-list').innerHTML = h;
        });
    }

    async function buyLog(id, price, name) {
        const uid = auth.currentUser.uid;
        const s = await db.ref('users/' + uid).once('value');
        const user = s.val();
        if(user.bal < price) return alert("Fund your wallet!");

        const logSnap = await db.ref('market/' + id).once('value');
        const logData = logSnap.val().data;

        await db.ref('users/' + uid).update({ bal: user.bal - price });
        await db.ref('purchases/' + uid).push({ name: name, data: logData, date: new Date().toLocaleDateString() });
        alert("Success! Check My Logs");
    }

    function renderMyLogs() {
        db.ref('purchases/' + auth.currentUser.uid).on('value', s => {
            const logs = s.val() || {};
            let h = "";
            for(let k in logs) {
                h += `<div class="purchased-item">
                    <div><b>${logs[k].name}</b><br><small>${logs[k].date}</small></div>
                    <button class="btn" style="width:auto; padding:5px 10px;" onclick="alert('DATA:\\n${logs[k].data}')">VIEW</button>
                </div>`;
            }
            document.getElementById('my-logs-list').innerHTML = h || "<p style='color:#444;text-align:center'>No logs yet</p>";
        });
    }

    // UI NAVIGATION
    function switchTab(tab) {
        const isMarket = tab === 'market';
        document.getElementById('view-market').style.display = isMarket ? 'block' : 'none';
        document.getElementById('view-logs').style.display = isMarket ? 'none' : 'block';
        document.getElementById('tab-m').classList.toggle('active', isMarket);
        document.getElementById('tab-l').classList.toggle('active', !isMarket);
    }

    function openSupport() { document.getElementById('support-screen').style.display = 'flex'; }
    function closeSupport() { document.getElementById('support-screen').style.display = 'none'; }

    // ADMIN TOOLS
    function checkAdmin() { if(prompt("ADMIN PIN") === "1710") document.getElementById('admin-gate').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-gate').style.display='none'; }
    
    async function adminSendMoney() {
        const email = document.getElementById('adm-mail').value.trim().toLowerCase();
        const amt = parseInt(document.getElementById('adm-amt').value);
        const users = await db.ref('users').once('value');
        let targetUid = null;
        users.forEach(c => { if(c.val().email.toLowerCase() === email) targetUid = c.key; });
        if(targetUid) {
            const newBal = (users.val()[targetUid].bal || 0) + amt;
            await db.ref('users/' + targetUid).update({ bal: newBal });
            alert("Sent!");
        } else { alert("User not found"); }
    }

    function adminUpload() {
        const n = document.getElementById('log-name').value, p = document.getElementById('log-price').value, d = document.getElementById('log-data').value;
        db.ref('market').push({ name: n, price: p, data: d });
        alert("Stock Added!");
    }
</script>
</body>
</html>
