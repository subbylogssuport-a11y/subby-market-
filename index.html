<script>
    let currentUser = null;
    let balance = 0;

    // --- 1. GLOBAL STOCK (EVERYONE SEES THIS) ---
    const globalStock = [
        { 
            id: 101, 
            c: "FACEBOOK", 
            n: "Random Facebook [NEWLY CREATED]", 
            p: 1000, 
            data: ["user1:pass1", "user2:pass2"] 
        }
    ];

    // --- 2. LOCAL STOCK (ONLY YOU SEE WHAT YOU UPLOAD VIA ADMIN) ---
    let localItems = JSON.parse(localStorage.getItem('subby_market_v2')) || [];
    
    // Combine both for the display
    let allItems = [...globalStock, ...localItems];

    // ... (Keep toggleIA and handleLogin functions) ...

    function renderMarket() {
        const grid = document.getElementById('market-grid');
        allItems = [...globalStock, ...localItems]; // Refresh the list
        let h = "";
        const cats = [...new Set(allItems.map(i => i.c))];
        
        cats.forEach(c => {
            h += `<div class="cat-header">${c}</div><div class="grid">`;
            allItems.filter(i => i.c === c).forEach(i => {
                const s = i.data.length;
                h += `<div class="card">
                    <span style="font-size:10px; color:${s>0?'#0f0':'#f00'}">● ${s>0?s+' LEFT':'SOLD'}</span>
                    <h3>${i.n}</h3>
                    <h2 style="color:var(--primary);">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" ${s==0?'disabled':''} onclick="buyItem(${i.id})">PURCHASE</button>
                </div>`;
            });
            h += `</div>`;
        });
        grid.innerHTML = h || `<div style="text-align:center; padding:100px 0;">No Stock</div>`;
    }

    // ADMIN PANEL RESTORED
    function addNewCard() {
        const c = document.getElementById('new-cat').value.trim().toUpperCase();
        const n = document.getElementById('new-name').value.trim();
        const p = parseInt(document.getElementById('new-price').value);
        const l = document.getElementById('new-logs').value.split('\n').filter(x => x.trim() !== "");
        
        if(!c || !n || !p || l.length === 0) return alert("Fill all fields!");

        const newItem = { id: Date.now(), c: c, n: n, p: p, data: l };
        localItems.push(newItem);
        localStorage.setItem('subby_market_v2', JSON.stringify(localItems));
        
        document.getElementById('new-logs').value = "";
        alert("UPLOADED TO YOUR DEVICE!");
        renderMarket();
        loadAdminList();
    }

    function deleteCard(id) {
        localItems = localItems.filter(x => x.id !== id);
        localStorage.setItem('subby_market_v2', JSON.stringify(localItems));
        renderMarket();
        loadAdminList();
    }
    
    function loadAdminList() {
        const container = document.getElementById('admin-list-container');
        container.innerHTML = localItems.map(i => `
            <div style="padding:10px; background:#111; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">
                <span>${i.n} (${i.data.length})</span>
                <button onclick="deleteCard(${i.id})" style="color:red; background:none; border:none;">X</button>
            </div>
        `).join('');
    }
</script>
