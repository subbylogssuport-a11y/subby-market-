<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | PRO MARKET</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; overflow-x: hidden; width: 100%; min-height: 100vh; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* NAVBAR */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; text-decoration: none; }

        /* SIDEBAR */
        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; user-select: none; }
        .cat-item { padding: 12px; border-radius: 8px; color: #ccc; margin-bottom: 5px; font-size: 13px; border-left: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .cat-item:hover, .cat-active { background: #1a1a20; border-left: 3px solid #0070f3; color: #fff; }

        /* PRODUCTS */
        .main-content { flex: 1; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: left; position: relative; }
        
        /* QUANTITY SELECTOR */
        .qty-box { display: flex; align-items: center; gap: 15px; margin-top: 15px; background: #000; width: fit-content; padding: 5px 15px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { color: #0070f3; font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; }
        .qty-val { font-weight: bold; min-width: 20px; text-align: center; }

        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 700; margin-top: 15px; }
        .stock-tag { font-size: 10px; color: #d32f2f; font-weight: bold; }
        
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 20px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" style="padding:16px;" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue" style="background:#222; margin-top:10px;" onclick="toggleAuth('signup')">Create Account</button>
    </div>
    </div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span> <button onclick="deposit()" style="padding:4px 12px; background:#0070f3; color:#fff; border:none; border-radius:4px; margin-left:10px; cursor:pointer;">+</button></div>
    </div>

    <div class="content-wrapper">
        <div class="sidebar">
            <div class="cat-item cat-active" onclick="filterShop('all')">Show All</div>
            <div class="cat-item" onclick="filterShop('facebook')">Facebook Logs</div>
            <div class="cat-item" onclick="filterShop('twitter')">Aged Twitter</div>
            <div class="cat-item" onclick="filterShop('instagram')">Aged Instagram</div>
            </div>

        <div class="main-content">
            <div class="product-grid" id="shop-grid">
                </div>
        </div>
    </div>
</div>

<script>
    const P_KEY = 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661';
    let activeUser = null;

    const products = [
        { id: 1, name: "Facebook Aged Log", price: 5000, cat: "facebook", stock: 0 },
        { id: 2, name: "Aged Twitter (X)", price: 4000, cat: "twitter", stock: 0 },
        { id: 3, name: "Instagram Aged Log", price: 3500, cat: "instagram", stock: 0 }
    ];

    function filterShop(category) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        products.forEach(p => {
            if (category === 'all' || p.cat === category) {
                grid.innerHTML += `
                    <div class="product-card">
                        <span class="stock-tag">STOCK: ${p.stock}</span>
                        <h3>${p.name}</h3>
                        <div style="color:#0070f3; font-size:20px; font-weight:800; margin-top:10px;">₦${p.price.toLocaleString()}</div>
                        
                        <div class="qty-box">
                            <span class="qty-btn" onclick="changeQty(${p.id}, -1)">-</span>
                            <span class="qty-val" id="qty-${p.id}">1</span>
                            <span class="qty-btn" onclick="changeQty(${p.id}, 1)">+</span>
                        </div>

                        <button class="btn-blue" onclick="attemptBuy(${p.id})">BUY NOW</button>
                    </div>`;
            }
        });
    }

    function changeQty(id, delta) {
        const el = document.getElementById(`qty-${id}`);
        let current = parseInt(el.innerText);
        if (current + delta >= 1) {
            el.innerText = current + delta;
        }
    }

    function attemptBuy(id) {
        const product = products.find(p => p.id === id);
        const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
        const total = product.price * qty;

        if (product.stock < qty) {
            alert(`Error: Only ${product.stock} items left in stock!`);
            return;
        }

        // Check user balance logic here...
        alert(`Requesting to buy ${qty} accounts. Total: ₦${total.toLocaleString()}`);
    }

    // Initial Login & Load
    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":0}}');
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            filterShop('all');
        } else { alert("Login failed!"); }
    }
</script>
</body>
</html>
