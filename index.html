<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | SECURE MARKET</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0e; color: #eee; min-height: 100vh; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* NAVBAR */
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: #0070f3; font-size: 20px; cursor: pointer; user-select: none; }

        .content-wrapper { display: flex; flex-direction: column; }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } .sidebar { width: 260px; min-height: 100vh; border-right: 1px solid #222; } }
        .sidebar { background: #16161a; padding: 20px; }
        .cat-item { padding: 12px; border-radius: 8px; color: #ccc; margin-bottom: 5px; cursor: pointer; border-left: 3px solid transparent; font-size: 14px; }
        .cat-item:hover, .active-cat { background: #1a1a20; border-left: 3px solid #0070f3; color: #fff; }

        .main-content { flex: 1; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .product-card { background: #16161a; border: 1px solid #222; border-radius: 12px; padding: 20px; }
        
        .qty-box { display: flex; align-items: center; gap: 15px; margin: 15px 0; background: #000; width: fit-content; padding: 5px 15px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { color: #0070f3; font-size: 22px; font-weight: bold; cursor: pointer; }

        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1 style="color:#0070f3; margin-bottom: 25px;">SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue" style="background:#222; margin-top:10px;" onclick="toggleAuth('signup')">Create Account</button>
    </div>
    </div>

<div id="main-site" style="display:none;">
    <div class="navbar">
        <div class="logo" onclick="adminClick()">SUBBY MARKET</div>
        <div style="font-weight:bold;">₦<span id="bal">0</span> <button onclick="deposit()" style="padding:4px 10px; background:#0070f3; color:#fff; border:none; border-radius:4px; margin-left:10px;">+</button></div>
    </div>

    <div class="content-wrapper">
        <div class="sidebar">
            <div class="cat-item active-cat" onclick="filterShop('all')">Show All</div>
            <div class="cat-item" onclick="filterShop('facebook')">Facebook Accounts</div>
            <div class="cat-item" onclick="filterShop('twitter')">Twitter (Aged)</div>
            <div class="cat-item" onclick="filterShop('telegram')">Telegram / WhatsApp</div>
        </div>
        <div class="main-content">
            <div class="product-grid" id="shop-grid"></div>
        </div>
    </div>
</div>

<div id="admin-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; overflow-y:auto;">
    <div style="max-width:500px; margin:auto; background:#16161a; padding:25px; border-radius:15px; border:1px solid #0070f3;">
        <h2 style="color:#0070f3;">Admin Control</h2>
        <select id="admin-cat" style="width:100%; padding:12px; margin:15px 0; background:#000; color:#fff; border:1px solid #333;">
            <option value="facebook">Facebook</option>
            <option value="twitter">Twitter</option>
            <option value="telegram">Telegram</option>
        </select>
        <textarea id="admin-logs" rows="8" placeholder="Paste logs here (one per line)"></textarea>
        <button class="btn-blue" onclick="saveLogs()">UPLOAD STOCK</button>
        <button class="btn-blue" style="background:#d32f2f; margin-top:10px;" onclick="hideAdmin()">EXIT ADMIN</button>
    </div>
</div>

<script>
    const MASTER_PW = "SubbyAdmin2026"; // CHANGE THIS TO YOUR PRIVATE PASSWORD
    let clickCount = 0;
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{"facebook":[], "twitter":[], "telegram":[]}');
    let activeUser = null;

    function adminClick() {
        clickCount++;
        if (clickCount >= 5) {
            const pw = prompt("Enter Master Admin Password:");
            if (pw === MASTER_PW) {
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("Access Denied!");
            }
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 3000); // Resets clicks if you are too slow
    }

    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function saveLogs() {
        const cat = document.getElementById('admin-cat').value;
        const newLogs = document.getElementById('admin-logs').value.trim().split('\n').filter(l => l !== '');
        inventory[cat] = [...(inventory[cat] || []), ...newLogs];
        localStorage.setItem('subby_stock', JSON.stringify(inventory));
        alert(`${newLogs.length} logs added to ${cat}!`);
        document.getElementById('admin-logs').value = '';
        filterShop('all');
    }

    // (Rest of the shop and buy logic from the previous version goes here)
    function filterShop(cat) {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        const prods = [
            {id:'facebook', name:'Facebook Aged', price:5000},
            {id:'twitter', name:'Twitter (Aged)', price:4000},
            {id:'telegram', name:'Telegram Session', price:3000}
        ];
        prods.forEach(p => {
            if(cat === 'all' || p.id === cat) {
                const count = inventory[p.id] ? inventory[p.id].length : 0;
                grid.innerHTML += `
                <div class="product-card">
                    <span style="color:${count > 0 ? '#0070f3' : '#d32f2f'}; font-size:11px; font-weight:bold;">Stock: ${count}</span>
                    <h3>${p.name}</h3>
                    <div style="color:#0070f3; font-size:22px; font-weight:900; margin-top:10px;">₦${p.price.toLocaleString()}</div>
                    <button class="btn-blue" onclick="buyLogs('${p.id}', ${p.price})">BUY NOW</button>
                </div>`;
            }
        });
    }

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        let users = JSON.parse(localStorage.getItem('sys_users') || '{"Admin":{"p":"123","b":1000000}}');
        if(users[u] && users[u].p === p) {
            activeUser = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            filterShop('all');
        } else { alert("Login failed!"); }
    }
</script>
</body>
</html>
