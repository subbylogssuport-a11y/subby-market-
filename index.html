<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | OFFICIAL LAUNCH</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #eee; min-height: 100vh; }
        .gate-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid #0070f3; padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 14px; background: #0070f3; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .switch-link { color: #888; font-size: 12px; margin-top: 20px; cursor: pointer; display: block; }
        
        #main-app { display: none; }
        .navbar { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .grid { padding: 15px; display: grid; gap: 15px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 18px; position: relative; }
        .price { font-size: 22px; font-weight: 900; color: #0070f3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 12px; border-radius: 10px; background: #0070f3; color: #fff; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="anthem-player" loop><source src="no_long_talk.mp3" type="audio/mpeg"></audio>

    <div id="login-gate" class="gate-container">
        <div class="auth-card">
            <h1 style="color:#0070f3; margin-bottom:20px;">SUBBY LOGIN</h1>
            <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="log-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
            <p class="switch-link" onclick="showGate('reg-gate')">Don't have an account? <span style="color:#0070f3;">Sign Up</span></p>
        </div>
    </div>

    <div id="reg-gate" class="gate-container" style="display:none;">
        <div class="auth-card">
            <h1 style="color:#0070f3; margin-bottom:20px;">CREATE ACCOUNT</h1>
            <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="reg-pass" class="auth-input" placeholder="Create Password">
            <button class="auth-btn" onclick="handleRegister()">REGISTER NOW</button>
            <p class="switch-link" onclick="showGate('login-gate')">Already have an account? <span style="color:#0070f3;">Login</span></p>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div style="font-weight:900; color:#0070f3;" onmousedown="startAdminTimer()">SUBBY MARKET</div>
            <div style="background:#000; border:1px solid #0070f3; padding:5px 15px; border-radius:20px; font-weight:bold;">₦<span id="bal-val">0</span></div>
        </div>
        <div class="grid" id="market-grid"></div>
        <div style="text-align:center; padding:30px;">
            <button class="auth-btn" style="background:#222; width:150px;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

<script>
    // Your Warehouse Items
    const items = [
        {n: "UK Facebook 🇬🇧", p: 2500, s: 1},
        {n: "Random FB Logs (Newly Created)", p: 1000, s: 2},
        {n: "USA Facebook Newly Created", p: 1500, s: 2},
        {n: "Instagram HD", p: 9000, s: 0},
        {n: "Aged Twitter", p: 10000, s: 0}
    ];

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!email.includes('@') || pass.length < 4) return alert("Valid email and password (min 4 chars) required!");
        
        localStorage.setItem(`user_pass_${email}`, pass);
        localStorage.setItem(`user_data_${email}`, JSON.stringify({ balance: 0, orders: [] }));
        alert("Registration Successful! Please login.");
        showGate('login-gate');
    }

    function handleLogin() {
        const email = document.getElementById('log-email').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value.trim();
        const savedPass = localStorage.getItem(`user_pass_${email}`);

        if(savedPass && savedPass === pass) {
            const data = JSON.parse(localStorage.getItem(`user_data_${email}`));
            document.getElementById('bal-val').innerText = data.balance.toLocaleString();
            document.getElementById('anthem-player').play();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderMarket();
        } else {
            alert("Invalid Email or Password!");
        }
    }

    function renderMarket() {
        document.getElementById('market-grid').innerHTML = items.map(i => `
            <div class="card">
                <span style="font-size:10px; color:${i.s > 0 ? '#00ff00' : '#ff4d4d'}; font-weight:bold;">
                    ${i.s > 0 ? 'IN STOCK' : 'OUT OF STOCK'} (${i.s})
                </span>
                <h3 style="margin:5px 0; font-size:16px;">${i.n}</h3>
                <div class="price">₦${i.p.toLocaleString()}</div>
                <button class="buy-btn" ${i.s === 0 ? 'disabled style="background:#333;"' : ''}>BUY NOW</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
