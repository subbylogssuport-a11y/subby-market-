<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | PRO EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        :root { 
            --primary: #0070f3; 
            --gold: #b59410; 
            --bg: #000000; 
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 90px; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-ui { background: var(--card-bg); border: 1px solid #333; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        
        input, textarea { width: 100%; padding: 16px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        .nav { padding: 18px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        
        .log-item { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #222; margin: 15px; position: relative; }
        .stock-tag { position: absolute; top: 15px; right: 15px; background: rgba(181,148,16,0.1); color: var(--gold); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; padding: 15px; justify-content: space-around; z-index: 500; }
        .tab { color: #555; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; }
        .tab.active { color: var(--primary); }

        #bot-window { position: fixed; bottom: 90px; right: 20px; width: 300px; background: #111; border: 1px solid #333; border-radius: 20px; padding: 15px; display: none; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #chat-logs { height: 200px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding: 5px; }
        .msg-ai { background: #1a1a1a; color: #ccc; padding: 10px; border-radius: 12px; margin-bottom: 8px; line-height: 1.4; border-left: 3px solid var(--primary); }
        .msg-user { background: var(--primary); color: white; padding: 10px; border-radius: 12px; margin-bottom: 8px; text-align: right; margin-left: 20px; }
        .bot-toggle { position: fixed; bottom: 90px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1999; font-size: 24px; box-shadow: 0 4px 20px rgba(0,112,243,0.4); }
    </style>
</head>
<body>

<div id="auth-gate" class="overlay">
    <div class="card-ui">
        <h2 id="atitle" style="color:var(--primary); margin-bottom:10px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">SIGN IN</button>
        <p onclick="toggleAuth()" style="color:var(--gold); font-size:13px; margin-top:20px; cursor:pointer;" id="atog">New? Create Account</p>
    </div>
</div>

<div class="bot-toggle" id="bot-head" onclick="toggleBot()" style="display:none;">🤖</div>
<div id="bot-window">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
        <b style="color:var(--primary); font-size:12px;">SUBBY ASSISTANT</b>
        <span onclick="toggleBot()" style="cursor:pointer; color:#555;">×</span>
    </div>
    <div id="chat-logs"></div>
    <div style="display:flex; gap:5px;">
        <input id="bot-input" placeholder="Ask me something..." style="padding:10px; margin:0; font-size:12px;">
        <button onclick="askBot()" style="background:var(--primary); border:none; color:white; padding:10px; border-radius:10px;">➔</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <b style="color:var(--primary); font-size:18px;" ondblclick="checkAdmin()">SUBBY LOGS</b>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:#111; padding:6px 14px; border-radius:20px; font-weight:800; border:1px solid #333;">
                ₦<span id="bal">0</span>
            </div>
            <button onclick="pay()" style="width:34px; height:34px; border-radius:50%; border:none; background:var(--primary); color:white; font-size:20px;">+</button>
            <button onclick="logout()" style="background:#222; color:#fff; border:1px solid #444; padding:5px 10px; border-radius:8px; font-size:10px;">LOGOUT</button>
        </div>
    </div>

    <div id="view-market">
        <div style="padding:15px;"><input type="text" id="searchInput" placeholder="Search cards..." oninput="renderMarket()"></div>
        <div id="market-list"></div>
    </div>

    <div id="view-logs" style="display:none; padding:15px;"><div id="my-logs-list"></div></div>

    <div class="tab-bar">
        <div onclick="switchTab('market')" id="tab-m" class="tab active">MARKET</div>
        <div onclick="switchTab('logs')" id="tab-l" class="tab">MY LOGS</div>
        <div onclick="openSupport()" class="tab">SUPPORT</div>
    </div>
</div>

<div id="admin-gate" class="overlay" style="display:none; z-index:11000;">
    <div class="card-ui" style="max-height: 90vh; overflow-y: auto;">
        <h2 style="color:var(--primary)">ADMIN PANEL</h2>
        <input id="adm-id" placeholder="User Email or Username">
        <input id="adm-amt" placeholder="Amount ₦" type="number">
        <button class="btn" onclick="adminSendMoney()">CONFIRM TRANSFER</button>
        <hr style="margin:20px 0; border-color:#333;">
        <input id="log-name" placeholder="Item Name">
        <input id="log-price" placeholder="Price ₦" type="number">
        <textarea id="log-data" placeholder="Paste logins (one per line)"></textarea>
        <button class="btn" style="background:#10b981;" onclick="adminUpload()">UPLOAD LOGS</button>
        <div id="admin-delete-list" style="margin-top:20px;"></div>
        <button class="btn" style="background:#222;" onclick="document.getElementById('admin-gate').style.display='none'">CLOSE ADMIN</button>
    </div>
</div>

<script>
    // Config matches your video screenshots
    const firebaseConfig = {
        apiKey: "AIzaSyAcJGCC2g2Py6jphASOW8KtbiMMrPZR6aY",
        authDomain: "subbylogs.firebaseapp.com",
        databaseURL: "https://subbylogs-default-rtdb.firebaseio.com",
        projectId: "subbylogs",
        storageBucket: "subbylogs.firebasestorage.app",
        messagingSenderId: "405053710429",
        appId: "1:405053710429:web:592518cf9ee73e31666db4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    // POLITE BOT LOGIC
    function toggleBot() { 
        const win = document.getElementById('bot-window');
        win.style.display = win.style.display === 'none' ? 'block' : 'none';
    }

    function askBot() {
        const i = document.getElementById('bot-input'), l = document.getElementById('chat-logs'), q = i.value.toLowerCase();
        if(!q) return;
        l.innerHTML += `<div class="msg-user">${i.value}</div>`;
        i.value = "";
        
        let r = "I hear you, friend. For complex matters, our wisdom is best found through WhatsApp support.";
        if(q.includes("hello") || q.includes("hi")) r = "Greetings! I am the Subby Assistant. May your transactions be swift and your logs stay active. How can I serve you today?";
        if(q.includes("fund")) r = "To add to your wealth, click the blue '+' icon at the top. Paystack will guide you safely.";
        if(q.includes("how are you")) r = "I am functioning perfectly, thank you for your kind concern. It is a pleasure to assist you.";
        
        setTimeout(() => { 
            l.innerHTML += `<div class="msg-ai">${r}</div>`; 
            l.scrollTop = l.scrollHeight; 
        }, 600);
    }

    // AUTH
    async function handleAuth() {
        const e = document.getElementById('email').value.trim(), p = document.getElementById('pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Error: " + err.message); }
    }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-gate').style.display='none';
            document.getElementById('app').style.display='block';
            document.getElementById('bot-head').style.display='flex';
            db.ref('users/'+user.uid+'/bal').on('value', s => document.getElementById('bal').innerText = (s.val() || 0).toLocaleString());
            db.ref('market').on('value', renderMarket);
            renderMyLogs();
            // Initial polite greeting
            document.getElementById('chat-logs').innerHTML = `<div class="msg-ai">Welcome back. Patience is a virtue, and quality logs are a blessing. How may I help you?</div>`;
        }
    });

    // MARKET & ADMIN DELETE
    function renderMarket() {
        db.ref('market').once('value', s => {
            const items = s.val() || {}, term = document.getElementById('searchInput').value.toLowerCase();
            let h = "", adminH = "";
            for(let k in items) {
                const count = items[k].data ? items[k].data.length : 0;
                if(items[k].name.toLowerCase().includes(term)) {
                    h += `<div class="log-item"><span class="stock-tag">${count} IN STOCK</span><h3>${items[k].name}</h3><h2 style="color:var(--primary); margin:12px 0;">₦${items[k].price}</h2><button class="btn" onclick="buyLog('${k}', ${items[k].price})" ${count === 0 ? 'disabled style="background:#222; color:#444"' : ''}>PURCHASE</button></div>`;
                }
                adminH += `<div style="display:flex; justify-content:space-between; padding:10px; background:#1a1a1a; margin-bottom:5px; border-radius:8px;"><span>${items[k].name}</span><span onclick="deleteItem('${k}')" style="color:red; cursor:pointer;">DELETE</span></div>`;
            }
            document.getElementById('market-list').innerHTML = h;
            document.getElementById('admin-delete-list').innerHTML = adminH;
        });
    }

    async function deleteItem(id) { if(confirm("Permanently delete this item?")) await db.ref('market/'+id).remove(); }

    async function buyLog(id, price) {
        const uid = auth.currentUser.uid;
        const uSnap = await db.ref('users/'+uid).once('value');
        if(uSnap.val().bal < price) return alert("Insufficient balance.");
        const logSnap = await db.ref('market/'+id).once('value');
        let stock = logSnap.val().data;
        const item = stock.shift();
        await db.ref('market/'+id).update({ data: stock });
        await db.ref('users/'+uid).update({ bal: uSnap.val().bal - price });
        await db.ref('purchases/'+uid).push({ name: logSnap.val().name, data: item, date: new Date().toLocaleDateString() });
        alert("Success! Check MY LOGS.");
    }

    // UPDATED ADMIN MONEY LOGIC
    async function adminSendMoney() {
        const input = document.getElementById('adm-id').value.trim().toLowerCase();
        const amt = parseInt(document.getElementById('adm-amt').value);
        if(!input || isNaN(amt)) return alert("Fill all fields");
        
        // Search by username first, then fallback to direct UID or Email
        let targetUid = null;
        const uSnap = await db.ref('usernames/'+input).once('value');
        if(uSnap.exists()) {
            targetUid = uSnap.val();
        } else {
            // Check if user exists in the 'users' tree by email
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val();
            for(let id in users) {
                if(users[id].email === input) { targetUid = id; break; }
            }
        }

        if(targetUid) {
            const bSnap = await db.ref('users/'+targetUid+'/bal').once('value');
            await db.ref('users/'+targetUid).update({ bal: (bSnap.val() || 0) + amt });
            alert("Sent ₦"+amt+" successfully.");
        } else alert("User not found. Check spelling.");
    }

    function renderMyLogs() {
        db.ref('purchases/'+auth.currentUser.uid).on('value', s => {
            const logs = s.val() || {};
            let h = "";
            for(let k in logs) h += `<div class="log-item"><b>${logs[k].name}</b><br><small>${logs[k].date}</small><button class="btn" style="margin-top:10px; background:#222;" onclick="copyLog('${logs[k].data}')">COPY DATA</button></div>`;
            document.getElementById('my-logs-list').innerHTML = h || "<p style='text-align:center; padding-top:50px;'>No logs yet.</p>";
        });
    }

    function copyLog(txt) { navigator.clipboard.writeText(txt).then(() => alert("Copied!")); }
    function switchTab(t) {
        document.getElementById('view-market').style.display = t === 'market' ? 'block' : 'none';
        document.getElementById('view-logs').style.display = t === 'logs' ? 'block' : 'none';
        document.getElementById('tab-m').className = t === 'market' ? 'tab active' : 'tab';
        document.getElementById('tab-l').className = t === 'logs' ? 'tab active' : 'tab';
    }
    function checkAdmin() { if(prompt("ADMIN PIN") === "1710") document.getElementById('admin-gate').style.display='flex'; }
    function adminUpload() {
        const n = document.getElementById('log-name').value, p = document.getElementById('log-price').value;
        const d = document.getElementById('log-data').value.split('\n').filter(l => l.trim() !== "");
        db.ref('market').push({ name: n, price: p, data: d });
        alert("Stock Listed!");
    }

    function pay() {
        const amt = prompt("Enter amount to fund (min ₦100):");
        if(!amt || amt < 100) return;
        const handler = PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: auth.currentUser.email,
            amount: amt * 100,
            callback: function() {
                db.ref('users/'+auth.currentUser.uid).once('value', s => {
                    db.ref('users/'+auth.currentUser.uid).update({ bal: (s.val().bal || 0) + parseInt(amt) });
                });
            }
        });
        handler.openIframe();
    }
</script>
</body>
</html>
