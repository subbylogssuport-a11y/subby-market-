<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY MARKET | V45 AUTO</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #0070f3; --gold: #d4af37; --bg: #0a0b10; --card: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; min-height: 100vh; overflow-x: hidden; }

        .gate-container { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #111; border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(10px); }
        .modal-content { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 30px; text-align: center; max-width: 350px; }

        .navbar { background: rgba(17,17,17,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        #site-logo { font-weight: 900; color: var(--primary); font-size: 18px; }
        .bal-pill { background: #000; border: 1px solid var(--gold); padding: 8px 18px; border-radius: 25px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .cat-header { padding: 15px 20px; font-size: 14px; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .grid { padding: 10px; display: grid; gap: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; }
        
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .adm-item { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; }
    </style>
</head>
<body>

<div id="login-gate" class="gate-container">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">SUBBY LOGIN</h2>
        <input type="email" id="log-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="log-pass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">SIGN IN</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('reg-gate')">New user? Create Account</p>
    </div>
</div>

<div id="reg-gate" class="gate-container" style="display:none;">
    <div class="auth-card">
        <h2 style="color:var(--primary); margin-bottom:20px;">CREATE ACCOUNT</h2>
        <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Create Password">
        <button class="auth-btn" onclick="handleRegister()">SIGN UP</button>
        <p style="color:#666; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showGate('login-gate')">Have account? Login</p>
    </div>
</div>

<div id="success-modal" class="modal">
    <div class="modal-content" style="border-color: #00ff00;">
        <h2 style="color:#00ff00; margin-bottom:10px;">Login Purchased! ✅</h2>
        <p id="success-msg" style="font-size:14px; color:#eee; margin-bottom:20px; line-height:1.5; background:#000; padding:10px; border-radius:10px; font-family:monospace;"></p>
        <p style="font-size:11px; color:#888; margin-bottom:15px;">Copy your login above. It is also saved in your 'MY LOGS' history.</p>
        <button class="auth-btn" onclick="document.getElementById('success-modal').style.display='none'">DONE</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <div class="navbar">
        <div id="site-logo" ondblclick="openAdmin()">SUBBY MARKET</div>
        <div class="bal-pill">₦<span id="bal-val">0</span> <span onclick="fundWallet()" style="color:var(--gold); cursor:pointer;">+</span></div>
    </div>
    <div id="market-grid"></div>
    <div class="bottom-nav">
        <div style="color:var(--primary); font-size:10px; font-weight:bold;">MARKET</div>
        <div style="color:#555; font-size:10px; font-weight:bold;" onclick="checkMyHistory()">MY LOGS</div>
        <div style="color:#555; font-size:10px; font-weight:bold;" onclick="window.open('https://wa.me/2348104565349')">SUPPORT</div>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color:var(--gold); margin-bottom:20px;">👑 AUTO-DELIVERY ADMIN</h2>
    <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:20px;">
        <h4 style="margin-bottom:10px;">ADD NEW LOG CARD</h4>
        <input id="new-cat" class="auth-input" placeholder="Category (TikTok, FB)">
        <input id="new-name" class="auth-input" placeholder="Item Name">
        <input id="new-price" type="number" class="auth-input" placeholder="Price ₦">
        <p style="font-size:10px; color:var(--gold);">Paste Logs below (One per line):</p>
        <textarea id="new-logs" class="auth-input" style="height:80px; text-align:left;" placeholder="user:pass&#10;user2:pass2"></textarea>
        <button class="auth-btn" onclick="addNewCard()">+ ADD TO MARKET</button>
    </div>
    <div id="admin-list-container"></div>
    <button class="auth-btn" style="background:#222; margin-top:40px;" onclick="document.getElementById('admin-panel').style.display='none'">EXIT ADMIN</button>
</div>

<script>
    let currentUser = null;
    let balance = 0;
    let items = JSON.parse(localStorage.getItem('market_items')) || [];

    function showGate(id) {
        document.querySelectorAll('.gate-container').forEach(g => g.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function handleRegister() {
        const e = document.getElementById('reg-email').value.toLowerCase();
        const p = document.getElementById('reg-pass').value;
        if(!e || !p) return alert("Fill all fields");
        localStorage.setItem(`user_${e}`, JSON.stringify({pass:p, bal:0, history:[]}));
        alert("Account Created!"); showGate('login-gate');
    }

    function handleLogin() {
        const e = document.getElementById('log-email').value.toLowerCase();
        const p = document.getElementById('log-pass').value;
        const u = JSON.parse(localStorage.getItem(`user_${e}`));
        if(u && u.pass === p) {
            currentUser = e; balance = u.bal;
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderMarket();
        } else alert("Wrong details!");
    }

    function renderMarket() {
        const categories = [...new Set(items.map(i => i.c))];
        let html = "";
        categories.forEach(c => {
            html += `<div class="cat-header">${c} Section</div><div class="grid">`;
            items.filter(i => i.c === c).forEach(i => {
                const stockCount = i.data ? i.data.length : 0;
                html += `<div class="card">
                    <span style="font-size:11px; color:${stockCount>0?'#00ff00':'#ff4d4d'}">● ${stockCount>0?'IN STOCK ('+stockCount+')':'SOLD OUT'}</span>
                    <h3>${i.n}</h3>
                    <h2 style="color:var(--primary); margin:8px 0;">₦${i.p.toLocaleString()}</h2>
                    <button class="auth-btn" style="height:40px;" ${stockCount==0?'disabled style="background:#222"':''} onclick="buyItem(${i.id})">BUY NOW</button>
                </div>`;
            });
            html += `</div>`;
        });
        document.getElementById('market-grid').innerHTML = html || "<p style='text-align:center; padding:50px;'>No items.</p>";
        localStorage.setItem('market_items', JSON.stringify(items));
    }

    function buyItem(id) {
        let item = items.find(x => x.id === id);
        if(balance < item.p) return alert("Low balance!");
        
        // Take the first log out of the vault
        const logToDeliver = item.data.shift(); 
        balance -= item.p;
        
        let u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        u.bal = balance;
        u.history.push({item: item.n, log: logToDeliver, date: new Date().toLocaleString()});
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
        
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        renderMarket();

        document.getElementById('success-msg').innerText = logToDeliver;
        document.getElementById('success-modal').style.display = 'flex';
    }

    function checkMyHistory() {
        const u = JSON.parse(localStorage.getItem(`user_${currentUser}`));
        if(!u.history.length) return alert("No logs bought yet!");
        alert("YOUR BOUGHT LOGS:\n\n" + u.history.map(h => `${h.item}\nLog: ${h.log}\n---`).join('\n'));
    }

    function openAdmin() {
        if(prompt("ADMIN PASS:") === '1234567890') {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminList();
        }
    }

    function loadAdminList() {
        document.getElementById('admin-list-container').innerHTML = items.map(i => `
            <div class="adm-item">
                <p style="font-size:10px; color:var(--gold)">${i.c} | Stock: ${i.data.length}</p>
                <p><b>${i.n}</b> - ₦${i.p}</p>
                <textarea style="width:100%; height:50px; background:#000; color:#0f0; font-size:10px; border:1px solid #333; margin-top:5px;" onchange="updateLogs(${i.id}, this.value)">${i.data.join('\n')}</textarea>
                <button onclick="deleteCard(${i.id})" style="background:red; color:#fff; border:none; padding:5px; border-radius:5px; margin-top:5px; font-size:10px;">DELETE</button>
            </div>`).join('');
    }

    function updateLogs(id, val) {
        let item = items.find(x => x.id == id);
        item.data = val.split('\n').filter(line => line.trim() !== "");
        renderMarket();
    }

    function addNewCard() {
        const c = document.getElementById('new-cat').value;
        const n = document.getElementById('new-name').value;
        const p = parseInt(document.getElementById('new-price').value);
        const l = document.getElementById('new-logs').value.split('\n').filter(line => line.trim() !== "");
        if(!c || !n || !p) return alert("Fill fields!");
        items.push({id: Date.now(), c: c, n: n, p: p, data: l});
        renderMarket(); loadAdminList();
    }

    function deleteCard(id) {
        items = items.filter(x => x.id !== id); renderMarket(); loadAdminList();
    }

    function fundWallet() {
        const a = prompt("Amount ₦:");
        if(!a) return;
        PaystackPop.setup({
            key: 'pk_live_241bdd6d0b4dd94ebe7f59b7d70bee5939fae661',
            email: currentUser, amount: a * 100, currency: 'NGN',
            callback: () => { balance += parseInt(a); updateLocalUser(); }
        }).openIframe();
    }

    function updateLocalUser() {
        document.getElementById('bal-val').innerText = balance.toLocaleString();
        let u = JSON.parse(localStorage.getItem(`user_${currentUser}`)); u.bal = balance;
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(u));
    }
</script>
</body>
</html>
