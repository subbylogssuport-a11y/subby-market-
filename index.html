<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBBY LOGS | OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; }

        .auth-card { background: #16161a; border: 1px solid #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        h1, h2 { color: #0070f3; margin-bottom: 20px; font-weight: 900; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
        .btn-blue { background: #0070f3; color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-dark { background: #222; margin-top: 10px; }
        .btn-link { background: none; border: none; color: #0070f3; margin-top: 20px; cursor: pointer; font-size: 14px; width: 100%; }

        #main-site { display: none; width: 100%; position: fixed; inset: 0; background: #000; overflow-y: auto; }
        .navbar { background: #16161a; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; }
        .product-list { padding: 15px; }
        .card { background: #16161a; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card" id="login-box">
        <h1>SUBBY LOGS</h1>
        <input type="text" id="login-u" placeholder="Username">
        <input type="password" id="login-p" placeholder="Password">
        <button class="btn-blue" onclick="processLogin()">LOGIN</button>
        <button class="btn-blue btn-dark" onclick="showBox('signup')">Create Account</button>
        <button class="btn-link" onclick="showBox('forgot')">Forgot Password?</button>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <h2>SIGN UP</h2>
        <input type="text" id="reg-u" placeholder="Username">
        <input type="password" id="reg-p" placeholder="Password">
        <button class="btn-blue" onclick="processSignup()">CREATE ACCOUNT</button>
        <button class="btn-link" onclick="showBox('login')">Back to Login</button>
    </div>

    <div class="auth-card" id="forgot-box" style="display:none;">
        <h2>RECOVERY</h2>
        <div id="otp-code" style="font-size:24px; color:#ffcc00; margin-bottom:15px; font-weight:bold;">1234</div>
        <input type="text" id="for-u" placeholder="Username">
        <input type="text" id="for-otp" placeholder="Enter Code Above">
        <input type="password" id="for-new-p" placeholder="New Password">
        <button class="btn-blue" onclick="processReset()">RESET PASSWORD</button>
        <button class="btn-link" onclick="showBox('login')">Back</button>
    </div>
</div>

<div id="main-site">
    <div class="navbar">
        <b style="color:#0070f3;" onclick="adminClick()">SUBBY MARKET</b>
        <b>₦<span id="bal">0</span></b>
    </div>
    <div class="product-list" id="shop-items">
        </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('sys_users') || '{"Pelumi":{"p":"123","b":30000}}');
    let inventory = JSON.parse(localStorage.getItem('subby_stock') || '{"fb_c":[],"fb_a":[]}');

    function showBox(id) {
        document.getElementById('login-box').style.display = id === 'login' ? 'block' : 'none';
        document.getElementById('signup-box').style.display = id === 'signup' ? 'block' : 'none';
        document.getElementById('forgot-box').style.display = id === 'forgot' ? 'block' : 'none';
    }

    function processLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(users[u] && users[u].p === p) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('bal').innerText = users[u].b.toLocaleString();
            renderMarket();
        } else { alert("Wrong Username or Password!"); }
    }

    function renderMarket() {
        const list = document.getElementById('shop-items');
        const products = [
            {id:'fb_c', name:'Facebook with create profile', price:8000},
            {id:'fb_a', name:'Facebook with already created Profile', price:5500}
        ];
        list.innerHTML = '';
        products.forEach(p => {
            const stock = inventory[p.id].length;
            list.innerHTML += `<div class="card">
                <p style="color:#0070f3; font-size:11px;">Stock: ${stock}</p>
                <h3>${p.name}</h3>
                <p style="font-size:22px; font-weight:bold; margin:10px 0;">₦${p.price.toLocaleString()}</p>
                <button class="btn-blue" onclick="buy('${p.id}', ${p.price})">${stock > 0 ? 'Buy Now' : 'Out of Stock'}</button>
            </div>`;
        });
    }

    function processSignup() {
        const u = document.getElementById('reg-u').value.trim();
        const p = document.getElementById('reg-p').value.trim();
        if(users[u]) return alert("User exists!");
        users[u] = {p: p, b: 0};
        localStorage.setItem('sys_users', JSON.stringify(users));
        alert("Success! Now Login.");
        showBox('login');
    }

    function processReset() {
        const u = document.getElementById('for-u').value.trim();
        const otp = document.getElementById('for-otp').value.trim();
        if(otp === "1234" && users[u]) {
            users[u].p = document.getElementById('for-new-p').value;
            localStorage.setItem('sys_users', JSON.stringify(users));
            alert("Password Reset!");
            showBox('login');
        } else { alert("Invalid!"); }
    }
</script>
</body>
</html>
